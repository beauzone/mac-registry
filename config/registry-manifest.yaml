frameworks:
  system:
    - id: account-based-marketing-system-framework
      path: frameworks/system/enterprise-revenue-systems/account-based-marketing-system-framework.yaml
      description: Designs a coordinated Marketing + Sales system focused on high-value target accounts. Integrates account selection logic, persona mapping, personalized engagement, content orchestration, and revenue measurement discipline. Built for B2B SaaS and enterprise GTM motions.
      category: enterprise-revenue-systems
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: multi-threaded-enterprise-outreach-framework
      path: frameworks/system/enterprise-revenue-systems/multi-threaded-enterprise-outreach-framework.yaml
      description: Designs structured engagement across enterprise buying committees to reduce single-thread risk, accelerate deal velocity, and increase win probability. Integrates persona mapping, influence sequencing, message differentiation, and internal alignment signaling.
      category: enterprise-revenue-systems
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: outbound-prospecting-architecture-framework
      path: frameworks/system/enterprise-revenue-systems/outbound-prospecting-architecture-framework.yaml
      description: Designs structured outbound prospecting campaigns using signal-based targeting, persona-specific value hypotheses, insight-led messaging, and sequenced multi-channel cadences. Built for B2B SaaS and enterprise GTM motions.
      category: enterprise-revenue-systems
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: sales-cadence-architecture-framework
      path: frameworks/system/enterprise-revenue-systems/sales-cadence-architecture-framework.yaml
      description: Designs structured outbound and expansion cadences across email, phone, social, and content touches. Optimizes timing, channel mix, and response branching to maximize meeting creation and opportunity conversion while minimizing fatigue and brand damage.
      category: enterprise-revenue-systems
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: sales-methodology-lens
      path: frameworks/system/enterprise-revenue-systems/sales-methodology-lens.yaml
      description: Applies structured sales methodologies (MEDDICC and Challenger) to evaluate deal qualification rigor, forecast reliability, and enablement effectiveness. Adapted for AI-native and enterprise revenue motions.
      category: enterprise-revenue-systems
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-brand-marketing-framework
      path: frameworks/system/gartner-frameworks/gartner-brand-marketing-framework.yaml
      description: "A six-dimension framework for evaluating and improving brand marketing effectiveness. It links brand strategy and awareness to engagement, customer experience, and measurable business outcomes in order to strengthen brand health and long-term growth.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-customer-journey-framework
      path: frameworks/system/gartner-frameworks/gartner-customer-journey-framework.yaml
      description: "A framework for understanding how B2B buyers progress through complex, non-linear purchase decisions. It identifies the core buying jobs buyers must complete-from problem identification to internal consensus-and helps marketing, sales, and product teams align engagement strategies with buyer needs at each stage.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-customer-proof-framework
      path: frameworks/system/gartner-frameworks/gartner-customer-proof-framework.yaml
      description: "A structured methodology for developing customer proof assets (case studies, success stories, and reference narratives) that demonstrate measurable business outcomes.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-go-to-market-strategy-framework
      path: frameworks/system/gartner-frameworks/gartner-go-to-market-strategy-framework.yaml
      description: "Aligns growth strategy with revenue execution by designing the go-to-market operating model across target market focus, buyer entry points, sales incentives, investment allocation, and voice-of-customer feedback loops.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-marketing-strategic-planning-framework
      path: frameworks/system/gartner-frameworks/gartner-marketing-strategic-planning-framework.yaml
      description: "A structured process for aligning marketing strategy with enterprise business objectives. The framework helps marketing leaders verify the business context, define marketing goals aligned to enterprise strategy, allocate resources, establish performance metrics, and document a strategic marketing plan for execution and stakeholder communication.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-positioning-messaging-framework
      path: frameworks/system/gartner-frameworks/gartner-positioning-messaging-framework.yaml
      description: "Defines differentiated product positioning and messaging that motivates buyers to act and enables revenue teams to consistently communicate product value.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-product-marketing-framework
      path: frameworks/system/gartner-frameworks/gartner-product-marketing-framework.yaml
      description: "A structured approach for product marketing teams to define market understanding, differentiation, messaging, and revenue enablement that drives buyer engagement and supports sales growth.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: gartner-product-positioning-framework
      path: frameworks/system/gartner-frameworks/gartner-product-positioning-framework.yaml
      description: "A structured methodology for defining a product's differentiated value relative to alternatives in the market. The framework aligns product, marketing, and sales teams around a clear positioning statement that motivates buyers and enables revenue teams to consistently communicate the product story.\n"
      category: gartner-frameworks
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: attribution-lenses
      path: frameworks/system/governance-performance-capital-allocation/attribution-lenses.yaml
      description: Evaluates marketing attribution models (first-touch, last-touch, multi-touch, incrementality) and recommends a measurement strategy aligned to decision-making needs. Adapted for AI-native, multi-channel environments.
      category: governance-performance-capital-allocation
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: investor-narrative-framework
      path: frameworks/system/governance-performance-capital-allocation/investor-narrative-framework.yaml
      description: Structures a board- and investor-ready narrative linking market opportunity, structural advantage, growth mechanics, and financial trajectory. Designed for venture, growth equity, and public market contexts.
      category: governance-performance-capital-allocation
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: mckinsey-7s-org-alignment
      path: frameworks/system/governance-performance-capital-allocation/mckinsey-7s-org-alignment.yaml
      description: Uses the McKinsey 7S model—Strategy, Structure, Systems, Skills, Staff, Style, and Shared Values—to assess how well an organization is aligned to its growth and GTM objectives.
      category: governance-performance-capital-allocation
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: north-star-metric-driver-tree
      path: frameworks/system/governance-performance-capital-allocation/north-star-metric-driver-tree.yaml
      description: Defines a single unifying North Star Metric (NSM) and decomposes it into a causal driver tree. Aligns marketing, product, and revenue teams around measurable growth mechanics in AI-native environments.
      category: governance-performance-capital-allocation
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: okrs
      path: frameworks/system/governance-performance-capital-allocation/okrs.yaml
      description: Translates strategic priorities into measurable Objectives and Key Results with ownership, cadence, and cross-functional alignment. Adapted for AI-native, fast-scaling organizations.
      category: governance-performance-capital-allocation
      scope: system
      version: "1.0.0"
      updated_at: "2026-04-22"
    - id: pricing-strategy-framework
      path: frameworks/system/governance-performance-capital-allocation/pricing-strategy-framework.yaml
      description: Designs pricing architecture aligned to value creation, competitive positioning, margin targets, and expansion mechanics. Built for SaaS, usage-based, hybrid, and AI-native business models.
