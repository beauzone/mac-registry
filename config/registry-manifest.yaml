rubrics:
  - id: writer-voice-fidelity
    path: rubrics/writer-voice-fidelity.yaml
    description: "Evaluates generated artifacts against a specified writer profile across five dimensions: voice match (25%), syntax fidelity (20%), diction accuracy (20%), anti-pattern compliance (20%), brand alignment (15%). Authorship-aware weighting: ghostwritten = 100%, collaborative = 75%, self-authored = 50%. Applied when a writer profile is referenced in an artifact; does not gate publication."
    scope: system

schemas:
  - id: writer-profile-schema
    path: schemas/writer-profile.schema.yaml
    description: "Schema for individual writer style profiles stored in sources/brand/writer-profiles/. Governs 11 sections: metadata, identity (with authorship model), voice, syntax, diction, anti_patterns, context_modulations, sample_provenance, calibration_history (required); personal_brand, personal_narrative, freshness (optional). Net-new schema — no existing source adapted."
    scope: system

