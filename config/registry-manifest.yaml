# =============================================================================
# Asset Versioning Convention
# =============================================================================
# Each asset entry includes two versioning fields:
#
#   version:     Semantic version string (MAJOR.MINOR.PATCH)
#   updated_at:  ISO date of last change (YYYY-MM-DD)
#
# Versioning rules:
#   MAJOR — structural schema change (breaking; consumers must update)
#   MINOR — meaningful content update (new sections, rewritten guidance)
#   PATCH — copy fixes, typos, minor clarifications
#
# Skills use these fields to determine whether a locally cached asset is
# current. On `refresh`, only assets where remote version > cached version
# are re-downloaded.
# =============================================================================
