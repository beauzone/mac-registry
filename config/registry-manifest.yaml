mcp:
  definitions: []
  instances: []

mcp_definitions:
  - id: mcp-attribution-connector
    path: mcp/definitions/attribution-connector.yaml
    description: "MCP client connector for ingesting performance and attribution data from external revenue intelligence platforms. Supports CaliberMind, HubSpot, Bizible, Salesforce, and custom webhook sources. Normalizes attribution output to the performance.schema.yaml format and writes to sources/performance/. Instances are configured per-organization in mcp/instances/attribution-{company}.yaml.\n"
    scope: system
  - id: mcp-contentful-cms
    path: mcp/definitions/contentful-cms.yaml
    description: "Official Contentful MCP server connector. Reads and writes entries, manages assets, and provides content type definitions. Enables the MaC deployment engine to publish governed artifacts into Contentful spaces and pull back published content for drift detection. One instance per Contentful space + environment combination.\n"
    scope: system
    category: cms
    auth_type: api_key
    server_type: official
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-google-analytics-4
    path: mcp/definitions/google-analytics-4.yaml
    description: "Official Google Analytics 4 MCP server connector. Reads page performance metrics, conversion events, audience segments, and realtime active users from configured GA4 properties. Enables performance feedback loops (Module B3) to correlate published artifacts with measured engagement and conversion outcomes. One instance per GA4 property.\n"
    scope: system
    category: analytics
    auth_type: oauth2
    server_type: official
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-google-search-console
    path: mcp/definitions/google-search-console.yaml
    description: "Community MCP server connector for Google Search Console. Queries search performance data, inspects URL indexing status, reads coverage reports, and manages sitemaps. Powers SEO audit skills and performance feedback loops for organic search attribution. One instance per GSC property (domain or URL-prefix verified).\n"
    scope: system
    category: seo
    auth_type: oauth2
    server_type: community
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-hubspot-crm
    path: mcp/definitions/hubspot-crm.yaml
    description: "Official HubSpot MCP server connector for accessing CRM records — contacts, companies, deals, and form submissions. Enables governed marketing workflows to enrich audience targeting with firmographic and behavioral data, read active pipeline for attribution, and receive real-time form submission events. Scoped per HubSpot portal; configured via mcp/instances/.\n"
    scope: system
    category: crm
    auth_type: oauth2
    server_type: official
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-mailchimp-email
    path: mcp/definitions/mailchimp-email.yaml
    description: "Community MCP server connector for Mailchimp. Manages email campaigns, audience lists, subscriber tags, and marketing automation triggers. Enables governed email send workflows from MaC-approved artifacts, with list segmentation, tag-based targeting, and automation trigger firing. One instance per Mailchimp account.\n"
    scope: system
    category: email
    auth_type: api_key
    server_type: community
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-meta-ads
    path: mcp/definitions/meta-ads.yaml
    description: "Community MCP server connector for Meta Ads (Facebook + Instagram). Reads campaigns, manages ad sets, stores ad creative, and pulls insights reports. Enables paid-ads skill to query performance and propose optimizations against governed creative, and enables deployment flows to push approved ad creative into Meta Business Manager. One instance per Meta Business Manager account.\n"
    scope: system
    category: paid-ads
    auth_type: oauth2
    server_type: community
    scan_status: passed
    added_in_cycle: 16
  - id: mcp-mixpanel-analytics
    path: mcp/definitions/mixpanel-analytics.yaml
    description: "Official Mixpanel MCP server connector. Queries event data, runs funnel analyses, defines cohorts, and looks up user profiles. Powers growth skills and performance feedback loops for product engagement and activation metrics. One instance per Mixpanel project.\n"
    scope: system
    category: product-analytics
    auth_type: api_key
    server_type: official
    scan_status: passed
    added_in_cycle: 16
  - id: hubspot-sync
    path: mcp/definitions/quarantine/hubspot-sync/definition.yaml
    description: "Bidirectional sync between MaC source specs and HubSpot CRM. Pulls contact and deal data to enrich ICPs and personas. Pushes approved content to HubSpot marketing assets.\n"
    scope: quarantine
  - id: mcp-slack-notifications
    path: mcp/definitions/slack-notifications.yaml
    description: "Built-in Slack MCP connector used by the MaC Notification Engine for Block Kit message delivery, thread replies, file uploads, and user lookups. This definition complements the existing Slack webhook path in app/notifications.py by providing a governed MCP wrapper for richer interactions (threaded conversations, file attachments, user resolution). One instance per Slack workspace.\n"
    scope: system
    category: notifications
    auth_type: bot_token
    server_type: builtin
    scan_status: passed
    added_in_cycle: 16
