metadata:
  id: archetype-health-wellness-conscious
  version: "1.0.0"
  display_name: "Health & Wellness Conscious Consumer"
  domain: consumer-archetype
  archetype_type: dtc-ecommerce
  description: >
    The Health & Wellness Conscious Consumer prioritizes ingredient transparency, clean
    labeling, and sourcing integrity above price in categories directly related to what
    they put in or on their body. They research extensively, distrust vague "natural" claims,
    and reward brands that provide verifiable proof of ingredient and manufacturing standards.
    Load this archetype for food and beverage, supplements, beauty and personal care, or any
    health-adjacent DTC category. Particularly relevant when developing positioning, ingredient
    communication, certification strategy, or email retention programs. Clean label is the
    #1 food and beverage trend in 2025 (Innova Top Trends Survey).
  tags:
    - health-conscious
    - clean-label
    - wellness
    - ingredient-transparency
    - premium-health
    - certification-driven
    - Gen-Z-millennial
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Health & Wellness Conscious Consumer views purchase decisions in health-adjacent
    categories as an extension of their commitment to personal health. They read ingredient
    labels the way others read headlines — fully, critically, and with a well-developed
    ability to spot red flags. They are willing to pay 20-30% more for products that meet
    their standards and will immediately disqualify brands that use vague "natural" claims
    without certifications to back them up. They are 45% of global consumers who explicitly
    prioritize nutrition and wellness over price — and they are growing in share, especially
    among Gen Z and younger Millennials.
  archetype_summary: |
    The Health & Wellness Conscious Consumer views purchase decisions in health-adjacent
    categories as an extension of their commitment to personal health. They read ingredient
    labels the way others read headlines — fully, critically, and with a well-developed
    ability to spot red flags. They are willing to pay 20-30% more for products that meet
    their standards and will immediately disqualify brands that use vague "natural" claims
    without certifications to back them up. They are 45% of global consumers who explicitly
    prioritize nutrition and wellness over price — and they are growing in share, especially
    among Gen Z and younger Millennials.
  behavioral_description: |
    This consumer reads the full ingredient list before adding anything to their cart. They
    know the difference between "natural flavors" (acceptable with explanation) and "artificial
    flavors" (immediate disqualifier in their category). They check for USDA Organic,
    Non-GMO Project Verified, B Corp, and category-specific certifications before
    committing to a new brand. They follow wellness influencers, nutritionists, and functional
    medicine practitioners on social media and YouTube. They research brand sourcing claims —
    "grass-fed" without certification is a flag; "Certified Grass-Fed by AGA" is a trust signal.
    They share products with their wellness community and take brand recommendations from
    that community more seriously than any advertising. They research extensively before
    first purchase but convert rapidly to loyal advocates when a brand meets their standards.

purchase_behavior:
  purchase_triggers:
    - Third-party certification visible on the product page (USDA Organic, Non-GMO, Certified Gluten-Free)
    - Founder mission story with specific health motivation that resonates with their values
    - Recommendation from a trusted wellness practitioner, creator, or community member
    - Short ingredient list with ingredients they can identify and pronounce
    - Specific sourcing story — country of origin, farm name, processing method
    - Clinical or scientific backing for a functional health claim, clearly cited
    - Community of like-minded health-conscious consumers visibly using and advocating for the product
  trust_signals:
    - USDA Organic, Non-GMO Project Verified, B Corp, or category-relevant certification
    - Short ingredient list with recognizable, pronounceable ingredients
    - Transparent sourcing — farm, region, or supplier named explicitly
    - Third-party testing results available (heavy metals, contaminants, potency)
    - Founder or formulator with specific, verifiable health credentials or personal health motivation
    - Active wellness community with visible authentic customer stories
    - Ingredient explanations that demonstrate genuine knowledge, not marketing language
  red_flags:
    - '"Natural" claim without any certification or independent verification'
    - Long ingredient list with chemical-sounding names unfamiliar to a health-aware consumer
    - Missing certifications in a category where certifications are standard
    - Vague health claims not backed by science ("supports wellness," "promotes vitality")
    - Greenwashing — sustainability claims without specificity or verification
    - Unsustainable or plastic-heavy packaging in a category where the consumer expects better
    - Founder story that feels manufactured rather than genuinely health-motivated
  decision_speed: moderate
  decision_speed_notes: |
    First-purchase decisions are deliberate — typically 3-7 days for a new brand as the
    consumer validates certifications, reads reviews, and checks ingredient specifics.
    Within trusted brands, repeat purchase decisions are fast, sometimes habitual and
    automated (subscription). First purchase in a new health category (a supplement for
    a new health goal) involves more research depth. The research investment paradoxically
    creates loyalty — once they've done the work to validate a brand, they are reluctant
    to restart the process for a competitor.

media_consumption:
  primary_channels:
    - channel: Instagram (wellness communities and creator content)
      role: Product discovery and community validation — follows wellness creators, nutritionists, and health practitioners
    - channel: YouTube (nutrition, fitness, and functional medicine creators)
      role: In-depth ingredient and formulation education; trusted educator recommendations drive consideration
    - channel: Wellness podcasts (Huberman Lab, Mindbodygreen, Found My Fitness)
      role: Deepest-trust channel — host recommendations carry significant purchase authority
    - channel: Health publications (Mindbodygreen, Well+Good, Healthline)
      role: Research destination for ingredient and brand validation
    - channel: Farmer's markets and specialty health retail
      role: Physical discovery and community reinforcement — the physical environment validates brand belonging
    - channel: Reddit (r/nutrition, r/supplements, category-specific wellness subs)
      role: Peer research — seeks real user experiences and ingredient debates before purchasing
  discovery_path: |
    Discovery most commonly comes through a trusted wellness creator's recommendation,
    a health practitioner's suggestion, or word-of-mouth from their wellness community.
    Organic search for specific health goals ("clean protein powder without artificial
    sweeteners") is a high-intent discovery channel. Farmer's markets and specialty
    health retailers provide physical discovery moments with premium brand alignment.
    Standard paid social advertising performs below average for first-purchase — community-
    validated discovery channels perform significantly above.
  research_behavior: |
    Before first purchase, reads the full ingredient list and verifies each unfamiliar
    ingredient. Checks certifications against the certifying organization's website for
    authenticity. Reads 10-20 reviews filtered for mentions of ingredient quality, taste,
    and health outcomes. Searches for any third-party testing results. May research the
    founder's credentials or personal health story. Compares against 2-3 alternatives on
    certification and ingredient quality, not price. Posts in wellness communities or
    asks a trusted creator if they have specific questions about formulation.

price_sensitivity:
  level: moderate
  notes: |
    Price sensitivity in this archetype is category-specific and standard-conditional —
    they are not price-insensitive, but price is subordinate to meeting their health
    standards. They will pay 20-30% more than a conventional alternative for a product
    that meets certification and ingredient requirements. They will not pay a premium for
    a "wellness" product that fails to meet those standards — the premium must be earned
    by proof. They are sensitive to price increases that are not accompanied by an
    improvement in sourcing, formulation, or certification.
  premium_justifiers:
    - Third-party certifications that have genuine verification costs and standards
    - Clean, traceable ingredient sourcing with named suppliers or farms
    - Third-party testing for contaminants, potency, or purity
    - Sustainable or ethical production practices with independent verification
    - Proven functional health outcomes backed by research or clinical data
    - Small-batch or artisan production that limits scale but preserves quality standards

loyalty_patterns:
  brand_loyalty: high
  platform_loyalty: moderate
  loyalty_drivers:
    - Consistent ingredient and certification standards over time — no formula changes without communication
    - Ongoing brand education that deepens their knowledge of the health category
    - Transparent communication about any sourcing or formulation changes
    - Genuine community of like-minded health-conscious consumers
    - Subscription that supports a health habit they have built with the product
    - Founder accessibility and authentic mission continuity
  switching_triggers:
    - Formula change that removes a certification or introduces a disqualifying ingredient
    - Brand acquisition that health community perceives as compromising standards
    - Discovery of a competitor with demonstrably superior certification or sourcing
    - Greenwashing exposure — community discovers a sustainability or ingredient claim is overstated
    - Price increase not explained by sourcing or certification improvement
    - Community loses trust in the brand following a health incident or recall

calibration:
  messaging:
    resonate_with:
      - Ingredient transparency that goes beyond legal requirements ("here's why we chose this ingredient and not that one")
      - Certification specificity — name the certifying body and what the certification actually verifies
      - Sourcing stories with specific, verifiable detail — farm name, region, harvest method
      - '"You can pronounce every ingredient" and "you''d recognize everything on this label"'
      - Functional benefits backed by specific research citations, not general wellness claims
      - Founder health journey with authentic specificity — a personal health challenge solved by creating this product
      - Community of health-conscious consumers using the product as part of a visible health practice
    avoid:
      - Vague "natural," "clean," or "healthy" claims without certification or evidence
      - Generic wellness aspiration language that every competitor uses
      - Greenwashing — sustainability claims without specificity, certification, or data
      - Health claims that overstate scientific evidence or extrapolate beyond what studies support
      - Before/after imagery that suggests the product alone is responsible for health transformation
      - Ingredient list that uses marketing names to obscure actual ingredient identities
    tone: knowledgeable and transparent — peer educator, not salesperson

  conversion:
    high_impact_tactics:
      - Prominent certification badges on product pages with clickable links to certifying organization
      - Ingredient explainer section on each product page — what each ingredient is and why it was chosen
      - Third-party testing results downloadable from the product page
      - Customer stories focused on specific health outcomes, not just product satisfaction
      - Subscription framing as health habit formation rather than discount optimization
      - Sample or starter kit that allows trial before full commitment
    friction_points:
      - Missing certifications in a category where they are expected
      - Incomplete ingredient explanation — "proprietary blend" without detail
      - No sourcing information available anywhere on the site
      - Generic product descriptions that do not differentiate on ingredient quality
      - Vague return policy for opened health products
    urgency_triggers:
      - Limited harvest availability — product tied to seasonal or small-batch sourcing
      - Certification renewal creating temporary stock limits
      - Community pre-order for a new formulation with founding member pricing
      - Health goal seasonality — New Year, pre-summer, or back-to-school wellness planning moments

  content:
    preferred_formats:
      - Ingredient deep-dives — long-form content explaining the science, sourcing, and selection rationale for each key ingredient
      - Founder story content with personal health journey specifics
      - Third-party expert interview (nutritionist, functional medicine doctor, formulator)
      - Side-by-side certification comparison against category competitors
      - Customer health journey testimonials with specific, measurable outcomes
      - Behind-the-scenes sourcing content — farm visits, supplier stories, testing lab footage
    credibility_signals:
      - Third-party certifications from recognized bodies (USDA, Non-GMO Project, NSF, Informed Sport)
      - Third-party testing certificates available on the product page
      - Founder or formulator credentials that are verifiable and relevant
      - Editorial coverage in health and wellness publications with genuine editorial standards
      - Community of health practitioners (registered dietitians, doctors) who recommend the product
      - Long-term customer testimonials with specific health outcomes and context
    credibility_killers:
      - '"Natural" claim without supporting certification or ingredient specificity'
      - Aspirational lifestyle imagery that substitutes for product proof
      - Health claims that are not supported by cited research
      - Proprietary blends that obscure ingredient quantities
      - Influencer partnerships with mass-market creators who are not wellness-credentialed
      - Greenwashing exposed in any community discussion

examples:
  - scenario: Writing product page copy for a new DTC protein powder targeting health-conscious consumers in a crowded market
    without_archetype: |
      "Clean protein for the health-conscious. Our premium protein blend supports muscle
      recovery and performance. Made with natural ingredients. 25g protein per serving.
      Free from artificial sweeteners. Join thousands of satisfied customers."
    with_archetype: |
      Lead with the ingredient story, not the benefit claim. "What's in it — and what isn't."
      Then: full ingredient list with a one-sentence explanation of why each ingredient
      was chosen and where it was sourced. "Grass-fed whey from New Zealand pasture-raised
      cows (Certified Grass-Fed by AGA, no added hormones or antibiotics). Organic cocoa
      from a Fair Trade cooperative in Peru — not 'natural cocoa flavoring.' Coconut sugar,
      not maltodextrin." Third-party testing results linked: "Every batch tested for heavy
      metals, microbials, and potency. View the latest Certificate of Analysis." Certifications
      with logos and links to certifying bodies. Customer testimonials that mention specific
      health goals and ingredient standards: "I've tried seven protein powders trying to
      find one without sucralose — this is the one." Generic benefit claims ("supports
      muscle recovery") are table stakes; ingredient transparency is the differentiator.

  - scenario: Building an email retention program for a clean supplement brand with strong first-purchase metrics but weak 90-day repeat rate
    without_archetype: |
      Post-purchase sequence: thank you email at day 1, product tips at day 7, discount
      offer at day 30, loyalty program invitation at day 45. Send a monthly newsletter
      with promotions and new product launches.
    with_archetype: |
      The retention gap in health categories is almost never about price — it is about
      habit formation and ongoing education. This archetype bought because they wanted a
      health outcome; the retention strategy should serve that goal. Day 3: a usage guide
      written as a health educator would write it — how to integrate this supplement into
      their routine, what to stack it with, and what to expect in the first 30 days.
      Day 14: a founder email about why a specific sourcing decision was made ("why we
      chose certified grass-fed over conventional whey — the research behind it"). This
      deepens the identity investment and gives the consumer something worth sharing in
      their wellness community. Day 28: a check-in — "how are you feeling?" — with a
      link to a community discussion thread and a simple reorder prompt. Month 2 onward:
      monthly education emails that teach something genuinely useful about the health
      category, using the brand's product as context but not as the sole subject. Discounts
      at day 30 attract the wrong repeat buyer; education at day 14 creates a health-informed
      advocate who recommends the brand to their community.
