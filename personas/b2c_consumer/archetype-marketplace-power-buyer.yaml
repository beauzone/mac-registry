metadata:
  id: archetype-marketplace-power-buyer
  version: "1.0.0"
  display_name: "Marketplace Power Buyer"
  domain: consumer-archetype
  archetype_type: generic
  description: >
    Load when developing strategy for any brand selling on Amazon or other major
    marketplaces. Calibrates listing optimization, review strategy, brand presence
    within the marketplace environment, and the reality that this buyer's primary
    loyalty is to the platform, not to individual brands. Applies to Amazon-first
    and multi-marketplace GTM contexts.
  tags:
    - amazon-prime
    - marketplace-native
    - review-driven
    - convenience-first
    - price-rational
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Marketplace Power Buyer treats Amazon (or a comparable marketplace) as
    their primary discovery engine, search tool, and purchase channel — not just
    a price comparison tool. They are experienced, rational, and increasingly
    price-conscious. Their trust lives with the platform, not with brands, and
    their decision-making is almost entirely mediated through review data. A
    well-optimized listing with strong reviews will outperform a beloved brand
    with a weak marketplace presence every single time for this buyer.
  archetype_summary: |
    The Marketplace Power Buyer treats Amazon (or a comparable marketplace) as
    their primary discovery engine, search tool, and purchase channel — not just
    a price comparison tool. They are experienced, rational, and increasingly
    price-conscious. Their trust lives with the platform, not with brands, and
    their decision-making is almost entirely mediated through review data. A
    well-optimized listing with strong reviews will outperform a beloved brand
    with a weak marketplace presence every single time for this buyer.
  behavioral_description: |
    25% of Americans shop Amazon more than once weekly. The average Prime member
    spends $91.75 per month on the platform. Critically, 56% of consumers begin
    product searches on Amazon — not Google, not a brand website. This means
    Amazon IS the search engine for product discovery for this archetype. Google
    is used secondarily for price comparison or research, but purchase intent
    starts on-platform.

    They are rising rationality shoppers (2025 trend): impulsive buying is
    declining, comparison behavior is increasing. They read reviews thoroughly
    and are sophisticated about fake review detection — both extremely high
    average ratings with no variance (suspicious) and very low volumes (unknown)
    trigger doubt. They want volume AND rating: 93% say reviews impact purchase
    decisions; 71% will not seriously consider a product below 3 stars. Platform
    loyalty (Prime membership) is very high; brand loyalty within the platform
    is low — they will switch brands freely if another listing outperforms on
    reviews and delivery.

purchase_behavior:
  purchase_triggers:
    - Strong review volume with a credible rating distribution (4.2–4.7 stars optimal)
    - Prime eligible shipping speed available for the needed delivery window
    - '"Amazon''s Choice" or "Best Seller" badge in the category'
    - Price advantage over a comparable product (comparison is one scroll away)
    - Subscribe & Save available for recurring-need categories
    - High-quality listing with A+ content that answers all comparison questions
    - Previous purchase of a brand creates a reorder path in purchase history
  trust_signals:
    - Review count exceeding 100 with a normal distribution of ratings (some 1s and 2s)
    - Real user photos and videos uploaded in reviews showing actual use
    - Verified purchase badge on the majority of reviews
    - '"Amazon''s Choice" category badge'
    - Fast Prime shipping prominently shown on listing
    - Easy return policy confirmed in listing details
    - Responsive Q&A section with manufacturer answers
  red_flags:
    - All-5-star reviews with no rating variance — obvious fake review signal
    - Review count below 10 for a product competing in an established category
    - Product photos that do not match review photos or stated specifications
    - Unclear or complex return process
    - Shipping not Prime-eligible when competitors offer it
    - Seller account with poor account health or questions in Q&A unanswered
    - Product description inconsistencies across title, bullets, and A+ content
  decision_speed: fast
  decision_speed_notes: |
    Decision speed is fast to very fast for categories they regularly shop. The
    marketplace environment is engineered for rapid comparison and immediate
    checkout. They slow down for high-ticket items and for categories with safety
    implications (health, children's products). Subscribe & Save converts
    repurchase from a decision into an automated behavior entirely.

media_consumption:
  primary_channels:
    - channel: Amazon search
      role: Primary discovery, comparison, and purchase — all in one environment
    - channel: Google
      role: Price comparison, external reviews, category research for high-consideration items
    - channel: YouTube
      role: Product review and comparison videos for high-ticket or technical products
    - channel: Reddit (r/BuyItForLife, category subreddits)
      role: Durable goods and repeat-purchase category recommendations
    - channel: Email (Amazon order history and recommendations)
      role: Repurchase reminders and new product discovery from known categories
  discovery_path: |
    Amazon search is the dominant entry point. They type a category or problem
    term (not a brand name) and evaluate the top 5–10 organic results by
    thumbnail photo, star rating, review count, and Prime badge — before reading
    a single word of the listing title. A great photo with strong social proof
    indicators wins the click. Google drives secondary traffic for review research
    on specific products they already found on Amazon.
  research_behavior: |
    After clicking a listing, they scroll to reviews first — not to product
    description. They filter by "most critical" to understand the failure modes
    before reading positive reviews. Real user photo reviews carry disproportionate
    weight: a photo showing the actual product in use resolves more doubt than
    fifty text reviews. Q&A section serves as a FAQ for specific unresolved
    questions. For high-ticket items they may open 3–5 competing listings
    simultaneously and compare by reading the critical reviews of each.

price_sensitivity:
  level: moderate
  notes: |
    Price sensitivity has increased as of 2025 — value-rational behavior is
    replacing impulsive marketplace buying. This archetype will pay a modest
    premium for a meaningfully better-reviewed product, but the premium tolerance
    is roughly 10–20% before comparison shopping wins. Subscribe & Save discounts
    (typically 5–15%) are highly effective in recurring-need categories because
    they simultaneously reduce price and eliminate the friction of reordering.
  premium_justifiers:
    - Substantially higher review quality and volume than the price alternative
    - '"Amazon''s Choice" or Best Seller badge signaling platform-endorsed quality'
    - Subscribe & Save availability that packages the premium into convenience
    - A+ content that makes the listing visibly more trustworthy and informative
    - Demonstrably faster shipping or better return policy

loyalty_patterns:
  brand_loyalty: low
  platform_loyalty: very_high
  loyalty_drivers:
    - Subscribe & Save auto-replenishment removes brand from consideration entirely
    - Previous positive experience creates a reorder path in purchase history
    - Brand storefront that surfaces additional relevant products after first purchase
    - Amazon post-purchase emails that invite review and maintain brand touchpoint
  switching_triggers:
    - A competing listing achieves better reviews at the same price point
    - Stock-out on a Subscribe & Save item triggers a one-time competitor trial
    - Price increase without corresponding improvement in listing quality
    - Negative review experience that the brand does not address publicly

calibration:
  messaging:
    resonate_with:
      - Concrete features and specifications — they comparison shop and need data
      - 'Social proof with volume: "4.6 stars from 3,200+ reviews" beats any brand claim'
      - Shipping speed and reliability — set this expectation early in title or badge
      - Return policy confidence stated plainly, not buried in listing details
      - Subscribe & Save framing for recurring categories
    avoid:
      - Brand story or values-led messaging as the primary listing hook
      - Vague benefit language ("best quality") without evidence
      - Listing content that requires reading to get to the key specs
      - Ignoring or responding defensively to negative reviews publicly
      - A+ content that is entirely brand-forward and fails to answer purchase questions
    tone: Direct, informative, and specification-forward. Social proof volume signals quality. Clarity beats eloquence — every word in a listing must earn its place.

  conversion:
    high_impact_tactics:
      - Review velocity program — getting early verified reviews is the single highest-leverage listing action
      - A+ content that answers the top 5 comparison questions before they are asked
      - Competitive price matching within a narrow band of top-reviewed competitors
      - Subscribe & Save enrollment available and promoted in bullet points
      - Q&A section proactively seeded with answers to common objections
    friction_points:
      - Being out of stock during high-demand periods (ranking and review velocity both suffer)
      - Listing content that requires cross-referencing an external site for key specs
      - Photos that do not represent the actual product or scale accurately
      - Seller-fulfilled shipping when FBA competitors exist in the same category
    urgency_triggers:
      - Lightning Deal or limited-time price promotion visible in search results
      - '"Only 4 left in stock" for genuinely low-inventory items (accurate, not manufactured)'
      - Subscribe & Save with delivery timing matching their replenishment cycle

  content:
    preferred_formats:
      - Main listing image optimized for thumbnail clarity at mobile resolution
      - Secondary images showing product in use at realistic scale with real people
      - A+ content comparison module against category-relevant use cases
      - Video demo showing product in realistic use (not studio setting)
      - Q&A section answers written in plain language, not marketing copy
    credibility_signals:
      - Review count and rating prominently displayed (the first thing they see)
      - Real user photo reviews uploaded in the review section
      - '"Amazon''s Choice" or "Best Seller" badge earned through legitimate optimization'
      - Brand response to critical reviews that is constructive and non-defensive
    credibility_killers:
      - All-positive review distribution with no 1- or 2-star reviews
      - Reviews that all use identical or templated language
      - Product photos that do not match the actual product received
      - Q&A questions that have gone unanswered for weeks or months

examples:
  - scenario: Launching a new reusable water bottle on Amazon against established competitors
    without_archetype: |
      Write strong listing copy emphasizing your product's premium materials,
      unique design, and lifetime warranty. Invest in beautiful lifestyle photos.
      Run Amazon ads to drive traffic. Encourage early buyers to leave reviews.
    with_archetype: |
      Beautiful lifestyle photos will not convert a Marketplace Power Buyer who
      sorts by "Avg. Customer Review" and will not click a listing with fewer
      than 50 reviews regardless of the photography quality.
      Priority one before launch: a structured early review program (Vine,
      followed by verified purchase outreach to initial buyers). You need 50+
      reviews before paid ads will convert efficiently — traffic without social
      proof is wasted spend for this archetype.
      The listing title should front-load the two metrics they compare first:
      material and ounces. "32oz Insulated Water Bottle, Stainless Steel, Keeps
      Cold 24hrs" will outperform a brand-first title like "HYDRA Pro Bottle."
      In bullet points, answer the top-5 pre-purchase questions you see in
      competitor Q&A sections — dishwasher safe, lid leak-proof, fits standard
      cup holders. Surface the lifetime warranty in bullet 1, not buried in A+.

  - scenario: A brand already selling on Amazon wants to improve repeat purchase rate
    without_archetype: |
      Build brand loyalty through email marketing. Create a post-purchase
      email series highlighting your brand story and other products in your
      line. Consider starting a loyalty rewards program.
    with_archetype: |
      Marketplace Power Buyers have their email managed by Amazon, not your
      brand. Post-purchase email sequences via Amazon's Buyer-Seller Messaging
      have strict limitations and low open rates. Brand loyalty is low for this
      archetype by definition — they will reorder the platform's recommended
      alternative if it surfaces before yours.
      The highest-leverage repeat purchase mechanic is Subscribe & Save enrollment
      at the moment of first purchase — remove the repurchase decision entirely.
      Make the S&S option visible in bullet point copy and the A+ module, not
      just in the cart. Second lever: build a brand storefront with cross-sell
      bundles, so that buyers who land on your top SKU see your full line before
      leaving. For buyers who have reviewed you positively, Amazon Attribution
      links can drive them to your owned DTC channel where email capture and
      loyalty programs become viable — but this is a secondary goal, not a
      primary one for this archetype.
