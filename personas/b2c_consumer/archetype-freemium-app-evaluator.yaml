metadata:
  id: archetype-freemium-app-evaluator
  version: "1.0.0"
  display_name: "Freemium App Evaluator"
  domain: consumer-archetype
  archetype_type: consumer-saas-apps
  description: >
    Load when targeting users on a free tier or trial who have not yet converted
    to paid. Calibrates upgrade messaging, paywall design, and onboarding strategy
    for a user whose primary psychological levers are loss aversion and sunk-cost
    investment — not feature excitement. Critical for any consumer app or SaaS
    product with a freemium or free-trial acquisition model.
  tags:
    - freemium-user
    - app-evaluator
    - trial-user
    - feature-seeker
    - conversion-resistant
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Freemium App Evaluator is a systematic, deliberate assessor who treats
    free tiers and trials as a risk-mitigation tool before committing real money.
    They are not lazy or uncommitted — they are applying rational consumer behavior
    to a world saturated with subscription products competing for their wallet.
    The paradox for marketers is that this user's most powerful conversion
    trigger is not feature excitement; it is the pain of losing access to work
    or data they have already invested in building.
  archetype_summary: |
    The Freemium App Evaluator is a systematic, deliberate assessor who treats
    free tiers and trials as a risk-mitigation tool before committing real money.
    They are not lazy or uncommitted — they are applying rational consumer behavior
    to a world saturated with subscription products competing for their wallet.
    The paradox for marketers is that this user's most powerful conversion
    trigger is not feature excitement; it is the pain of losing access to work
    or data they have already invested in building.
  behavioral_description: |
    Free trial models convert 5–20%; freemium models typically convert only 2–5%.
    This user evaluates a product on three unconscious criteria: Does this replace
    something I'm currently paying for? Does it solve a problem I have right now?
    How long until I get real value? If none of these questions answer yes quickly,
    they remain on the free tier indefinitely or churn silently.

    Loss aversion is the primary psychological lever — the pain of losing access
    to features already used exceeds the pleasure of gaining a full feature set.
    Sunk-cost effects compound this: once they have invested time creating data,
    workflows, or content inside the product, the switching cost becomes real even
    on the free tier. The choice paradox (Iyengar and Lepper) applies directly:
    presenting 2 upgrade options converts significantly better than presenting 4+.
    Price sensitivity is high during evaluation and drops sharply after they have
    committed data and workflow. Long-term loyalty is high once converted — data
    lock-in and workflow integration create durable retention.

purchase_behavior:
  purchase_triggers:
    - Hitting a natural free-tier limit that creates real friction in an active workflow
    - Countdown reaching zero on a time-limited trial with invested data visible
    - Receiving a personalized message showing exactly how much they have already done
    - A specific paid feature becomes the blocker to completing a task they need done today
    - Team collaboration need requires a paid seat (peer invitation creates urgency)
    - Price anchoring comparison showing paid tier cost vs. what they currently pay elsewhere
  trust_signals:
    - Free tier that delivers genuine, uncrippled value before any paywall
    - Transparent pricing with no hidden tiers or unexpected charges
    - No credit card required at signup — removes commitment anxiety entirely
    - Easy downgrade or cancellation path communicated proactively
    - Responsive support even for free-tier users (signals they are valued)
    - Reviews from credible sources (G2, Product Hunt, Reddit) showing real upgrade experience
  red_flags:
    - Free tier that feels like a bait-and-switch crippling every core feature
    - Forced credit card at trial start before any value is delivered
    - Feature removal without warning between free and paid tier
    - Aggressive or interruptive upsell prompts during active free-tier usage
    - Upgrade CTAs that appear before the user has experienced the core value
    - Overwhelming number of plan tiers that paralyze comparison
  decision_speed: slow
  decision_speed_notes: |
    Free-to-paid conversion typically takes weeks to months. Users often remain
    at the limit of the free tier for weeks before converting — the friction must
    become genuinely painful, not merely inconvenient. Time-limited trials that
    communicate a hard end date create urgency that can compress the timeline
    significantly, especially when paired with a visible investment counter ("you
    have created 47 items this trial"). Impulse-driven upgrades during active
    usage sessions are possible but uncommon without a clear trigger event.

media_consumption:
  primary_channels:
    - channel: App Store / Google Play
      role: Primary discovery for mobile apps; featured charts and search drive downloads
    - channel: Product Hunt
      role: Early adopter discovery; peer validation for productivity and utility apps
    - channel: G2 / Capterra / Trustpilot
      role: Pre-upgrade research; reading verified reviews before committing to paid
    - channel: Reddit (r/productivity, category-specific subreddits)
      role: Unfiltered peer opinion; community validation of whether upgrade is worth it
    - channel: YouTube
      role: App walkthrough and comparison videos for considered upgrades
    - channel: Professional peer recommendations
      role: Highest-trust channel; a trusted colleague using the paid tier drives conversion
  discovery_path: |
    Most commonly discovers via App Store featured placement, Product Hunt launch
    day, or a peer mention in a professional context. May also discover via a
    Reddit thread recommending alternatives to a product they are currently paying
    for. Organic search for "[problem] app" or "[competitor] alternative" drives
    significant installs.
  research_behavior: |
    Downloads freely when there is no credit card barrier. Explores the free tier
    independently, rarely engaging with onboarding prompts. Before upgrading, they
    read G2 or Capterra reviews specifically looking for mentions of the upgrade
    experience — was it worth it, were there unexpected limits, was cancellation
    easy. They often post in Reddit asking "is [app] premium worth it?" before
    committing. YouTube walkthroughs of the paid tier feature set are common
    research behavior for higher price points.

price_sensitivity:
  level: high
  notes: |
    Price sensitivity is highest during the evaluation period and drops
    meaningfully after data investment and workflow adoption. The key insight is
    that the price point matters less than the perceived fairness of the value
    ladder. A $12/month plan feels unreasonable if the free tier was crippled
    and trust is damaged; the same plan feels reasonable if the free tier
    delivered real value and the paid tier removes a specific, felt friction.
  premium_justifiers:
    - Paid tier removes a specific workflow blocker they are actively experiencing
    - Data or work already invested creates real switching cost
    - Team collaboration features that require a paid seat to unlock shared value
    - Clear cost comparison: paid tier cheaper than the tool it replaces
    - Annual plan pricing that makes the per-month number feel low

loyalty_patterns:
  brand_loyalty: high
  platform_loyalty: high
  loyalty_drivers:
    - Data and workflow lock-in — moving years of data is genuinely costly
    - Product continues improving and communicates changes visibly
    - Support responsiveness confirms they are valued post-conversion
    - Annual billing reduces re-evaluation moments (no monthly cancel temptation)
  switching_triggers:
    - A competitor offers free data export AND a meaningfully better feature set
    - Pricing changes without notice or proportional value increase
    - Product quality degrades or roadmap stalls visibly
    - Security or privacy incident erodes trust in data stewardship

calibration:
  messaging:
    resonate_with:
      - Lead with what the free tier can do — not a feature gate
      - Frame paid as "unlock your work" or "protect your investment" rather than "get features"
      - Show the value ladder clearly — what paid makes possible that free limits
      - Respect their intelligence: they understand freemium and respond to honesty about it
      - Personalized usage data ("you have done X, here is what paid unlocks next")
    avoid:
      - Upgrade prompts before the user has experienced core value
      - Framing that makes the free tier feel inferior or shameful
      - Vague "premium features" language without specifying what they are
      - Artificial urgency not tied to a real trigger event in their usage
      - More than 2–3 plan options presented simultaneously
    tone: Helpful, straightforward, and respectful of their evaluation process. Treats upgrade as a natural next step they will reach, not a sale to close.

  conversion:
    high_impact_tactics:
      - Usage-based trigger emails showing exactly what they have invested
      - Hard limit on free tier that creates genuine workflow friction (not artificial block)
      - One-click upgrade path visible at the exact moment of hitting the limit
      - Trial countdown with invested data count — "your 14-day trial ends Friday; you have built X"
      - Peer-triggered upgrade — teammate invitation that requires a paid seat
    friction_points:
      - Plan comparison page with more than 3 tiers
      - Upgrade flow that requires re-entering payment info mid-session
      - No annual option visible — makes monthly cost feel recurring and cuttable
      - Upgrade wall that blocks access to data already created on free tier
    urgency_triggers:
      - Trial end date with enough notice to act but not so far away that it feels abstract
      - Natural free-tier limit reached during an active high-value session
      - Team feature unlock where a specific colleague is waiting for an invitation

  content:
    preferred_formats:
      - In-app tooltips at the exact moment of hitting a free-tier limit
      - Email sequences triggered by usage milestones (not time-based drip alone)
      - Short comparison video: "what paid unlocks in 60 seconds"
      - G2 review prompts sent to free-tier users who are highly active
      - Case study content showing time saved or workflow improved post-upgrade
    credibility_signals:
      - Verified review counts on G2/Capterra with specific upgrade testimonials
      - Product Hunt ranking and community comments from launch
      - '"No credit card required" prominently displayed on every acquisition surface'
      - Transparent changelog showing active product development
    credibility_killers:
      - Free tier that visibly hobbles core functionality to force upgrade
      - Testimonials that do not mention the free-to-paid journey
      - Pricing page that hides the cancellation policy
      - In-app banners that interrupt active work sessions with upgrade prompts

examples:
  - scenario: Designing the upgrade email sequence for a free-tier writing app
    without_archetype: |
      Send a 3-email welcome series highlighting premium features: unlimited
      documents, AI writing assist, collaboration mode, and advanced templates.
      Add a 20% off coupon for upgrading in the first 30 days. At day 28,
      send a final reminder that the discount expires soon.
    with_archetype: |
      The Freemium App Evaluator ignores feature-list emails until they have
      a personal reason to care. Replace the welcome sequence with a
      usage-triggered sequence instead.
      Trigger 1: User creates their 3rd document (showing investment). Email:
      "You have 2 documents left on the free tier — here is what happens when
      you hit 5 (and how to make sure you never lose access)."
      Trigger 2: User hits the document limit. In-app message immediately,
      showing their 5 saved documents with a one-click upgrade button and the
      message: "Your work is safe. Upgrade to keep going — takes 30 seconds."
      Trigger 3 (48 hours after hitting limit, if no upgrade): Email with
      subject "You built 5 documents — here is what premium unlocks next" with
      a personal usage summary. Two plan options only. No discount — the
      invested work is the conversion lever, not a coupon.

  - scenario: Designing the paywall experience for a free-tier meditation app
    without_archetype: |
      After 7 free days, prompt users to upgrade with a full-screen modal
      showing all premium features. Offer monthly and annual plans. Add a
      countdown timer showing the trial ends in X days. Include a free extension
      offer if they do not convert immediately.
    with_archetype: |
      Full-screen upgrade modals on a meditation app will be perceived as
      jarring and ironically stress-inducing — they conflict with the core
      product promise. Avoid them. Instead, design a soft-gate: free users get
      3 sessions per week indefinitely (real value, not crippled access).
      When they tap a session on a day they have already used all 3, show a
      calm, single-screen message: "You have completed 3 sessions this week.
      Premium removes the limit — your streak and history are saved and waiting."
      Show only 2 options: monthly and annual. Do not show a countdown timer
      on the paywall itself — it conflicts with the calm brand and reads as
      manipulative. Use the countdown in a separate email reminder 2 days
      before their trial ends if they are on a time-limited trial path, where
      it is contextually appropriate.
