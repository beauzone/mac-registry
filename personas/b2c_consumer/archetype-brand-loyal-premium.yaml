metadata:
  id: archetype-brand-loyal-premium
  version: "1.0.0"
  display_name: "Brand-Loyal Premium Buyer"
  domain: consumer-archetype
  archetype_type: generic
  description: >
    The Brand-Loyal Premium Buyer purchases primarily on identity, exclusivity, and emotional
    connection — not price. Once committed to a brand, they repeat with high frequency, actively
    recommend, and serve as organic brand ambassadors. They view heavy discounting as a signal
    of brand weakness. Load this archetype when the brand competes on premium positioning,
    when retention and LTV optimization are priorities, or when messaging and offer design
    risk diluting brand equity by over-indexing on price or mass-market appeal.
  tags:
    - brand-loyal
    - premium-buyer
    - identity-purchase
    - aspirational
    - quality-seeker
    - high-ltv
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Brand-Loyal Premium Buyer chooses brands the way they choose their identity — deliberately,
    with emotional investment, and with a low tolerance for compromise. Higher prices are not a
    deterrent; they are often a signal of belonging to the right category. Once a brand earns
    their trust, this consumer is highly resistant to switching and will actively recruit others.
    They are the highest-LTV consumer segment in most premium categories and also the most
    sensitive to brand dilution, quality decline, or what they perceive as the brand "selling out."
  archetype_summary: |
    The Brand-Loyal Premium Buyer chooses brands the way they choose their identity — deliberately,
    with emotional investment, and with a low tolerance for compromise. Higher prices are not a
    deterrent; they are often a signal of belonging to the right category. Once a brand earns
    their trust, this consumer is highly resistant to switching and will actively recruit others.
    They are the highest-LTV consumer segment in most premium categories and also the most
    sensitive to brand dilution, quality decline, or what they perceive as the brand "selling out."
  behavioral_description: |
    This consumer shops brand-owned channels first — visiting the brand's website directly,
    opening brand emails before generic retail aggregators, and monitoring the brand's social
    channels for new drops. They are not primarily deal-seeking; they are experience-seeking.
    Packaging, unboxing, customer service quality, and post-purchase touchpoints matter to
    them as much as the product itself. They follow brand founders, read brand origin stories,
    and share purchases as identity signals in their social networks. They are deeply skeptical
    of brands that begin discounting heavily or distributing through mass-market channels —
    both are read as signals that the brand is no longer for people like them.

purchase_behavior:
  purchase_triggers:
    - New collection or limited edition drop from a brand already in their repertoire
    - Exclusive early access offer from a brand loyalty program
    - Recommendation from a trusted peer in their aspirational reference group
    - Brand storytelling or founder content that deepens emotional connection
    - Anniversary, milestone, or gifting occasion requiring a trusted brand
    - New product category expansion from a brand they already deeply trust
    - Scarcity signal that is credible and consistent with brand positioning
  trust_signals:
    - Consistent brand aesthetic, voice, and quality over time
    - Premium packaging and unboxing experience
    - Founder or brand leader authenticity and accessibility
    - Social proof from an aspirational peer group (not mass influencers)
    - Craftmanship story with verifiable provenance or origin detail
    - Exclusive or limited availability (reinforces that the brand is not for everyone)
  red_flags:
    - Heavy discounting or outlet sale positioning
    - Quality decline following scale or acquisition
    - Endorsement from a mass-market or misaligned celebrity
    - Distribution through discount retail channels (signals loss of exclusivity)
    - Corporate or formulaic marketing tone that replaces founder voice
    - Overproduction that makes previously exclusive items ubiquitous
  decision_speed: moderate
  decision_speed_notes: |
    Within trusted brands, decisions are relatively fast — browsing a new collection may
    convert same-session or within 48 hours. New-to-brand decisions take longer (1-3 weeks)
    as this consumer validates brand fit through owned channels, reviews, and peer signals
    before making the identity commitment. They do not respond to urgency tactics from
    unfamiliar brands — trust must precede purchase intent.

media_consumption:
  primary_channels:
    - channel: Brand-owned email and app
      role: Primary purchase trigger for existing customers — first destination for new drop awareness
    - channel: Instagram (curated feed and Stories)
      role: Brand aesthetic validation and aspirational community signal; discovery for new brands
    - channel: In-store or brand boutique experience
      role: Sensory validation of brand quality; reinforces premium positioning and identity alignment
    - channel: Word-of-mouth from trusted inner circle
      role: Highest-trust discovery channel; peer recommendation carries more weight than any advertising
    - channel: Premium editorial (Vogue, GQ, Bon Appétit, The New York Times Style)
      role: Legitimacy signal and brand positioning context — being in the right publication confirms the brand belongs in their world
    - channel: Podcast (category-specific, thoughtful, not algorithmically mass-market)
      role: Brand story and values reinforcement; host-read ads perform when host is genuinely credible
  discovery_path: |
    Discovery typically comes through a trusted peer's recommendation or social sharing, a
    prestigious editorial placement, or an in-store encounter with the brand's physical
    presence. Brand advertising alone rarely initiates discovery for this archetype — social
    proof from a credible, aspirational source must validate first. Once discovered, they
    research deeply through brand-owned channels before making the identity commitment of
    a first purchase.
  research_behavior: |
    Visits the brand website and reads the full "Our Story" or founder narrative. Reviews
    the brand's full product range rather than a single item. Looks at Instagram content
    going back 3-6 months to assess brand consistency. May look for founder interviews,
    podcast appearances, or press coverage to validate authenticity. Does not rely heavily
    on aggregate review scores — reads qualitative reviews for insight into brand culture
    and customer community.

price_sensitivity:
  level: low
  notes: |
    Price is largely irrelevant within the range the consumer considers appropriate for the
    category. However, they are acutely sensitive to pricing signals that affect brand
    positioning — a brand that discounts heavily or suddenly drops price tiers sends a
    signal of desperation or commoditization that can end the relationship entirely. The
    risk is not price resistance; it is price-signal erosion. Premium justification should
    emphasize craft, exclusivity, and brand narrative — never price comparison.
  premium_justifiers:
    - Brand prestige and the identity signal the purchase carries
    - Authentic craft story with traceable origin or artisan production
    - Exclusivity — limited availability, waitlists, or member-only access
    - Superior longevity or heirloom-quality positioning
    - Alignment with personal values (sustainability, ethical sourcing, founder mission)
    - Social signaling value within their aspirational reference group

loyalty_patterns:
  brand_loyalty: very_high
  platform_loyalty: low
  loyalty_drivers:
    - Consistent product quality that validates the initial identity commitment
    - Brand voice and aesthetic continuity over time
    - Feeling recognized and valued as a loyal customer (not via generic loyalty points)
    - Exclusive access — first to know, first to buy
    - Brand growth that does not compromise the qualities that attracted them
    - Community of like-minded consumers who reinforce the identity signal
  switching_triggers:
    - Perceptible quality decline (product or experience)
    - Brand over-distributes, making previously exclusive items feel mass-market
    - Heavy discounting signals the brand no longer values its premium positioning
    - A trust-breaking event — brand contradiction, scandal, or perceived "selling out"
    - Discovery of a newer, more exclusive brand that better represents current identity

calibration:
  messaging:
    resonate_with:
      - Brand heritage and origin story told with specific, authentic detail
      - Exclusivity and craft ("made in small batches," "limited to 200 units," "handcrafted")
      - Identity framing — "for people who [value X]" rather than "everyone loves this"
      - Founder voice and personal mission driving the brand
      - '"You discovered us before everyone else" early-adopter recognition'
      - Values alignment — sustainability, ethical sourcing, or community with genuine proof
    avoid:
      - Discount-first messaging or sale promotions as the primary hook
      - Price comparison with competitors (frames the brand as commodity)
      - Mass-market social proof ("over 1 million customers") — scale feels like loss of exclusivity
      - Generic aspirational language without specificity ("the finest quality", "for those who demand more")
      - Urgency tactics borrowed from mass retail ("last chance," "only hours left")
    tone: aspirational and intimate — founder-voice authenticity over brand polish

  conversion:
    high_impact_tactics:
      - Early access or member-first launch for loyalty program members
      - Personalized outreach from the brand or founder at key moments (birthday, anniversary)
      - Product storytelling that gives the consumer something worth sharing with their network
      - Limited edition or capsule release with genuine scarcity and community exclusivity
      - Handwritten note or premium packaging detail that reinforces the brand's attention to craft
      - Loyalty program structured around recognition and access, not points and discounts
    friction_points:
      - Discount prompts immediately after first purchase (devalues what they just bought)
      - Generic email sequences that feel automated and impersonal
      - Poor post-purchase experience (packaging, delivery, customer service) that breaks the premium illusion
      - Being treated identically to a first-time discount buyer
    urgency_triggers:
      - Credible and consistent limited availability (sell-out history supports the claim)
      - Exclusive window for loyalty members before general public access
      - Collaboration or collection that is genuinely time-limited and not repeated

  content:
    preferred_formats:
      - Long-form brand storytelling (founder essay, craft documentary, origin story video)
      - Editorial photography that matches the brand's aesthetic universe
      - Behind-the-scenes content showing production craft or sourcing
      - Community spotlights featuring real customers as identity mirrors
      - Founder-authored email that feels like a personal letter, not a newsletter
    credibility_signals:
      - Editorial coverage in respected category publications
      - Organic use by credible, aspirational public figures (not paid partnerships)
      - Specific provenance or craft detail that can be independently verified
      - Brand consistency across touchpoints — every interaction reflects the same quality standard
      - Community of vocal advocates who share their own content unprompted
    credibility_killers:
      - Obvious paid influencer partnerships with mass-market creators
      - Discount language or promotional urgency in brand content
      - Generic brand copy that could belong to any competitor
      - Visual inconsistency — budget social content alongside premium editorial
      - Celebrity endorsements from outside the brand's credible cultural universe

examples:
  - scenario: Designing a retention email strategy for a premium leather goods brand with strong first-purchase metrics but declining repeat purchase rate
    without_archetype: |
      Send a post-purchase follow-up at day 7 thanking the customer. At day 30, offer 15%
      off their next purchase to drive the repeat buy. At day 60, send a "we miss you" email
      with a larger discount. Build a loyalty points program to incentivize repeat behavior.
    with_archetype: |
      Discount-led retention is actively counterproductive with this archetype — a 15% off
      email at day 30 signals desperation and devalues what the customer paid full price for.
      Instead: Day 7 — send a founder-authored note with care instructions and the story
      of how the piece was made (reinforces the identity purchase, gives them content to
      share). Day 30 — invite them into an early-access tier: "As a [Brand] owner, you'll
      always hear about new pieces before anyone else." Day 60 — a behind-the-scenes
      preview of an upcoming collection, framed as exclusive intelligence, not a sales push.
      The loyalty program should be structured around recognition and access milestones —
      not points that can be redeemed for discounts. Discounts teach this consumer that
      full-price was a mistake.

  - scenario: Evaluating whether to run a sitewide 30% off Black Friday promotion for a premium DTC apparel brand
    without_archetype: |
      Black Friday is the biggest retail moment of the year. Run a 30% off sitewide
      promotion to maximize revenue. Heavy discounting during this window is expected by
      consumers and will drive significant new customer acquisition alongside repeat purchases.
    with_archetype: |
      A sitewide 30% off promotion will attract price-sensitive buyers who are not this
      brand's core archetype — and will signal to existing brand-loyal customers that full
      price was unjustified. The acquisition "win" comes with a high LTV cost: discount-acquired
      customers are unlikely to repurchase at full price, and loyal customers may delay
      future full-price purchases waiting for the next sale. Alternative: run a members-only
      "Founder Archive" sale on prior-season inventory only, available exclusively to
      existing customers 48 hours before any public promotion. This rewards loyalty, moves
      clearance inventory, and preserves full-price positioning for the current collection.
      New customer acquisition should run through a separate editorial-led content program
      that attracts identity-aligned buyers, not coupon hunters.
