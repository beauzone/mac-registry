metadata:
  id: archetype-gen-z-digital-native
  version: "1.0.0"
  display_name: "Gen Z Digital Native"
  domain: consumer-archetype
  archetype_type: dtc-ecommerce
  description: >
    Load when targeting consumers born roughly 1997–2012. Calibrates messaging
    tone, channel mix, creator strategy, and social commerce tactics for an
    audience that is mobile-first, authenticity-obsessed, values-led, and
    capable of completing an entire purchase journey inside a single social app.
  tags:
    - gen-z
    - digital-native
    - mobile-first
    - social-commerce
    - authenticity-driven
    - values-led
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    Gen Z Digital Natives (born ~1997–2012) treat their purchases as identity
    statements — who they buy from reflects who they are. They are the first
    generation to grow up with algorithmic feeds as a primary information source,
    making them simultaneously highly discoverable through social content and
    deeply resistant to anything that reads as corporate or performative. They
    demand proof over promise, and they crowdsource validation before committing
    to any brand.
  archetype_summary: |
    Gen Z Digital Natives (born ~1997–2012) treat their purchases as identity
    statements — who they buy from reflects who they are. They are the first
    generation to grow up with algorithmic feeds as a primary information source,
    making them simultaneously highly discoverable through social content and
    deeply resistant to anything that reads as corporate or performative. They
    demand proof over promise, and they crowdsource validation before committing
    to any brand.
  behavioral_description: |
    96% of Gen Z consumers shop via smartphone at least monthly. Over 60%
    discover brands through social platforms rather than traditional ads, and
    53% have used in-app buy buttons (TikTok Shop, Instagram Checkout). The
    entire discovery-to-purchase loop can close inside a single TikTok session.

    They are sophisticated ad-literacy gatekeepers: 73% can identify undisclosed
    paid sponsorships, and 68% report losing trust in influencers who
    over-promote. They crowdsource opinions via TikTok comments, Reddit threads,
    and peer group chats before buying. Sustainability and social impact are
    genuine purchase filters, not tiebreakers — but they are equally quick to
    call out greenwashing. Brand imperfection and public accountability earn more
    trust than polished perfection. Low-to-moderate brand loyalty — they are
    loyal to values and communities, not specific logos.

purchase_behavior:
  purchase_triggers:
    - A trusted micro-creator demonstrates authentic personal use (not a script)
    - Brand visibly shares values they hold (sustainability, social justice, body diversity)
    - Peer or friend group has already bought and reported back positively
    - A limited-drop or community-exclusive creates genuine scarcity
    - In-feed discovery and frictionless in-app checkout removes all barriers
    - Brand responds publicly and honestly to criticism or a mistake
    - UGC shows real, imperfect use in contexts they recognize
    - Price-value feels fair relative to the values story the brand tells
  trust_signals:
    - Authentic micro-creator content with personal, unscripted commentary
    - Real user photos and videos showing the product in natural settings
    - Sustainability evidence — third-party certifications, supply chain transparency
    - Diverse and non-idealized representation across all visual assets
    - Brand transparency about mistakes, reformulations, or sourcing changes
    - Community engagement — brand responds genuinely in comments
  red_flags:
    - Scripted or obviously sponsored creator content with no personal voice
    - Sustainability claims with no evidence (greenwashing)
    - Corporate polish — stock photos, overly branded aesthetics, perfect-only UGC
    - Brands that claim social values but stay silent on relevant issues
    - Excessive brand promotion flooding creator feeds
    - Defensive or dismissive brand responses to criticism
  decision_speed: fast
  decision_speed_notes: |
    Decision speed is fast when discovery and checkout happen in the same
    social environment (TikTok Shop, Instagram Checkout). It slows considerably
    for higher-ticket items where they seek peer validation across multiple
    channels before committing. Impulse purchasing is common at low price points;
    research loops emerge above roughly $50.

media_consumption:
  primary_channels:
    - channel: TikTok
      role: Primary discovery engine; in-app purchase via TikTok Shop closes the loop
    - channel: Instagram Reels
      role: Secondary discovery; visual brand identity check
    - channel: YouTube
      role: Long-form review and tutorial content for considered purchases
    - channel: Reddit
      role: Pre-purchase validation — honest, unfiltered peer opinion
    - channel: Discord / peer group chats
      role: Trusted inner-circle validation; highest-weight social proof
    - channel: BeReal
      role: Authentic-moment brand touchpoints; emerging channel
  discovery_path: |
    Most commonly triggered by a creator video appearing in the For You Page
    (TikTok) or Reels feed. The algorithm surfaces content based on interest
    signals rather than who they follow, meaning organic reach for authentic
    content remains viable. Discovery can also begin through a peer group chat
    share or a Reddit thread surfaced via Google search.
  research_behavior: |
    After initial discovery, they open the comment section first — reading
    unfiltered reactions before watching the full video. They cross-reference
    on Reddit or ask in Discord communities. For larger purchases they search
    YouTube for honest reviews. They rarely read brand websites as a primary
    research tool; instead they use Google to find independent opinions about
    the brand or product.

price_sensitivity:
  level: moderate
  notes: |
    Gen Z consumers are value-rational rather than simply price-sensitive. They
    will pay a meaningful premium for brands whose values align with their own,
    but they are also deal-literate and comfortable comparison shopping instantly
    on mobile. The premium tolerance is real but must be earned with visible proof
    — not just a values statement on the about page.
  premium_justifiers:
    - Transparent and verified sustainability practices (certifications, supply chain data)
    - Community belonging and cultural cachet with their peer group
    - Limited availability or exclusive community access
    - Ethical production verified by third parties, not just brand claims
    - Brand donates meaningfully to causes they care about with documented impact

loyalty_patterns:
  brand_loyalty: low
  platform_loyalty: moderate
  loyalty_drivers:
    - Brand consistently acts in alignment with stated values over time
    - Active and genuine community — brand treats customers as collaborators
    - Ongoing creator content they authentically follow (not just sponsored drops)
    - Subscription or loyalty program that rewards community participation
  switching_triggers:
    - Brand publicly contradicts stated values (hypocrisy exposure goes viral)
    - A better-aligned competitor emerges and gets peer validation
    - Influencer over-saturation makes the brand feel mainstream and corporate
    - Brand ignores or dismisses community criticism

calibration:
  messaging:
    resonate_with:
      - Values and mission framed with real evidence, not aspiration
      - Community belonging — "you're one of us, not one of our customers"
      - Real user stories and imperfect moments over brand-produced perfection
      - Transparency about the product, process, and even limitations
      - Social and environmental impact shown through data and action
    avoid:
      - Corporate or polished brand voice with no personality
      - Unsupported sustainability or ethics claims
      - Heavy use of macro-celebrities or heavily sponsored influencers
      - Demographic-targeting language that feels like market research ("Gen Z loves...")
      - Urgency tactics that feel manipulative rather than genuine scarcity
    tone: Conversational, unpolished, honest, occasionally self-aware and humorous. Values-forward without being preachy. Treats the audience as peers.

  conversion:
    high_impact_tactics:
      - In-app social checkout eliminating all redirect friction
      - Authentic micro-creator content (10K–200K followers) with personal product use
      - Comment-section engagement that demonstrates brand humanity
      - Social proof from peers or recognizable community members at point of purchase
      - Limited drops with genuine scarcity communicated transparently
    friction_points:
      - Redirect out of social app to an external website
      - Forced account creation before purchase
      - Generic or obviously templated creator content
      - Any checkout flow requiring more than 3 steps on mobile
    urgency_triggers:
      - Genuine limited production runs communicated with supply chain honesty
      - Community-exclusive early access tied to participation, not just email sign-up
      - Creator-exclusive drops where the creator's own community gets first access

  content:
    preferred_formats:
      - Short-form vertical video (TikTok, Reels) — authentic, unscripted
      - UGC photos in real-life settings, not studio photography
      - Comment-section conversation as a brand channel
      - Reddit AMA or transparent brand thread
      - Behind-the-scenes content — factory floor, founder reality, supply chain
    credibility_signals:
      - Third-party certifications visible and linkable (B Corp, Fair Trade, etc.)
      - Creator content that mentions the product without prompting (organic seeding)
      - High comment engagement with genuine reactions (not just fire emojis)
      - Brand account that responds in comments like a person, not a social media manager
    credibility_killers:
      - Hashtag campaigns that feel corporate-manufactured
      - Perfectly lit studio UGC that is obviously brand-directed
      - Sustainability badge on website with no supporting evidence
      - Creator who posts sponsored content multiple times per week

examples:
  - scenario: Choosing a creator strategy for a new sustainable clothing drop
    without_archetype: |
      Partner with an influencer who has strong reach in your target demographic.
      Provide them with the product and key talking points about your sustainability
      story. Brief them to post a high-quality unboxing video and outfit shot. Use
      a discount code to track conversions.
    with_archetype: |
      Avoid macro-influencers for this cohort — 68% lose trust in creators who
      over-promote. Instead, seed the product to 15–20 micro-creators (10K–200K
      followers) who already post about sustainable fashion authentically. Give
      them zero talking points; send a brief brand background they can read
      organically. Ask only for honest reaction. Do not require disclosure language
      beyond the legal minimum — scripted disclosures read as inauthentic.
      Enable TikTok Shop so any creator content that gains traction closes
      directly in-app. Expect 2–4 of the 20 seedlings to generate meaningful
      organic reach; amplify those with paid whitelisting, not new scripted content.

  - scenario: Writing the product detail page for a $68 organic cotton tee
    without_archetype: |
      Lead with product features: 100% organic cotton, available in 12 colors,
      machine washable, ethically made. Include size guide. Add customer reviews
      section. Use high-quality lifestyle photos. Create urgency with "selling fast"
      badge.
    with_archetype: |
      Gen Z will not land on a product page as their primary touchpoint — they
      will arrive from a TikTok or Instagram link already warm. The page must
      validate what they saw, not re-sell them. Lead with the supply chain story
      in 2 sentences with a link to your factory audit. Show real user photos
      (non-studio) before brand photos. Surface 1–2 reviews that mention values
      alignment ("finally a brand that actually..."), not just fit. Kill the
      "selling fast" badge — it reads as manipulative to an audience trained on
      digital scarcity theater. If there is genuine limited stock, state the
      actual number available.
