metadata:
  id: archetype-privacy-conscious
  version: "1.0.0"
  display_name: "Privacy-Conscious Digital Consumer"
  domain: consumer-archetype
  archetype_type: generic
  description: >
    The Privacy-Conscious Digital Consumer is a high-trust, high-abandonment archetype who
    treats data collection as a transaction requiring informed consent. They use ad blockers,
    reject cookies by default, limit app permissions, and conduct light research on a company's
    data practices before purchasing. They are slow to convert but extremely loyal once trust
    is established. Load this archetype when designing checkout flows, data collection practices,
    cookie consent UX, acquisition strategy, or any product touchpoint where data collection
    or retargeting is involved. Critical for brands in healthcare, fintech, security, parenting,
    or any category with elevated data sensitivity.
  tags:
    - privacy-conscious
    - data-skeptic
    - ad-blocker-user
    - trust-driven
    - GDPR-aware
    - high-trust-loyalty
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Privacy-Conscious Digital Consumer views every online interaction through the lens of
    data exposure. Only 47% of consumers trust online services to protect their data, and this
    archetype sits firmly in the skeptical majority. They have read a privacy policy. They have
    rejected cookies on purpose, not just because a banner appeared. They notice when retargeting
    ads follow them across platforms and find it intrusive rather than convenient. Once a brand
    earns their trust, however, they show exceptional loyalty — they do not switch lightly from
    a brand that has demonstrated it handles data responsibly.
  archetype_summary: |
    The Privacy-Conscious Digital Consumer views every online interaction through the lens of
    data exposure. Only 47% of consumers trust online services to protect their data, and this
    archetype sits firmly in the skeptical majority. They have read a privacy policy. They have
    rejected cookies on purpose, not just because a banner appeared. They notice when retargeting
    ads follow them across platforms and find it intrusive rather than convenient. Once a brand
    earns their trust, however, they show exceptional loyalty — they do not switch lightly from
    a brand that has demonstrated it handles data responsibly.
  behavioral_description: |
    This consumer has an ad blocker installed and active. They reject third-party cookies
    on first encounter with any consent banner and feel mild satisfaction in doing so.
    They use browser settings or extensions to limit tracking (Firefox with uBlock Origin,
    Safari Intelligent Tracking Prevention, or similar). When encountering a new brand, they
    are more likely to Google "[brand] data privacy" or check the company's data practices
    than the average consumer. The FTC's annual breach report is not news to them. Fewer
    than 48% of consumers in 2026 believe digital service benefits outweigh privacy concerns —
    down from 58% in 2024 — and this trend is moving in the direction of this archetype's
    worldview. They have 81% purchase probability tied explicitly to trust as a precondition.

purchase_behavior:
  purchase_triggers:
    - Brand that explicitly leads with privacy-respecting practices as a differentiator
    - Guest checkout available with no account creation required
    - Minimal data collection requested — only what is necessary for the transaction
    - Privacy certification or independent audit signal visible at purchase point
    - Trusted recommendation from a privacy-aware community or publication
    - Company demonstrates transparency about data use in plain language
    - A clear explanation of exactly what data is collected and why
  trust_signals:
    - Guest checkout option prominently visible at cart level
    - No mandatory account creation before purchase
    - Cookie consent that defaults to essential-only with clear controls
    - Privacy policy written in plain language with no legal obfuscation
    - '"We don''t sell your data" claim with specificity (to whom, ever)'
    - Privacy-focused certifications or third-party audits
    - Minimal form fields — asking only for what is needed to complete the order
  red_flags:
    - Mandatory account creation before seeing final price or completing checkout
    - Cookie consent banner that defaults to all-accepted and requires multi-step opt-out
    - Retargeting ads appearing across platforms after a single site visit — signals aggressive tracking
    - Privacy policy that references data sale or "trusted third party" sharing vaguely
    - Data breach in the company's history that was handled poorly
    - Excessive app permission requests on mobile
    - Pre-checked boxes for marketing opt-in during account creation
  decision_speed: slow
  decision_speed_notes: |
    Decision speed depends heavily on trust establishment. Brands that surface privacy
    signals early in the experience can accelerate significantly — a visible "guest checkout"
    option and minimal data collection reduces deliberation time because the key concern
    is preemptively addressed. Without those signals, this archetype may abandon, research
    the brand's data practices offline, and return days later or not at all. Any privacy
    friction during checkout — mandatory account creation, suspicious form fields — causes
    immediate abandonment that is very difficult to recover.

media_consumption:
  primary_channels:
    - channel: Privacy-focused publications and communities (EFF, Wired, Mozilla blog, r/privacy)
      role: Primary information environment — these publications shape their trust framework for brands
    - channel: RSS feeds and email newsletters (subscribed directly, not algorithm-curated)
      role: Preferred information format — no tracking, no algorithmic manipulation, direct value
    - channel: DuckDuckGo / Brave Search
      role: Primary search engine — actively avoids Google search tracking
    - channel: Reddit (tech, privacy, and category-specific subreddits)
      role: Research and peer validation before purchase — reads real user experiences
    - channel: Trusted tech review sites (Wirecutter, The Markup, Consumer Reports)
      role: Product research without the tracking exposure of brand-owned content
    - channel: Word-of-mouth from privacy-aware peer networks
      role: Highest-trust channel — if someone in their privacy-conscious circle recommends a brand, that carries significant weight
  discovery_path: |
    Discovery rarely happens through paid advertising — ad blockers filter much of it out,
    and retargeting discovery feels intrusive rather than welcome. More commonly: brand
    appears in an editorial review on a trusted tech publication, is discussed in a privacy
    community or subreddit, or is recommended by a peer with similar values. Content
    marketing that appears in organic search (not tracking-heavy ad placements) can work
    if it demonstrates genuine expertise and does not require cookie consent to read.
  research_behavior: |
    Before purchasing from an unfamiliar brand, searches for the brand's privacy policy
    and terms of service. Checks if the brand has been reported in data breach news.
    May search "[brand] sells data" or "[brand] privacy" to surface community discussions.
    Reads the checkout flow before entering payment information to assess what data is
    being collected. May test with a temporary email address or alias service (Apple
    Hide My Email, SimpleLogin) before trusting the brand with their real contact. Will
    abandon immediately if account creation is required before seeing the final price.

price_sensitivity:
  level: moderate
  notes: |
    This archetype will pay a meaningful premium for privacy-respecting alternatives when
    the category has privacy implications — health, finance, communication, parenting tools,
    or any product tied to sensitive personal data. For commodity categories with no data
    exposure risk, price sensitivity is moderate and normal. The premium is specifically
    for trust and data minimization, not product features. Brands competing on price without
    addressing the privacy dimension will lose this consumer to a more expensive privacy-first
    alternative once they discover it.
  premium_justifiers:
    - Verified privacy practices — independent audit, certification, or open-source verification
    - Data minimization commitment — company explicitly collects less than competitors
    - No third-party data sale policy with specific, legally binding language
    - Category with meaningful personal data exposure (health, financial, communication)
    - Brand reputation for handling past security incidents with transparency and speed

loyalty_patterns:
  brand_loyalty: high
  platform_loyalty: high
  loyalty_drivers:
    - Brand consistently honors privacy commitments over time without degradation
    - No data breaches, or if a breach occurred, handled with immediate transparency
    - Brand does not incrementally expand data collection after trust is established
    - Consistent minimal data request — they notice when a brand adds new tracking scripts
    - Privacy-first brand positioning that aligns with their identity and values
    - Excellent customer experience that does not require exposing additional data
  switching_triggers:
    - Data breach — especially if the company's response is delayed, minimizing, or evasive
    - Discovery that the brand sold or shared data contrary to their privacy claims
    - Sudden addition of aggressive tracking, retargeting, or third-party integrations
    - Privacy policy change that expands data use without meaningful consent re-request
    - A competitor brand launches with demonstrably stronger privacy practices in the same category

calibration:
  messaging:
    resonate_with:
      - Transparency as a core brand value — "we only collect what we need to serve you"
      - Specific privacy commitments over vague aspirations ("we never sell your data, period")
      - Data minimization framing — "we built this to work without tracking you"
      - Guest checkout and no-account-required purchase as a featured benefit
      - Privacy certifications or third-party validation of data practices
      - '"You''re in control" data dashboard or preference center with genuine functionality'
    avoid:
      - Vague "we take your privacy seriously" boilerplate without specifics
      - Retargeting ads immediately after a site visit — signals exactly the tracking they distrust
      - Cookie consent banners that make it hard to reject non-essential cookies
      - Aggressive email capture pop-ups early in the browsing session
      - Any language implying data sharing with "partners" without specificity
    tone: transparent and direct — technical honesty earns more trust than marketing polish

  conversion:
    high_impact_tactics:
      - Surface guest checkout as a primary option at cart level — do not bury it
      - Display privacy commitment summary on the checkout page ("We collect: your name, shipping address, and payment info. Nothing else.")
      - Visible privacy badges from recognized third parties (TRUSTe, EFF, ISO 27001)
      - One-page checkout minimizing total form fields
      - Optional account creation post-purchase with clear explanation of benefits, not requirement
      - Transparent email opt-in at checkout with unchecked box and plain-language description
    friction_points:
      - Mandatory account creation at checkout
      - Cookie consent that requires clicking through 3 steps to reject non-essential cookies
      - Form fields requesting data not needed for the transaction (phone number for a shipped product)
      - Retargeting ads appearing on other platforms within 24 hours of a visit
      - Email marketing opt-in pre-checked as default
    urgency_triggers:
      - Privacy-specific product benefit that has a genuine scarcity or time element
      - Data breach in the news from a competitor — moment when privacy differentiation is most salient
      - Annual "privacy audit" season (January, after holiday data collection concerns spike)

  content:
    preferred_formats:
      - Long-form transparency reports (annual privacy reports showing what data was collected and what was not)
      - Technical blog posts explaining how privacy-protective architecture works
      - Plain-language privacy policy summaries written for non-lawyers
      - '"How we compare" privacy feature comparisons against less privacy-conscious competitors'
      - Community forum or open discussion where privacy concerns can be raised publicly
    credibility_signals:
      - Independent third-party privacy audit results made public
      - Open-source code or security practices that can be independently verified
      - Founder or CEO writing personally about privacy values with specifics
      - Acknowledgment of past imperfections and specific improvements made
      - Privacy-aware community endorsement (EFF, Mozilla, r/privacy mention)
    credibility_killers:
      - Boilerplate "we value your privacy" in a footer while running aggressive tracking
      - Privacy policy that requires a law degree to understand
      - Any discovery of data practices that contradict public privacy commitments
      - Participation in ad networks associated with invasive tracking
      - Cookie consent UX designed to steer toward acceptance rather than genuine choice

examples:
  - scenario: Designing a checkout flow for a DTC health supplement brand to improve conversion rate
    without_archetype: |
      Require account creation to enable order tracking and email marketing capture.
      Use exit-intent pop-ups to capture email before checkout. Add a post-checkout upsell
      modal. Pre-check the email marketing opt-in for convenience. Add retargeting pixels
      to recover abandoned carts. Standard 5-step checkout with address, payment, review,
      and confirmation.
    with_archetype: |
      For this archetype, every one of these tactics is a conversion killer. Required account
      creation at checkout triggers immediate abandonment. Pre-checked marketing opt-in is
      read as a dark pattern. Exit-intent pop-ups signal that the site is optimizing against
      their interest. Retargeting will surface on other platforms and confirm their surveillance
      concern. Instead: redesign checkout to lead with guest checkout as the primary option.
      Reduce form fields to the minimum required (name, shipping address, payment — no phone
      number unless required by the carrier). Add a one-line privacy summary next to the
      "Complete Order" button: "We collect your name, shipping address, and payment info.
      We never sell your data or send marketing without your explicit opt-in." Offer account
      creation post-purchase with clear benefit ("save your info for faster checkout next
      time — optional"). This approach converts this archetype; the standard approach does not.

  - scenario: Planning re-engagement email strategy for privacy-conscious consumers who have not purchased in 90 days
    without_archetype: |
      Send a win-back sequence: day 0 "we miss you," day 7 with 10% off, day 14 with
      15% off and urgency language. Use behavioral retargeting to identify lapsed customers
      and serve ads across platforms. Optimize for click-through rate.
    with_archetype: |
      Behavioral retargeting for this archetype is actively counterproductive — it confirms
      the surveillance experience they distrust and will generate unsubscribes rather than
      conversions. Win-back email should be a single, plain-language message with no
      tracking pixel, no behavioral trigger language ("we noticed you haven't visited"),
      and no retargeting coordination. Frame it as a direct communication: "It's been
      a few months. Here's what's new — and here's a reminder that you can reply to
      this email directly if you have questions." Include a one-line privacy reminder:
      "Your email address is not shared with any third parties." The open rate will be
      lower because of ad blockers and privacy email clients (Apple Mail privacy protection
      masks opens), so measure by clicks and conversion, not opens. A/B test
      against a version that leads with a new privacy-forward feature or product improvement —
      this archetype responds to the brand demonstrating ongoing commitment to their values.
