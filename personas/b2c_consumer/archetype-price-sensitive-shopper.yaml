metadata:
  id: archetype-price-sensitive-shopper
  version: "1.0.0"
  display_name: "Price-Sensitive Comparison Shopper"
  domain: consumer-archetype
  archetype_type: generic
  description: >
    The Price-Sensitive Comparison Shopper is a methodical, deal-driven consumer who treats
    every purchase above ~$20 as a research project. They use price-tracking tools, cashback
    platforms, and comparison engines as standard behavior — not occasionally. Load this archetype
    when the target consumer is value-motivated, the category has multiple comparable alternatives,
    or pricing strategy and conversion copy are under review. Highly relevant for mass-market
    retail, commodity categories, and any brand competing on price or value.
  tags:
    - price-sensitive
    - comparison-shopper
    - deal-seeker
    - value-driven
    - coupon-user
    - cashback
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    The Price-Sensitive Comparison Shopper does not buy on impulse — they buy on conviction
    that they got the best available deal. They approach purchases methodically, using tools
    like Honey, CamelCamelCamel, Google Shopping, and Slickdeals as part of their standard
    purchase flow. Price is not merely a factor; it is often the deciding factor, and they
    will delay a purchase for days or weeks to catch a sale or discount code. Brand loyalty
    is weak — they are loyal to savings, not labels.
  archetype_summary: |
    The Price-Sensitive Comparison Shopper does not buy on impulse — they buy on conviction
    that they got the best available deal. They approach purchases methodically, using tools
    like Honey, CamelCamelCamel, Google Shopping, and Slickdeals as part of their standard
    purchase flow. Price is not merely a factor; it is often the deciding factor, and they
    will delay a purchase for days or weeks to catch a sale or discount code. Brand loyalty
    is weak — they are loyal to savings, not labels.
  behavioral_description: |
    This consumer opens multiple browser tabs, uses browser extensions that auto-apply coupon
    codes, sets price drop alerts on Amazon, and follows deal-focused subreddits and forums.
    They read the fine print on "original" vs. sale prices and are quick to flag inflated
    reference prices. Before buying anything above $30, they will compare at least 2-3 retailers.
    They are comfortable waiting — a sale is coming, and they know it. Approximately 66% of
    consumers in this archetype have cut discretionary spending, and 52% opt for store brands
    over name brands. Cashback sites (Rakuten, TopCashback) are frequently checked before
    completing purchase. Free shipping thresholds are optimized — they will add items to cart
    to qualify rather than pay shipping fees.

purchase_behavior:
  purchase_triggers:
    - Sale or promotional event (Black Friday, Prime Day, flash sale)
    - Price drop alert fires from a tracking tool
    - Coupon code discovered via browser extension or deal site
    - Free shipping threshold reached
    - Competitor price clearly lower than current option
    - '"Limited time" offer that genuinely appears to expire (verified, not inflated)'
    - Seasonal clearance on a needed item
    - Positive reviews confirming value relative to price
  trust_signals:
    - Transparent pricing with no hidden fees at checkout
    - Price-match guarantee (explicit and easy to claim)
    - Customer reviews that specifically mention value for money
    - Clear, easy return policy with no restocking fees
    - Visible price history or "lowest price in 30 days" labels
    - Free shipping with clear minimum threshold
  red_flags:
    - Inflated "original" prices that don't match any realistic selling history
    - Hidden fees (shipping, processing, handling) revealed at checkout
    - Subscription auto-enrollment buried in fine print
    - Prices that seem to fluctuate without explanation
    - Complex or high-friction return process
    - Forced account creation before checkout
  decision_speed: slow
  decision_speed_notes: |
    Decisions above $30 typically take 1-7 days as the consumer monitors prices, searches
    for codes, and compares alternatives. For $10-$30 purchases, 1-2 days is common. Below
    $10, speed increases if a coupon or deal is in hand. They are unlikely to be pushed into
    a faster decision by false urgency — they have learned to wait it out and prices usually
    drop. Genuine scarcity (limited inventory confirmed by third parties) can accelerate decisions.

media_consumption:
  primary_channels:
    - channel: Google Shopping
      role: Primary comparison tool — used to scan price across retailers before any purchase
    - channel: Reddit (r/deals, r/frugal, r/buildapcsales, category-specific deal subs)
      role: Community validation and deal discovery; trusted because peers have no sales incentive
    - channel: Slickdeals / DealNews
      role: Curated deal alerts and community-voted offers; high purchase intent when browsing here
    - channel: Email (deal newsletters, retailer promo emails)
      role: Triggers re-engagement on products already on the consideration list
    - channel: YouTube (product review channels)
      role: Value validation before committing to mid-to-high ticket purchases
    - channel: Amazon
      role: Default comparison benchmark and review reference, even when buying elsewhere
  discovery_path: |
    Discovery rarely comes from brand advertising. More commonly: a need arises, a Google search
    starts, Google Shopping surfaces comparative pricing, and the brand enters consideration through
    price rank or review rating. Deal sites and Reddit threads can also surface brands organically
    when a sale or coupon drives discussion. Email re-engagement from a past browse is a meaningful
    trigger if the subject line leads with a specific discount amount.
  research_behavior: |
    Reads 10-20+ reviews on Amazon and the retailer's own site, filtering for reviews that
    mention durability and value rather than just satisfaction. Actively seeks out negative
    reviews to find deal-breakers. Will check a product's price history on CamelCamelCamel
    for Amazon items. Searches for coupon codes before any checkout. May post in Reddit
    communities to ask if a deal is "worth it" before committing.

price_sensitivity:
  level: very_high
  notes: |
    Price is not just a purchase factor — it is a proxy for whether the consumer "won" the
    transaction. They experience genuine satisfaction from getting a deal and discomfort from
    paying full price. Premiums are accepted only when clearly justified by functional
    durability or total cost of ownership (e.g., buying a more expensive item that lasts
    longer saves money over time). Emotional or status-based premium framing does not land.
  premium_justifiers:
    - Significant percentage savings on a product they already intended to buy
    - Price-match guarantee that eliminates the need to shop further
    - Demonstrable durability reducing total cost of ownership ("costs more upfront, but lasts 3x longer")
    - Bundle or multi-pack pricing that reduces per-unit cost
    - Free shipping that makes the total cost competitive with cheaper alternatives including shipping

loyalty_patterns:
  brand_loyalty: low
  platform_loyalty: moderate
  loyalty_drivers:
    - Consistently competitive pricing without the need to hunt for codes
    - Cashback partnerships that make the platform financially rewarding to use repeatedly
    - Transparent pricing and reliable free shipping threshold
    - Excellent return process that eliminates purchase risk
  switching_triggers:
    - A better price found elsewhere, even marginally
    - Hidden fees discovered at checkout
    - Negative experience with returns or customer service
    - A deal alert from a competitor breaks brand habit
    - Price increases not justified by any visible improvement

calibration:
  messaging:
    resonate_with:
      - Specific dollar savings ("Save $24 today")
      - Percentage savings on a known or verifiable original price
      - '"Best price guaranteed" or price-match language'
      - Value framing that connects to total cost of ownership
      - Transparent "here's what you're getting and exactly what it costs" communication
      - Social proof from other value-seeking consumers ("Best deal I found after weeks of searching")
    avoid:
      - FOMO-based urgency without genuine scarcity — they have learned to ignore countdown timers
      - Vague premium quality claims not backed by specifications or proof
      - Inflated "was $X, now $Y" framing with clearly false original prices
      - Aspirational or lifestyle-led messaging that ignores price
      - Brand story or heritage positioning without price relevance
    tone: direct and factual

  conversion:
    high_impact_tactics:
      - Surface price-match guarantee prominently — removes the need to shop further
      - Show total cost at cart level including shipping before final checkout page
      - Auto-apply the best available coupon code at checkout
      - Display "free shipping on orders over $X" with a "you're $Y away" nudge
      - Show price history or "lowest in 30 days" badge on product page
      - Enable guest checkout — account creation is abandonment friction
      - Offer a value comparison table against key competitors
    friction_points:
      - Shipping cost revealed only at final checkout step
      - Mandatory account creation before seeing final price
      - Complex coupon redemption (code not working, exclusions apply)
      - Return policy that requires calling in or paying return shipping
      - Subscription enrollment presented as default opt-in
    urgency_triggers:
      - Confirmed low inventory signal from a trusted inventory display (not fake)
      - Sale end date that is visibly genuine (not rolling countdown)
      - Price drop notification tied to their actual browsing history
      - '"X people have this in their cart" if inventory genuinely constrained'

  content:
    preferred_formats:
      - Comparison tables (product vs. competitors on price and key specs)
      - Value calculator ("how much you save over a year vs. alternative")
      - Customer reviews emphasizing value-for-money
      - Deal roundup emails with specific discount amounts in subject line
      - YouTube review content from independent reviewers (not brand-sponsored)
    credibility_signals:
      - Third-party review sites (Wirecutter, Consumer Reports, CNET)
      - Community discussion and deal validation from Reddit or deal forums
      - Independent YouTube reviewers who are not paid brand partners
      - Price history data confirming a sale is genuine
      - Number of reviews with high volume signaling broad adoption
    credibility_killers:
      - Influencer content that is obviously paid and lacks critical perspective
      - Brand-produced content making value claims without independent verification
      - Countdown timers that reset after expiration
      - '"80% OFF" messaging on products with no credible original price basis'
      - Generic testimonials without specifics on what they paid or compared

examples:
  - scenario: Writing a promotional email for a kitchenware brand running a 25% sitewide sale
    without_archetype: |
      Subject: Big Sale — Up to 25% Off Everything!
      Body: It's sale season! Shop our full collection and enjoy 25% off sitewide. Our premium
      cookware is crafted with the finest materials for the kitchen you've always wanted.
      Don't miss out — sale ends Sunday.
    with_archetype: |
      Subject: 25% off sitewide — your cart total: $67.50 → $50.63 (free shipping included)
      Body: The sale is live. Everything is 25% off — no exclusions, no codes needed. Free
      shipping on all orders automatically applies. Returns are free within 60 days.
      We price-match if you find it cheaper elsewhere — reply to this email.
      [Product name] was $89.99. Today: $67.49. Lowest price we've offered this year.
      Sale ends Sunday at midnight. [Shop now — price applied at cart]
      Note: The archetype-informed version names the exact dollar savings, removes the
      code friction, surfaces the return and price-match policy as purchase enablers, and
      gives a verifiable "lowest price this year" claim rather than generic urgency.

  - scenario: Product page optimization for a $149 cordless vacuum competing with $99 alternatives
    without_archetype: |
      Lead with premium positioning: "Built to last. Engineered for the modern home." Show
      lifestyle photography. Highlight brand story and quality materials. Include reviews.
      Add a "Buy Now" CTA. Trust badges at checkout.
    with_archetype: |
      Reframe the page around total cost of ownership: "$149 vs. $99 — why the math
      actually favors this one." Add a side-by-side comparison table against the two most
      common $99 alternatives — suction power, filter replacement cost per year, warranty
      length, and customer-reported lifespan. Surface the calculation: "At $25/year in
      replacement filters vs. $60/year for the $99 model, this pays for the price difference
      in 2.5 years." Add a price-match guarantee badge, 5-star reviews filtered to those
      that specifically mention value or switching from a cheaper model, and free returns.
      The archetype won't pay more without a rational justification — give them the math.
