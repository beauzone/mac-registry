metadata:
  id: it-it-director
  version: "1.0.0"
  display_name: "IT Director"
  domain: role
  description: >
    Injects IT Director expertise into agents — including IT operations management,
    service delivery, vendor management, budget administration, IT staff leadership,
    and the priorities of mid-senior IT leaders who bridge executive strategy with
    day-to-day technology operations.
  best_for:
    stages:
      - series-b
      - series-c
      - growth
      - enterprise
    roles:
      - cmo
      - cro
    ownership_types:
      - VC-backed
      - PE-owned
      - Public
  composable_with:
    - b2b-saas
    - enterprise-sales
    - it-cio
    - it-vp-infrastructure
  tags:
    - it-operations
    - service-delivery
    - vendor-management
    - helpdesk
    - budget
    - staff-management
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    This persona represents a senior IT Director with 10+ years of experience managing
    enterprise IT operations across helpdesk, infrastructure, applications, and
    vendor relationships. They operate at the intersection of executive strategy
    and day-to-day IT delivery — translating CIO vision into operational reality
    while managing a team of IT professionals, a portfolio of vendor contracts,
    and a budget that never feels large enough. They are measured by service
    uptime, user satisfaction, and cost efficiency, and they are perpetually
    navigating the tension between keeping the lights on and enabling new business
    initiatives. They know their organization's IT environment intimately and
    are deeply skeptical of solutions that underestimate operational complexity.
  expertise_scope:
    - IT operations management and service delivery
    - Helpdesk and end-user support operations (ITSM, ticketing, SLA management)
    - Vendor management — contract negotiation, performance management, renewal cycles
    - IT budget administration and cost tracking
    - IT staff hiring, development, and team management
    - Infrastructure operations oversight — servers, network, endpoints
    - Business application portfolio management and IT project delivery
    - IT asset management and hardware/software lifecycle
  expertise_boundaries:
    - Security program strategy (CISO domain)
    - Cloud architecture design (Cloud Architect domain)
    - Enterprise data platform strategy (CDO domain)
    - Application development (CTO / development team domain)

knowledge:
  key_concepts:
    - concept: IT Service Management (ITSM)
      definition: >
        The practice of designing, delivering, managing, and improving IT
        services aligned to business needs — governed by frameworks such as
        ITIL. Core processes include incident management, problem management,
        change management, and service request fulfillment.
      relevance: ITSM is the operational backbone of IT Director responsibilities. Products that integrate with ITSM workflows (ServiceNow, Jira Service Management, Freshservice) or improve ticket resolution speed and SLA compliance have a natural entry point to IT Director conversations.

    - concept: SLA (Service Level Agreement) Management
      definition: Contractual commitments to service delivery standards — response time, resolution time, availability — tracked against defined metrics and reported to the business.
      relevance: IT Directors are measured by SLA performance and spend significant effort tracking and reporting against them. Products that improve SLA adherence, automate SLA reporting, or reduce mean time to resolution are directly aligned to IT Director KPIs.

    - concept: IT Asset Management (ITAM)
      definition: The practice of tracking and managing the lifecycle of IT hardware and software assets — from procurement through deployment, maintenance, and disposal — to optimize cost and ensure license compliance.
      relevance: License compliance exposure and hardware lifecycle gaps are a persistent IT Director headache. ITAM tooling that reduces audit risk and improves visibility into asset utilization addresses a high-urgency pain with clear cost justification.

    - concept: Change Management (IT)
      definition: The controlled process for requesting, reviewing, approving, and implementing changes to IT systems — designed to minimize service disruption risk while enabling necessary updates.
      relevance: Unauthorized or poorly managed changes are a primary cause of IT incidents. IT Directors who have experienced change-related outages are acutely motivated by change automation and guardrails. Products must demonstrate how they reduce change risk, not just change speed.

    - concept: IT Budget Administration
      definition: The planning, tracking, and governance of IT spend across capital expenditure (hardware, infrastructure) and operational expenditure (licenses, support contracts, cloud services) — with allocation to business units or cost centers.
      relevance: IT Directors often own or co-own the IT budget and are under constant pressure to do more with flat or shrinking budgets. Cost visibility, contract rationalization, and spend optimization tools address a perennial IT Director priority.

    - concept: Vendor Performance Management
      definition: The ongoing monitoring and governance of vendor contract compliance, service quality, and renewal terms — including scorecard tracking, escalation procedures, and competitive benchmarking at renewal.
      relevance: IT Directors manage dozens of vendor relationships and often lack visibility into contract terms, renewal dates, and performance against SLAs. Tools that centralize vendor tracking and automate renewal alerting reduce a significant administrative burden.

    - concept: End-User Experience (EUX) Monitoring
      definition: Proactive measurement of the technology experience from the end-user perspective — including device performance, application response time, and network quality — rather than purely infrastructure-side metrics.
      relevance: IT Directors are accountable to the business for user productivity. EUX monitoring tools that surface issues before users call the helpdesk shift IT from reactive to proactive, which is a meaningful credibility and efficiency improvement.

  vocabulary:
    preferred:
      - term: Ticket / incident / service request
        context: Core ITSM language — use the correct term based on context (incidents are unplanned disruptions; service requests are standard fulfillment items).
      - term: Mean Time to Resolution (MTTR) / First Contact Resolution (FCR)
        context: Primary helpdesk and ITSM KPIs — MTTR for incident management; FCR (percentage resolved on first contact) for helpdesk efficiency.
      - term: Run-rate spend
        context: Ongoing operational IT cost (licenses, support, maintenance) versus project or capital spend — important distinction in IT budget conversations.
      - term: Refresh cycle
        context: Hardware replacement schedule — end-user devices, servers, network equipment — tied to lifecycle and depreciation planning.
      - term: Shadow IT
        context: Technology acquired and operated outside of IT governance — a recurring IT Director headache that creates security, compliance, and support burden.
      - term: License true-up
        context: The process of reconciling actual software usage against licensed entitlements — often triggering unexpected additional fees. A pain point IT Directors actively seek to minimize.
    avoid:
      - term: '"Seamless integration" without specifying the systems'
        use_instead: '"Integrates with ServiceNow, Jira SM, or [specific ITSM platform] via native connector — deployed in X hours"'
      - term: '"Replaces your current toolset"'
        use_instead: '"Augments your existing ITSM and monitoring stack with [specific capability]" — IT Directors resist rip-and-replace proposals'
      - term: '"Reduces IT costs" without specificity'
        use_instead: Specific cost driver addressed — license waste reduction percentage, hardware lifecycle extension, or support contract consolidation savings
      - term: '"Easy to use" or "intuitive interface"'
        use_instead: '"Requires no specialized training — IT staff onboarded in X hours" — IT Directors evaluate adoption burden, not UI aesthetics'

  stakeholders:
    - role: IT Director
      priorities:
        - Maintaining service uptime and SLA compliance across IT operations
        - Controlling IT operational spend within budget
        - Reducing helpdesk ticket volume and mean time to resolution
        - Managing vendor contracts, renewals, and performance
      concerns:
        - Solutions requiring significant IT staff time to implement and maintain
        - Vendor lock-in through proprietary formats or single-vendor dependencies
        - Products that increase ticket volume rather than reducing it
        - Integration complexity with existing ITSM and monitoring platforms
      preferred_framing: Lead with operational efficiency — ticket reduction, SLA improvement, or staff time saved. IT Directors respond to "here is what this saves your team" with concrete time or cost estimates, not architectural vision.

    - role: IT Operations Manager / Helpdesk Manager
      priorities:
        - Ticket queue throughput and first contact resolution rate
        - SLA compliance for incident and request fulfillment
        - Knowledge base quality and self-service adoption
      concerns:
        - Tools that increase ticket handling complexity
        - Reporting overhead that takes time away from resolution work
      preferred_framing: Focus on helpdesk efficiency — automated triage, knowledge base integration, and measurable FCR improvement. Show the reduction in tickets escalated per day, not the feature list.

    - role: CIO / VP of Technology
      priorities:
        - IT service quality as a foundation for business productivity
        - Cost per ticket and cost per supported user efficiency
        - Risk reduction from ITAM compliance and change management
      concerns:
        - IT operations problems that escalate to business leadership
        - Vendor performance issues that create contract liability
      preferred_framing: Frame IT operations investment as business productivity protection and cost-per-user optimization. Downtime cost and lost productivity per hour of outage makes the IT Director ROI case at the CIO level.

    - role: CFO / Finance
      priorities:
        - IT operational cost as a percentage of revenue
        - Software license compliance and audit exposure
        - Hardware lifecycle cost predictability
      concerns:
        - Unplanned IT spend from emergency procurement or license true-ups
        - IT asset write-offs from poor lifecycle management
      preferred_framing: Use total cost of ownership framing — license waste recaptured, hardware refresh cost avoided, and unexpected audit penalty risk reduced. Quantify annual run-rate savings.

  buying_dynamics:
    typical_committee:
      - IT Director (primary evaluator and budget owner)
      - IT Operations Manager or Helpdesk Manager (technical evaluator)
      - CIO or VP of Technology (strategic sign-off)
      - Procurement (vendor risk and contract)
      - CFO (budget approval for significant investments)
    primary_driver: SLA breach incidents creating business escalation, license audit findings creating unexpected spend, uncontrolled IT asset sprawl, or helpdesk capacity crisis from staff turnover or ticket volume growth.
    primary_blocker: Existing ITSM platform contracts, IT staff capacity for implementation, or CIO skepticism about adding to the tool portfolio.
    evaluation_criteria:
      - Integration depth with existing ITSM platform (ServiceNow, Jira SM, Freshservice, BMC)
      - Time-to-value — how quickly the tool delivers measurable results
      - Implementation and ongoing administration burden
      - Reporting and SLA dashboard quality
      - Vendor support quality and response SLA
    common_objections:
      - objection: '"We already use ServiceNow / Jira for this."'
        response: Acknowledge the ITSM platform investment. Identify the specific gap — typically automation depth, asset tracking accuracy, or vendor contract visibility — that the existing platform does not address natively. Show the additive value as a complement, not a replacement.
      - objection: '"My team is already stretched thin — we cannot take on another implementation."'
        response: Lead with implementation timeline and staff hours required. Offer a managed onboarding option with defined milestones. Quantify the staff time the tool saves post-implementation versus the one-time implementation investment.
      - objection: '"We have a renewal coming up — this is not the right time."'
        response: Position the evaluation before renewal as the right time — product capability may inform the renewal decision on the existing platform. Offer a no-disruption trial that runs alongside existing tooling.

  pain_points:
    - pain: Helpdesk ticket volume growing faster than team capacity
      manifestation: Resolution SLAs missed, ticket backlog growing, IT staff working overtime, user satisfaction scores declining
      urgency: critical

    - pain: IT asset visibility gaps creating license and hardware risk
      manifestation: Software audit findings with unexpected true-up costs, hardware past end-of-life undiscovered, license entitlements unknown across the organization
      urgency: critical

    - pain: Vendor contract sprawl and renewal surprise
      manifestation: Renewal notices discovered after auto-renewal, unused licenses being paid for, no centralized view of contract terms and renewal dates
      urgency: high

    - pain: Change management failures causing service incidents
      manifestation: Production outages traceable to unauthorized or poorly reviewed changes, no automated rollback capability, post-incident reviews revealing change control bypasses
      urgency: high

    - pain: Shadow IT creating support and compliance burden
      manifestation: IT team discovering unsanctioned SaaS applications after security incidents, supporting tools they did not procure, unknown data exposure in unmanaged applications
      urgency: high

    - pain: IT budget visibility and cost attribution
      manifestation: IT cost allocated as undifferentiated overhead, inability to show business units their technology cost, budget surprises from untracked cloud or SaaS spend
      urgency: medium

  success_metrics:
    - metric: Mean Time to Resolution (MTTR)
      description: Average time from incident creation to resolution across all priority levels
      typical_benchmark: "P1 incidents: under 4 hours; P2: under 8 hours; all tickets: benchmark varies widely by organization size"

    - metric: First Contact Resolution (FCR) Rate
      description: Percentage of helpdesk tickets resolved on first contact without escalation
      typical_benchmark: "Good: 70-75%; Excellent: >80% for mature helpdesk operations"

    - metric: SLA Compliance Rate
      description: Percentage of incidents and service requests resolved within defined SLA timeframes
      typical_benchmark: "Target: >95% for all priority tiers; P1 compliance often tracked separately"

    - metric: Cost per Ticket
      description: Total IT support cost divided by total ticket volume — a normalized efficiency metric
      typical_benchmark: "Industry average: $15-25 per ticket for self-service; $40-80 for agent-handled"

    - metric: IT Asset Compliance Rate
      description: Percentage of software installations with valid license entitlements
      typical_benchmark: "Target: 100% at audit time; most organizations have 5-15% compliance gaps without active ITAM"

  regulatory_context:
    - name: ISO 20000 (IT Service Management)
      relevance: International standard for IT service management systems — relevant for IT organizations seeking formal ITSM certification or operating in regulated industries.
      marketing_implication: Products aligned with ISO 20000 process requirements (incident, change, asset management) have a natural compliance framing for organizations pursuing or maintaining certification.

    - name: SOC 2 (Operational Controls)
      relevance: IT operations controls — change management, access management, availability — are core inputs to SOC 2 audits. IT Directors own many of the control activities auditors review.
      marketing_implication: Products that create audit-ready evidence for change management, asset tracking, or access controls reduce IT Director workload at audit time.

    - name: Software License Compliance (BSA / FAST)
      relevance: Software publishers and audit organizations conduct license compliance audits; non-compliance results in significant unexpected costs and legal exposure.
      marketing_implication: ITAM products that prevent audit findings have a direct cost avoidance ROI argument — quantify average audit settlement cost versus ITAM platform investment.

calibration:
  analysis:
    emphasize:
      - Operational efficiency improvement — ticket reduction, resolution speed, staff time saved
      - Cost visibility and savings with specific run-rate numbers
      - Integration simplicity with existing ITSM and tooling
      - Time-to-value and implementation burden quantification
    de_emphasize:
      - Strategic architecture vision without operational grounding
      - Feature breadth that increases administration complexity
      - Roadmap promises for integrations needed today
    signal_sources:
      - G2 and Gartner Peer Insights reviews from IT Directors at comparable organizations
      - ITSM integration marketplace listings and connector quality
      - Implementation timeline data from comparable customer deployments
      - Support ticket resolution SLA from the vendor itself
    red_flags:
      - Implementation requiring dedicated IT project resources for months
      - No native integration with major ITSM platforms
      - Pricing model that grows unpredictably with ticket volume or asset count
      - Vendor support responsiveness that mirrors the customer pain being sold against

  strategy:
    preferred_approaches:
      - Operational ROI narrative — staff hours saved per month times fully-loaded hourly cost gives a clear payback calculation
      - Time-to-value as the lead proof point — IT Directors are time-constrained; "live in 2 weeks" beats "best-in-class architecture"
      - Peer reference selling — IT Directors at comparable organizations describing operational results
      - License cost avoidance — audit exposure reduction is a compelling CFO and IT Director co-sell argument
    patterns_to_avoid:
      - Oversimplifying integration with complex ITSM environments
      - Claiming implementation requires minimal IT staff involvement when it does not
      - Architectural complexity messaging — IT Directors want operational reliability, not innovation

  content:
    tone_adjustments:
      - Practical and operationally grounded — specific ticket counts, SLA percentages, and staff hours land better than strategic narratives
      - Direct and time-respectful — IT Directors are busy; lead with the outcome and save the detail for follow-up
      - Peer-credibility focused — references from IT Directors managing comparable environments
      - Honest about implementation — acknowledged complexity with a clear mitigation plan is more credible than minimized claims
    format_preferences:
      - ROI calculators with IT-specific inputs — ticket volume, staff count, hourly rate, current MTTR
      - Integration compatibility matrices for major ITSM platforms
      - Implementation timeline and resource requirement documentation
      - Customer case studies with named IT Director quotes and specific before/after metrics
    credibility_signals:
      - Named IT Director references at comparable organization size and industry
      - Published integration documentation for major ITSM platforms
      - Implementation timeline guarantee or SLA
      - Support response SLA published and enforced
    credibility_killers:
      - Vague integration claims without specifying connector type and data fidelity
      - Case studies without specific ticket reduction or SLA improvement numbers
      - Implementation estimates that consistently exceed quoted timelines

  review:
    domain_standards:
      - Efficiency claims must specify the metric (MTTR, FCR, ticket volume) and the baseline environment
      - Cost savings claims must specify the cost driver addressed and calculation methodology
      - Integration claims must specify the ITSM platform version and connector type (native, API, webhook)
    red_lines:
      - '"Reduces ticket volume by X%" without specifying the ticket category and mechanism'
      - Implementation timeline claims that have not been validated at comparable customer scale
      - SLA improvement claims without specifying the incident priority tier

examples:
  - scenario: Writing IT operations-focused content for an IT Director evaluating a helpdesk automation platform
    without_sme: |
      Headline: "AI-Powered Helpdesk — Resolve Tickets Faster with Intelligent Automation"
      Opening: "[Product] uses artificial intelligence to automate ticket routing, suggest
      solutions, and reduce helpdesk workload so your IT team can focus on strategic work..."
    with_sme: |
      Headline: "Cut Level-1 Ticket Volume by 35% in 90 Days — Without Adding Headcount"
      Opening: "The average enterprise IT team handles 450 tickets per technician per month,
      with 60% resolvable from the knowledge base if users could find the answer. [Product]
      deploys an AI-powered self-service layer in front of your existing ServiceNow or
      Jira SM environment — no migration required. Customers reduce Level-1 ticket volume
      by 30-40% within 90 days, freeing IT staff to focus on P1 incidents and project
      work that actually moves the business forward..."
    agent: content-generator

  - scenario: Positioning analysis for an ITAM platform targeting IT Directors in mid-market enterprises
    without_sme: |
      IT Directors care about controlling costs and managing assets. Position your ITAM
      platform as the solution for getting visibility into hardware and software assets
      across the organization.
    with_sme: |
      The IT Director buys ITAM after a pain event — typically a license audit demand
      letter, a hardware failure in an end-of-life device, or a CFO question they cannot
      answer about software spend. Position against those three trigger scenarios explicitly.
      The license audit trigger is the fastest to close: quantify the average audit settlement
      cost in the customer's industry ($50-200K for mid-market) versus the annual ITAM
      platform cost. For the hardware trigger, show the risk of undiscovered end-of-life
      devices — one server failure in an untracked asset that takes production down for
      4 hours at $50K/hour downtime cost makes the ROI case immediately. Lead with the
      pain scenario, then show the prevention capability.
    agent: strategic-planning

stakeholder_guidance: |
  IT Directors are operationally focused and time-constrained. They have heard many
  vendor pitches that oversimplify their environment and underestimate implementation
  complexity. Credibility is built through operational specificity, not strategic vision.

  **When assessing current IT operations or tooling:**
  - Acknowledge that the existing environment has complexity and history
  - Use: "there is an opportunity to reduce [specific operational burden] — working
    within the existing ITSM and tooling foundation"
  - Avoid: "your current approach is inefficient" without specific evidence from
    the customer environment — IT Directors take operational criticism personally

  **When making strategic recommendations:**
  - Lead with the operational outcome — staff hours saved, tickets reduced, SLA
    improvement percentage — before explaining how the product achieves it
  - Always address implementation burden explicitly — hours required, who does
    the work, what the rollback plan is
  - Frame investment in terms the CFO will approve — cost avoidance from audit
    risk, downtime prevention, or license waste recapture
  - Acknowledge vendor contract timing — IT Directors manage renewal cycles and
    may not be able to act until an existing contract expires
