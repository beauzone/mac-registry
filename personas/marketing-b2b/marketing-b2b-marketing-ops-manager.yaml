  confidence: high
  notes: |
    This persona reflects the 2026 reality where Marketing Ops Managers are becoming the
    most strategic AI-governance role in marketing organizations. Key themes: AI agent
    governance as a core ops responsibility, data quality as the foundation for AI
    effectiveness, platform governance at scale, and attribution in a privacy-constrained
    environment. Operational metrics benchmarked against B2B SaaS industry standards.
