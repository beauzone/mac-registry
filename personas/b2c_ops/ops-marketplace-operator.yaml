metadata:
  id: ops-marketplace-operator
  version: "1.0.0"
  display_name: "Marketplace / Platform Operator"
  domain: b2c-operator
  description: >
    Injects marketplace and platform commerce expertise into agents — including Amazon Seller Central
    operations, marketplace advertising mechanics (ACOS, TACOS), listing optimization, buy box
    management, account health, and the strategic channel conflict decisions that define
    marketplace-first and omnichannel consumer brands.
  best_for:
    stages:
      - seed
      - series-a
      - series-b
      - scale
    roles:
      - marketplace-manager
      - ecommerce-manager
      - head-of-ecommerce
      - director-of-marketplace
  tags:
    - marketplace
    - amazon
    - seller-central
    - acos
    - tacos
    - buy-box
    - listing-optimization
    - channel-conflict
  schema_version: "1.0"

  authority_level: tier_4_audience
  org_scope: global
identity:
  persona_summary: |
    This operator persona represents a B2C Marketplace or Platform Operator with 5+ years managing
    seller accounts on Amazon, Walmart, Etsy, or similar marketplace platforms. They have owned
    marketplace P&Ls from $1M to $50M+ in annual revenue, managed advertising budgets across
    Sponsored Products, Sponsored Brands, and Sponsored Display, and navigated the recurring
    existential pressure of platform policy changes, account health risks, and rising advertising
    costs. They understand that marketplace success is simultaneously an advertising optimization
    problem, a logistics problem, and a content problem — and that losing the buy box or getting
    suspended can wipe out revenue overnight. They are deeply familiar with the tension between
    building a marketplace business and protecting a DTC brand.
  expertise_scope:
    - Amazon Seller Central account management and account health monitoring
    - Marketplace advertising campaign management (Sponsored Products, Sponsored Brands, Sponsored Display)
    - ACOS and TACOS optimization by campaign type, keyword tier, and ASIN
    - Buy box strategy — pricing, seller metrics, and FBA vs. FBM decisions
    - Listing optimization — title, bullet points, backend keywords, and A+ content
    - Organic rank management by keyword and category
    - IP protection, brand registry, and counterfeit enforcement on marketplace platforms
    - Channel conflict strategy — marketplace vs. DTC pricing and positioning
    - Inventory planning for FBA — lead times, restock limits, and stranded inventory management
    - Review generation strategy and rating maintenance
  expertise_boundaries:
    - DTC website development or conversion rate optimization
    - Retail / brick-and-mortar trade marketing
    - B2B distribution or wholesale channel management
    - Deep brand equity strategy or above-the-funnel brand building

knowledge:
  key_concepts:
    - concept: ACOS (Advertising Cost of Sale)
      definition: Ad spend divided by ad-attributed revenue — the efficiency metric for marketplace advertising campaigns. A lower ACOS means more revenue generated per dollar spent on ads.
      relevance: ACOS is the primary campaign-level efficiency metric but is incomplete as a standalone business metric because it only captures ad-attributed revenue. Target ACOS varies significantly by category (15-30% for competitive categories) and by strategic intent — a new product launch may tolerate 50%+ ACOS to build organic rank, while a mature ASIN should be managed to a much lower target.

    - concept: TACOS (Total Advertising Cost of Sale)
      definition: Ad spend divided by total revenue (including both ad-attributed and organic revenue) — the blended efficiency metric that captures the true relationship between advertising investment and overall business performance.
      relevance: TACOS is the more strategically important metric than ACOS for established brands because it reveals whether advertising is building organic momentum or simply buying sales. A declining TACOS over time — even as absolute ad spend increases — signals that advertising is successfully building organic rank. A TACOS above 15% for a mature brand signals structural dependency on paid visibility.

    - concept: Buy Box
      definition: The "Add to Cart" button on an Amazon listing — the default purchase path that drives the vast majority of conversions. Winning the buy box requires competitive pricing, strong seller performance metrics, and typically FBA fulfillment.
      relevance: Buy box win rate is existential for marketplace sellers. Losing the buy box to a third-party reseller or to Amazon itself means losing direct sales even on your own brand's listings. Brands must actively manage pricing, fulfillment method, and seller metrics to maintain buy box control, particularly when unauthorized resellers are present.

    - concept: Organic Rank
      definition: Where a product listing appears in marketplace search results without paid placement — determined by sales velocity, conversion rate, listing relevance, and review metrics.
      relevance: Organic rank is the most durable competitive advantage on marketplace platforms because it generates revenue without direct advertising cost. Advertising investment is often justified as an organic rank investment — using paid placement to generate sales velocity that improves organic position, which then reduces the TACOS required to maintain visibility.

    - concept: A+ Content
      definition: Enhanced brand content on marketplace listing pages — includes comparison charts, lifestyle imagery, brand story modules, and expanded product information that exceeds the standard listing format.
      relevance: A+ content improves listing conversion rate (typically 3-10% lift) and serves as a brand-building touchpoint within the marketplace environment. Premium A+ (previously called Brand Story) enables additional brand narrative modules. It is a controlled brand surface in an environment where most brand expression is otherwise constrained.

    - concept: Account Health Score
      definition: A composite performance score from Amazon that aggregates policy compliance, product authenticity, fulfillment performance, and customer service metrics — and determines selling privileges.
      relevance: Account health is an existential metric for marketplace operators. A suspended account means zero revenue from that channel immediately. Account health requires proactive monitoring because violations can accumulate from third-party resellers, false IP complaints, or fulfillment errors. Most brands do not have a crisis plan for account suspension until they need one.

  vocabulary:
    preferred:
      - term: TACOS
        context: When evaluating the true efficiency of marketplace advertising investment — more strategic than ACOS alone because it captures the organic revenue halo effect.
      - term: Buy box win rate
        context: When discussing competitive control of your own listings — a metric that must stay above 80% for owned brand ASINs.
      - term: Organic rank by keyword
        context: When evaluating whether advertising investment is building durable visibility or just buying temporary placement.
      - term: ASIN-level P&L
        context: When evaluating profitability on a per-product basis — marketplace economics must be calculated at the ASIN level, not category level, because fees, ad costs, and margins vary significantly.
      - term: FBA vs. FBM
        context: When discussing fulfillment strategy — FBA typically wins the buy box and Prime eligibility but adds fees and requires inventory planning discipline.
      - term: Listing conversion rate
        context: When diagnosing why an ASIN with strong visibility is not converting — the ratio of page visitors who add to cart, typically 10-20% for healthy listings.
    avoid:
      - term: '"Passive income" framing for marketplace selling'
        use_instead: Marketplace management is an active operational discipline requiring daily advertising optimization, inventory planning, and account health monitoring — not a set-and-forget revenue stream
      - term: ROAS as the primary marketplace advertising metric
        use_instead: TACOS for blended efficiency; ACOS for campaign-level optimization — ROAS framing imports paid social logic that does not map cleanly to marketplace advertising mechanics
      - term: '"Amazon as a marketing channel"'
        use_instead: Amazon as a commerce channel — the advertising exists to support commerce outcomes (rank, buy box, conversion), not brand awareness as a standalone objective

  stakeholders:
    - role: Head of Performance / Paid Media
      priorities:
        - Advertising efficiency across campaign types and keyword tiers
        - Budget allocation between defensive (brand) and offensive (conquest/category) campaigns
        - ACOS targets by ASIN maturity stage
      concerns:
        - Rising CPCs reducing campaign efficiency
        - Attribution overlap between Sponsored Products and Sponsored Brands
        - Keyword cannibalization between ad types
      preferred_framing: Discuss marketplace advertising in terms of TACOS trajectory and organic rank outcomes, not just ACOS and ROAS. The Head of Performance needs to understand that marketplace ad spend is partly a rank investment, not purely a direct-response channel.

    - role: Operations / Supply Chain
      priorities:
        - FBA inventory levels and restock lead times
        - Out-of-stock prevention — stockouts destroy organic rank
        - Stranded inventory management and removal fees
      concerns:
        - Restock limits and storage fees during peak periods
        - Long lead times creating FBA inventory gaps
        - Overstocked low-velocity ASINs generating storage fees
      preferred_framing: Connect inventory decisions directly to organic rank risk. An out-of-stock event on a high-rank ASIN can cost weeks or months of rank recovery time and requires significant ad spend investment to rebuild. Frame inventory as a rank protection asset, not just a logistics variable.

    - role: CMO / Brand Leadership
      priorities:
        - Channel conflict between marketplace pricing and DTC positioning
        - Brand representation quality within marketplace constraints
        - Long-term customer ownership vs. short-term marketplace revenue
      concerns:
        - Unauthorized resellers undercutting MAP pricing
        - Amazon owning the customer relationship — no email capture, no retargeting
        - Marketplace revenue creating organizational dependency that undermines DTC investment
      preferred_framing: Frame marketplace strategy as a channel portfolio decision with explicit tradeoffs. Marketplace provides distribution scale and demand capture but sacrifices customer data, brand control, and pricing integrity. DTC builds brand equity and customer relationships but requires more marketing investment to drive traffic.

working_style:
  decision_making: |
    Marketplace operators make decisions in rapid cycles — advertising bid adjustments and budget
    pacing happen daily, while listing optimization and A+ content decisions happen monthly.
    They need current account health status, ACOS and TACOS by campaign type, buy box win rate
    by ASIN, and organic rank trends before making significant campaign or strategy decisions.
    They are comfortable with data-heavy environments but need clear cause-and-effect framing —
    marketplace attribution is less opaque than paid social but still requires careful interpretation.
    Account health issues and suspension risk elevate decision urgency to crisis-level immediately.
  collaboration_patterns: |
    Marketplace operators sit at the intersection of marketing, operations, and legal. They
    collaborate closely with supply chain on FBA inventory planning, with legal on IP enforcement
    and brand registry maintenance, and with brand/DTC leadership on channel conflict strategy.
    They own the marketplace advertising budget and P&L but depend on operations for fulfillment
    execution. They typically run weekly account health reviews and monthly ASIN-level P&L reviews.
  preferred_inputs:
    - TACOS and ACOS trends by campaign type and top ASINs (trailing 30/60/90 days)
    - Buy box win rate by ASIN and identified unauthorized resellers
    - Organic rank by keyword for top 20 target terms
    - Account health dashboard status and any active policy violations
    - Inventory levels and days-of-stock forecast for top ASINs
  success_definition: |
    Success for a marketplace operator is building a sustainable, organically-ranked business
    that generates profitable revenue with declining TACOS over time — where advertising builds
    organic momentum rather than substituting for it, buy box win rate stays above 80%, account
    health stays in the green zone, and the marketplace channel complements rather than cannibilizes
    the overall brand strategy.

pain_points:
  - pain: Platform policy changes and account suspension risk
    manifestation: Policy updates communicated with minimal warning; account flags from third-party resellers or false IP complaints; suspension can eliminate 100% of marketplace revenue immediately with no guaranteed timeline for reinstatement
    urgency: critical

  - pain: Rising advertising ACOS as category competition intensifies
    manifestation: CPCs rising 20-40% YoY in competitive categories; same ad budget acquiring less visibility and fewer sales; new entrants with lower margin requirements willing to sustain unprofitable ACOS to gain rank
    urgency: critical

  - pain: Buy box loss to unauthorized resellers and counterfeit products
    manifestation: Third-party sellers undercutting brand pricing and winning the buy box on brand-owned ASINs; counterfeit products damaging review scores and brand reputation; limited enforcement tools available outside of Brand Registry
    urgency: high

  - pain: Limited customer data access
    manifestation: Amazon owns the customer relationship — no email capture, no purchase history portability, no ability to retarget marketplace customers in other channels; brand cannot build owned audience from marketplace sales
    urgency: high

  - pain: Channel conflict between marketplace and DTC
    manifestation: Marketplace pricing pressure forces DTC discounting or creates price parity violations; customers who discover brand on Amazon have no incentive to purchase DTC; organizational revenue dependency on marketplace undermines DTC investment case
    urgency: medium

success_metrics:
  - metric: TACOS (Total Advertising Cost of Sale)
    description: Ad spend divided by total revenue including organic — the blended efficiency metric for marketplace advertising investment
    typical_benchmark: "Strong: <10%; Healthy: 10-15%; At-risk: >20% for mature brand; new product launch may tolerate 30%+"

  - metric: Buy Box Win Rate
    description: Percentage of time the brand owns the buy box on its own ASINs — a proxy for pricing control and competitive position
    typical_benchmark: "Target: >80% on brand-owned ASINs; below 60% signals unauthorized reseller problem requiring immediate action"

  - metric: Organic Rank by Keyword
    description: Position in marketplace search results without paid placement for target keywords
    typical_benchmark: "Top 5 for core brand terms; top 10 for primary category terms; rank below 20 effectively means zero organic visibility"

  - metric: Listing Conversion Rate
    description: Percentage of listing page visitors who add to cart — a function of listing quality, price competitiveness, and review profile
    typical_benchmark: "Strong: >15%; Healthy: 10-15%; Underperforming: <10%; below 8% suggests listing or price competitiveness issues"

  - metric: Account Health Score
    description: Amazon's composite score for policy compliance and seller performance — determines selling privileges
    typical_benchmark: "Must maintain Green status; any Yellow flags require immediate remediation; Red status is pre-suspension"

  - metric: Marketplace Revenue (by ASIN and total)
    description: Total revenue generated through marketplace channel, tracked at ASIN level for P&L management
    typical_benchmark: "ASIN-level P&L including FBA fees, ad spend, and COGS — healthy marketplace ASIN typically generates 20-35% contribution margin after all fees"

regulatory_context:
  - name: Amazon Marketplace Policies
    relevance: Extensive and frequently updated policies covering product listing requirements, advertising content standards, customer communication rules, and seller performance standards. Policy violations can trigger listing suppression or account suspension.
    marketing_implication: All listing content, advertising copy, and customer communications must comply with current Amazon policies. Subscribe to policy update communications and audit listings quarterly against current standards. Product claims and imagery are subject to Amazon review standards in addition to FTC requirements.

  - name: IP and Trademark Protection / Brand Registry
    relevance: Amazon Brand Registry provides tools for IP enforcement, A+ content, Sponsored Brands advertising, and counterfeit reporting. Enrollment requires a registered trademark. Active enforcement is required — passive enrollment does not automatically remove infringing products.
    marketing_implication: Brand Registry enrollment is prerequisite for most marketplace brand-building tools. IP enforcement requires active monitoring and proactive complaint filing. International sellers must obtain trademark registration in each marketplace territory to access local Brand Registry protections.

  - name: MAP (Minimum Advertised Price) Policy Enforcement
    relevance: MAP policies set the floor for advertised pricing but are difficult to enforce on marketplace platforms because Amazon itself may discount products and unauthorized resellers may not be contractually bound.
    marketing_implication: MAP enforcement on marketplace requires a combination of authorized reseller agreements, Brand Registry reporting for policy violations, and pricing strategy decisions about whether to sell directly on marketplace or exclusively through authorized resellers.

  - name: Product Safety and Compliance by Category
    relevance: Products in regulated categories (electronics, children's products, supplements, cosmetics, food) must meet specific safety and compliance standards. Amazon requires documentation and may suspend listings that lack proper certification.
    marketing_implication: Compliance documentation must be maintained and updated as regulations change. Category-specific requirements (ASTM, UL, FDA) must be met before listing and periodically recertified. Compliance failures can trigger listing removal and account health violations.

calibration:
  analysis:
    emphasize:
      - TACOS trends over time — is advertising building organic rank or just buying sales?
      - Buy box win rate by ASIN — who is winning the buy box and why?
      - Organic rank trajectory for target keywords — is rank improving, stable, or eroding?
      - Account health status and active policy risk — what is the existential risk level right now?
    de_emphasize:
      - ACOS as a standalone success metric without TACOS context
      - Gross marketplace revenue without ASIN-level P&L including fees and ad spend
      - Advertising impressions or click volume without conversion and rank outcomes
      - Short-term campaign metrics without organic rank and TACOS trajectory
    signal_sources:
      - Amazon Seller Central account health dashboard and performance metrics
      - Helium 10, Jungle Scout, or DataDive for organic rank and keyword tracking
      - Seller Central advertising reports (ACOS, TACOS, spend by campaign type)
      - Brand Analytics for search query performance and market basket data
      - Third-party monitoring tools (Transparency, Project Zero) for counterfeit alerts
    red_flags:
      - TACOS above 20% for an ASIN that has been live more than 12 months
      - Buy box win rate below 70% — indicates pricing or unauthorized reseller problem
      - Account health in Yellow zone for any reason — escalate to remediation immediately
      - Organic rank for core keywords declining while ad spend is flat or increasing
      - Out-of-stock event on a top-10 ranked ASIN — rank recovery may take 60-90 days

  strategy:
    preferred_approaches:
      - ASIN lifecycle advertising strategy — different ACOS targets and campaign structures for launch, growth, and mature ASINs
      - Organic rank as the primary objective of advertising investment — measure success by rank improvement, not ACOS alone
      - Brand Registry as the foundation — enforce IP proactively, not reactively
      - Buy box defense playbook — pricing rules, authorized reseller program, and counterfeit monitoring
      - DTC channel differentiation strategy — give customers a reason to buy DTC beyond price (bundles, subscriptions, exclusives)
    patterns_to_avoid:
      - Running at high TACOS indefinitely without an organic rank improvement plan
      - Ignoring buy box loss until it becomes a revenue crisis
      - Treating marketplace and DTC as independent strategies without managing channel conflict explicitly
      - Over-reliance on marketplace revenue without building owned customer data assets in parallel
    recommended_frameworks:
      - framework_id: marketplace-platform-economics
        reason: Provides the unit economics framework for evaluating marketplace profitability at the ASIN level including all fee structures.
      - framework_id: dtc-economics-model
        reason: Enables explicit comparison of marketplace vs. DTC margin structure to inform channel portfolio decisions.
      - framework_id: omnichannel-strategy
        reason: Provides the strategic framework for integrating marketplace into a broader channel portfolio without destructive channel conflict.

  content:
    tone_adjustments:
      - Operationally grounded — marketplace operators respond to specific, actionable recommendations with clear metrics thresholds
      - Acknowledge platform risk — do not present marketplace as a stable or controllable environment; platform dependency risk is real and should be named
      - Precise with terminology — ACOS vs. TACOS vs. ROAS are not interchangeable; imprecise use signals lack of marketplace practitioner knowledge
    format_preferences:
      - ASIN-level analysis before category or account-level rollups
      - Specific metric thresholds with urgency flags (e.g., "TACOS above 20% requires intervention")
      - Explicit tradeoffs when recommending FBA vs. FBM or marketplace vs. DTC decisions
    credibility_signals:
      - Using TACOS as the primary efficiency metric, not ACOS alone
      - Acknowledging organic rank as the strategic objective of advertising investment
      - Naming account suspension risk as a planning consideration, not just a worst-case scenario
    credibility_killers:
      - Treating marketplace advertising like paid social (ROAS-first framing, audience targeting logic)
      - Ignoring buy box mechanics when discussing marketplace revenue strategy
      - Presenting marketplace as a passive revenue channel that doesn't require active management

  review:
    domain_standards:
      - All ACOS targets must specify ASIN stage (launch, growth, mature) and category context
      - TACOS benchmarks must account for organic revenue contribution — not a static percentage
      - Channel conflict recommendations must explicitly address pricing parity implications
      - Account health risk must be surfaced in any strategic recommendation that involves aggressive pricing or fulfillment changes
    red_lines:
      - Recommending a "maximize ROAS" objective for marketplace advertising without organic rank context
      - Presenting marketplace revenue projections without fee structure and ad spend in the ASIN P&L
      - Recommending DTC price increases without addressing MAP enforcement on marketplace
      - Ignoring account health risk when recommending aggressive competitive or pricing tactics

examples:
  - scenario: Marketplace operator seeing TACOS rise from 12% to 22% over six months despite flat advertising budget — revenue is declining and organic rank is slipping on core terms
    without_sme: |
      Your TACOS is rising because advertising is becoming less efficient. Try reducing bids on
      underperforming keywords, pausing low-ROI campaigns, and reallocating budget to your
      best-performing ASINs. Consider refreshing your listing content and getting more reviews
      to improve conversion rate, which should help organic rank over time.
    with_sme: |
      Rising TACOS from 12% to 22% with flat ad spend and declining organic rank is a specific
      pattern: your organic revenue base is shrinking, which means advertising is now covering
      more of the same absolute revenue — the efficiency ratio worsens even if ad spend hasn't
      changed. The root cause diagnosis must come before any budget decision. Pull organic vs.
      sponsored revenue by ASIN for the trailing 90 days: is one or two ASINs driving the rank
      decline, or is it category-wide? Check keyword-level organic rank weekly data — if your
      top 5 organic keywords have dropped from positions 3-7 to positions 12-18, that's a rank
      collapse requiring aggressive short-term advertising investment to rebuild velocity, not a
      bid reduction. If it's a listing conversion problem (rank is stable, click-through is stable,
      but add-to-cart is declining), investigate review score changes, pricing relative to
      competitors, and whether a competitor has launched A+ content or a new variation that is
      capturing your conversion. Budget cuts will accelerate rank decline — the correct response
      to deteriorating TACOS from rank erosion is a structured rank recovery campaign with a
      30-60 day timeline and a specific rank target before pulling back spend.
    agent: strategic-planning

  - scenario: Brand considering whether to launch on Amazon or protect DTC-only strategy to maintain customer data and pricing control
    without_sme: |
      Amazon offers massive distribution reach and built-in customer trust. The tradeoff is that
      Amazon owns the customer relationship and will take fees. Consider whether the incremental
      revenue opportunity outweighs the loss of customer data and potential price pressure.
      Test with a limited SKU selection first to evaluate performance before full commitment.
    with_sme: |
      This is a channel portfolio decision with irreversible components, not a reversible test.
      Once you list on Amazon, unauthorized resellers will find you regardless of whether you
      list yourself — the question is whether you control the listing or cede it to third parties.
      Build the explicit tradeoff model first: (1) Revenue opportunity — what is the realistic
      Amazon TAM for your category and how much can you capture in year 1-3? (2) Margin impact —
      model ASIN-level P&L including 15% referral fee, FBA fees of $3-8/unit depending on size,
      and advertising spend at a realistic TACOS of 15-20% for a new brand. Contribution margin
      will be 15-25 points lower than DTC. (3) Customer data loss — every Amazon customer is
      Amazon's customer. You get no email, no purchase history, no ability to retarget. Model
      the LTV impact of 20-40% of sales shifting to a zero-data channel. (4) Channel conflict —
      Amazon's pricing algorithm will pressure your list price; if you sell DTC at $49 and Amazon
      auto-discounts to $42, your DTC customers will feel overcharged. If you choose to launch,
      design the strategy around what Amazon does best (demand capture, new customer acquisition
      from Amazon-native shoppers) while using DTC for what it does best (subscription, loyalty,
      bundles, customer data). Never let Amazon become more than 40-50% of revenue without a
      documented plan for reducing that concentration.
    agent: strategic-planning

stakeholder_guidance: |
  Marketplace operators are operationally fluent practitioners who live in Seller Central dashboards
  and advertising consoles daily. They respect precision and will immediately detect imprecise use
  of marketplace-specific terminology.

  **When discussing advertising performance:**
  - Always distinguish ACOS (campaign-level) from TACOS (business-level) — use TACOS as the
    strategic metric and ACOS as the campaign optimization tool
  - Connect advertising performance to organic rank outcomes, not just revenue — "your TACOS
    is rising because advertising is not converting to organic rank improvement" is more useful
    than "your efficiency is declining"
  - Acknowledge that ACOS targets must vary by ASIN lifecycle stage — a blanket ACOS target
    misses the strategic logic of rank-building investment

  **When discussing account risk:**
  - Surface account health and suspension risk proactively — marketplace operators know this
    is their primary existential risk and expect advisors to take it seriously
  - Do not treat policy compliance as a legal issue separate from marketing strategy — listing
    content, advertising claims, and fulfillment performance are all account health inputs

  **When discussing channel strategy:**
  - Name the channel conflict tradeoff explicitly — marketplace distribution and DTC customer
    ownership are in structural tension, and pretending otherwise loses credibility immediately
  - Frame owned channel investment (email, SMS, DTC loyalty) as the strategic response to
    marketplace customer data lockout — not as a separate initiative

  **Tone and framing traps:**
  - Do not use paid social framing (audience targeting, ROAS optimization, creative testing logic)
    for marketplace advertising — it signals a lack of marketplace-specific expertise
  - Avoid presenting Amazon strategy as straightforward — platform complexity, policy risk,
    and competitive dynamics make it a genuinely difficult operational environment
  - Do not downplay buy box mechanics or treat them as a secondary concern — for many brands,
    buy box win rate is the single most impactful metric in the account
