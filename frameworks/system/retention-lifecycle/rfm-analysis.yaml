metadata:
  id: rfm-analysis
  version: 1.0.0
  display_name: RFM Analysis (Recency, Frequency, Monetary)
  category: operations
  description: Segments consumer customers by Recency of last purchase, Frequency of purchases, and Monetary value to drive targeted retention, reactivation, and upsell campaigns for each RFM segment with differentiated investment levels.
  best_for:
    stages:
    - growth
    - scale
    - optimization
    roles:
    - crm-manager
    - consumer-analytics-manager
    - head-of-loyalty
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: transaction_data
    description: Customer purchase history including customer ID, purchase date, and purchase amount for at least 12 months
    source: user_input
  - field: customer_database_size
    description: Total customer count and any segmentation data already available
    source: user_input
  - field: business_objective
    description: Primary objective — retention, reactivation, upsell, or identifying high-value segments
    source: user_input
  optional:
  - field: rfm_scoring_preference
    description: Preferred scoring method — quintile scoring (1–5 per dimension), binary thresholds, or custom business rules
    source: user_input
  - field: campaign_budget
    description: Available budget for CRM campaigns targeting RFM segments
    source: user_input
  - field: product_repurchase_cycle
    description: Natural repurchase frequency for this product category to calibrate Recency thresholds
    source: user_input
analysis:
  instructions: 'Execute the RFM analysis across six dimensions. First, score each customer on three dimensions: Recency (days since last purchase — lower is better), Frequency (total number of purchases — higher is better), and Monetary value (total spend — higher is better). Use quintile scoring (1–5 for each dimension) to create 125 possible RFM cells, then aggregate into 8–12 actionable segments. Define the standard named segments: Champions (5,5,5 — bought recently, buy often, highest spenders), Loyal Customers (high F, any R/M), Potential Loyalists (recent first-time or second-time buyers), Recent Customers (high R, low F/M), Promising (recent, low frequency), Need Attention (above-average but declining), About to Sleep (below average recency), At Risk (bought often but not recently), Can''t Lose Them (high value, not recent), Lost (lowest recency). Second, size each segment by revenue concentration. Third, design the campaign playbook for each segment with differentiated messaging, offer strategy, and channel. Fourth, model the revenue impact of improving the target metric for each priority segment. Fifth, define the monitoring cadence and migration tracking between segments.'
  dimensions:
  - id: rfm-scoring-model
    name: RFM Scoring Model
    description: Defines the scoring methodology and thresholds for each RFM dimension
    prompts:
    - What scoring method is appropriate given the customer base size — quintile scoring (requires 1000+ customers) or custom threshold-based rules?
    - How should the Recency dimension be calibrated to the natural repurchase cycle for this category — is 90-day recency "good" or "poor" depending on whether this is a weekly or annual purchase category?
    - How should Monetary value be defined — total lifetime spend, average order value, or contribution margin?
    - Should equal weight be applied to all three dimensions, or should Monetary value be weighted higher for a revenue-maximization objective?
  - id: segment-definition
    name: Segment Definition & Naming
    description: Aggregates RFM cells into actionable named segments
    prompts:
    - Which RFM cell combinations cluster into meaningful behavioral segments with similar engagement and churn risk profiles?
    - How should segment boundaries be adjusted for this specific product category's purchase behavior norms?
    - Which segments represent the highest commercial priority — highest current value at risk vs. highest upside from targeted investment?
    - How many segments can the CRM team operationally manage with differentiated campaign programs?
  - id: segment-size-value
    name: Segment Size & Revenue Concentration
    description: Sizes each segment and maps revenue concentration to identify priority investment targets
    prompts:
    - What percentage of revenue is concentrated in the Champions and Loyal Customers segments, and is it stable or declining?
    - Which segments have the greatest gap between current revenue and potential revenue from segment upgrade?
    - What is the migration rate between segments — how many customers are improving or declining their RFM scores each quarter?
    - What percentage of customers are in the At Risk or Can''t Lose Them segments, representing high-value customers who need immediate retention intervention?
  - id: segment-strategy
    name: Segment Strategy Design
    description: Defines the strategic objective and investment level for each RFM segment
    prompts:
    - For Champions and Loyal Customers — what engagement and recognition program keeps them at this tier and converts them into advocates?
    - For At Risk and Can''t Lose Them segments — what is the retention intervention, and what is the maximum economic justification for the intervention spend?
    - For Potential Loyalists and Recent Customers — what is the activation program that converts them to higher-frequency purchasers before they go dormant?
    - For the Lost segment — is a reactivation program economically justified, and at what response rate does the program become profitable?
  - id: campaign-playbook-by-segment
    name: Campaign Playbook by Segment
    description: Defines the specific campaign mechanics for each priority segment
    prompts:
    - For each priority segment, what is the primary message, offer type, channel, and timing of the campaign?
    - Which segments warrant a financial offer (discount, bonus product) vs. which should receive recognition or experience-based engagement?
    - How frequently should each segment be contacted, and what is the suppression policy to prevent over-mailing?
    - What A/B tests should be run within each segment to optimize campaign performance?
  - id: business-impact-model
    name: Business Impact Model
    description: Projects the revenue impact of improving performance in priority segments
    prompts:
    - What is the revenue impact of retaining 10% more of the At Risk segment at current average order value?
    - What is the revenue uplift of moving 15% of Potential Loyalists to the Loyal Customers segment?
    - What is the reactivation revenue if 5% of the Lost segment responds to a win-back campaign?
    - At what campaign response rate does each segment program become cash-flow positive, given offer and execution cost?
output_templates:
- id: primary
  name: RFM Analysis & Campaign Strategy
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## RFM Scoring Methodology\n\n{scoring_methodology}\n\n## Segment Map & Population\n\n{segment_map}\n\n## Revenue Concentration Analysis\n\n{revenue_concentration}\n\n## Segment Strategy Summary\n\n{segment_strategy}\n\n## Campaign Playbook\n\n{campaign_playbook}\n\n## Business Impact Model\n\n{business_impact_model}\n\n## Monitoring & Migration Tracking\n\n{monitoring_plan}\n\n'
rubric:
  description: Evaluates the statistical rigor and operational readiness of the RFM analysis.
  dimensions:
  - name: Scoring Methodology Rigor
    weight: 0.25
    scoring:
      1: RFM scores are assigned without a systematic methodology — thresholds are arbitrary and not calibrated to the product's purchase cycle.
      3: Quintile scoring is applied correctly but the Recency thresholds are not calibrated to the product's natural repurchase cycle.
      5: Scoring methodology is systematically applied with Recency thresholds calibrated to category purchase cycle, and the methodology is reproducible and documented.
    improvement_guidance: Calibrate Recency thresholds by analyzing the distribution of days-between-purchases for repeat customers. Set the Recency scoring bands at natural distribution breakpoints rather than arbitrary percentile cuts.
  - name: Segment Actionability
    weight: 0.30
    scoring:
      1: Segments are defined analytically but have no differentiated campaign strategy — all segments receive the same communication.
      3: Differentiated strategies are defined for major segments but the campaign mechanics (message, offer, channel, timing) are not fully specified.
      5: Every segment has a fully specified campaign playbook with differentiated message, offer structure, channel, send timing, and A/B test design.
    improvement_guidance: Write a one-page campaign brief for each of the top five priority segments. Include subject lines, message concepts, offer details, and success metrics before building in the CRM.
  - name: Business Impact Modeling
    weight: 0.30
    scoring:
      1: No business impact model; campaign investment is not linked to expected revenue return.
      3: Business impact is estimated but uses industry averages rather than this brand's actual response rate and AOV data.
      5: Business impact model uses this brand's historical campaign response rates, AOV, and margin data to project segment-level ROI for each proposed campaign.
    improvement_guidance: Build the impact model on a cohort of prior CRM campaigns. Use actual response rates from prior sends to set realistic projections, and apply a 20% haircut to account for campaign fatigue.
  - name: Migration Tracking Design
    weight: 0.15
    scoring:
      1: RFM analysis is a one-time snapshot with no plan to track segment migration over time.
      3: Segment migration is tracked but the tracking is manual and not integrated into the reporting dashboard.
      5: Automated segment migration tracking is designed with quarterly reporting on segment size changes and a campaign attribution model connecting interventions to migration outcomes.
    improvement_guidance: Build a quarterly RFM segment migration report showing the count of customers moving between segments and correlating movements to specific campaigns.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Category-Blind Recency Thresholds
  description: Applying the same Recency thresholds across different product categories — marking a customer who bought 90 days ago as "at risk" for a monthly subscription but "very recent" for an annual purchase category.
  mitigation: Calibrate Recency thresholds specifically to each product's natural repurchase cycle. A customer is "at risk" when they are approaching twice the average repurchase cycle without a new purchase.
- pattern: All-Segments-Active Trap
  description: Creating 12 segments with differentiated strategies but lacking the CRM team capacity to execute more than four campaigns simultaneously, resulting in most segments receiving no differentiated treatment.
  mitigation: Prioritize no more than five segments per quarter for active campaign treatment. Rank segments by revenue at risk or revenue upside and concentrate execution capacity on the highest-impact tier.
- pattern: Offer-First Segmentation
  description: Defaulting to financial discounts for every segment rather than matching the offer type to the segment's motivation — sending a discount to Champions who would have repurchased anyway destroys margin.
  mitigation: Never use financial offers for Champions and Loyal Customers without testing whether recognition or experience-based engagement produces equivalent retention at lower cost.
chaining:
  after:
  - framework_id: aarrr-pirate-metrics
    reason: AARRR provides the retention and revenue metrics that the RFM analysis will decompose and segment.
  before:
  - framework_id: customer-lifecycle-marketing
    reason: RFM segments feed directly into lifecycle marketing program design — each segment receives a lifecycle program tailored to its behavioral profile.
