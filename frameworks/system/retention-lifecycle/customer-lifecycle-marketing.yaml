metadata:
  id: customer-lifecycle-marketing
  version: 1.0.0
  display_name: Customer Lifecycle Marketing Framework
  category: operations
  description: Maps the full consumer lifecycle from acquisition through advocacy and designs the marketing program for each stage — onboarding, engagement, retention, reactivation, and loyalty — with differentiated messaging, channel strategy, and success metrics per stage.
  best_for:
    stages:
    - growth
    - scale
    roles:
    - crm-manager
    - head-of-loyalty
    - cmo
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: customer_lifecycle_data
    description: Purchase history, email engagement, and behavioral data enabling lifecycle stage classification
    source: user_input
  - field: product_repurchase_cycle
    description: Natural repurchase cycle for this product category — weekly, monthly, quarterly, or annual
    source: user_input
  - field: crm_platform_capabilities
    description: Email, SMS, push notification, and automation capabilities available in the current CRM/marketing automation platform
    source: user_input
  optional:
  - field: current_email_program
    description: Existing email program structure, send frequency, open and click rates by campaign type
    source: user_input
  - field: customer_ltv_data
    description: LTV by customer tenure and engagement level, if available
    source: user_input
  - field: competitive_lifecycle_programs
    description: How competitors structure their post-purchase CRM programs
    source: user_input
analysis:
  instructions: 'Design the complete lifecycle marketing program across six stages. Stage 1 — Onboarding (Day 0–30): the most critical lifecycle stage. The goal is to get the customer to their activation moment and first repeat use before momentum fades. Design a 5–7 touchpoint welcome and activation sequence. Stage 2 — Engagement (Day 30–90): deepen the relationship with the activated customer through education, community, and value delivery. Stage 3 — Retention (Day 90+): proactively intervene when customers show early signs of declining engagement before they churn. Design an at-risk early warning system and intervention program. Stage 4 — Reactivation: for customers who have lapsed beyond the natural repurchase cycle, design a win-back campaign series. Stage 5 — Loyalty and Advocacy: design the program for high-value, high-engagement customers — recognition, exclusives, advocacy amplification. Stage 6 — Suppression and Sunset: define the criteria for removing customers from active programs to protect deliverability and reduce cost. For each stage, define the behavioral trigger, channel mix, message strategy, send cadence, and success metric.'
  dimensions:
  - id: lifecycle-stage-map
    name: Lifecycle Stage Mapping & Classification
    description: Maps customers to lifecycle stages using behavioral criteria
    prompts:
    - What behavioral criteria (purchase recency, frequency, engagement with communications) classify a customer at each lifecycle stage?
    - Are the classification criteria measurable in real time from the CRM data, or do they require manual segmentation?
    - What percentage of the customer base currently falls into each lifecycle stage?
    - How does lifecycle stage distribution change over the past 12 months — is the base maturing healthily or skewing toward early-stage churn risk?
  - id: onboarding-program
    name: Onboarding Program Design
    description: Designs the welcome and activation sequence for new customers
    prompts:
    - What is the sequence of emails, notifications, or messages that guides a new customer to the activation moment within the first 30 days?
    - What content (product education, use case inspiration, community introduction, social proof) most effectively accelerates first activation?
    - At what point in the onboarding sequence should the brand ask for a review, referral, or social share?
    - How does the onboarding sequence differ by acquisition channel — does a customer from paid social need different education than a customer acquired through a friend's referral?
  - id: engagement-cadence
    name: Engagement Cadence Design
    description: Defines the ongoing content and communication cadence to deepen the relationship with activated customers
    prompts:
    - What is the optimal email frequency for engaged customers — what cadence maintains relationship without creating fatigue?
    - What content types (product tips, curated inspiration, community highlights, behind-the-brand storytelling) drive engagement without feeling promotional?
    - How does the engagement program leverage behavioral triggers (product usage events, milestone anniversaries, seasonal moments) rather than purely calendar-driven sends?
    - What is the preference center design — do customers have control over their engagement cadence and content type, and does offering that control improve retention?
  - id: retention-trigger-design
    name: Retention Trigger & At-Risk Intervention
    description: Designs the early warning system for at-risk customers and the intervention program
    prompts:
    - What behavioral signals (email disengagement, declining purchase frequency, reduced app sessions) indicate a customer is at risk of churning?
    - How many days before the predicted churn point should the first at-risk intervention be triggered?
    - What intervention approach works best for this customer segment — a personal outreach, a reengagement incentive, or a product education nudge?
    - How is the at-risk intervention program differentiated for high-value customers who warrant more investment vs. lower-value customers?
  - id: reactivation-program
    name: Reactivation (Win-Back) Program
    description: Designs the win-back campaign series for lapsed customers
    prompts:
    - At what point beyond the natural repurchase cycle is a customer classified as lapsed and eligible for win-back?
    - What is the optimal win-back sequence — how many messages, over what time window, with what escalating offer structure?
    - What message framing performs best for win-back — acknowledging the gap ("we miss you"), leading with value ("see what''s new"), or leading with incentive?
    - At what response rate does a win-back campaign become economically worthwhile, and how does that vary by customer LTV segment?
  - id: loyalty-advocacy-program
    name: Loyalty & Advocacy Program
    description: Designs the recognition and engagement program for the brand's most loyal customers
    prompts:
    - How are loyalty program members identified and enrolled — automatically by behavior or through explicit enrollment?
    - What exclusive access, early access, or recognition do loyalty program members receive that creates meaningful differentiation from standard communication?
    - How does the loyalty program create advocacy — does it include referral mechanics, UGC programs, or community leadership opportunities?
    - How is the loyalty program's ROI measured — what is the incremental purchase frequency or LTV of loyalty program members vs. non-members?
output_templates:
- id: primary
  name: Customer Lifecycle Marketing Program
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Lifecycle Stage Map & Customer Distribution\n\n{lifecycle_stage_map}\n\n## Onboarding Program\n\n{onboarding_program}\n\n## Engagement Cadence\n\n{engagement_cadence}\n\n## Retention & At-Risk Program\n\n{retention_program}\n\n## Reactivation Program\n\n{reactivation_program}\n\n## Loyalty & Advocacy Program\n\n{loyalty_advocacy_program}\n\n## CRM Calendar & Automation Map\n\n{crm_calendar}\n\n'
rubric:
  description: Evaluates the completeness and behavioral grounding of the customer lifecycle marketing program.
  dimensions:
  - name: Trigger-Based vs. Calendar-Based Design
    weight: 0.30
    scoring:
      1: Lifecycle program is calendar-driven (weekly newsletter cadence) with no behavioral triggers or customer segment differentiation.
      3: Some behavioral triggers are used but the majority of communications are calendar-based and undifferentiated.
      5: Lifecycle program is primarily behavioral-trigger-based with calendar communications supplementing rather than dominating the program.
    improvement_guidance: Audit the existing CRM program and calculate the ratio of triggered sends to broadcast sends. A program where more than 70% of sends are broadcast indicates insufficient behavioral targeting.
  - name: Onboarding Activation Focus
    weight: 0.25
    scoring:
      1: Onboarding program is a generic welcome series that does not guide the customer toward the specific activation moment.
      3: Onboarding program references product education but does not track whether customers reach the activation moment and does not adapt based on activation status.
      5: Onboarding program is specifically designed to drive customers to the activation moment, tracks activation status in real time, and branches into differentiated sequences for activated vs. not-yet-activated customers.
    improvement_guidance: Add activation tracking to the CRM and build a branching onboarding flow: activated customers receive relationship deepening content, non-activated customers receive education and support-focused content.
  - name: At-Risk Identification Quality
    weight: 0.25
    scoring:
      1: No at-risk customer identification system exists; churn is only detected after it has happened.
      3: At-risk signals are defined but the identification is manual or run infrequently rather than continuously.
      5: At-risk identification is automated with real-time behavioral scoring, and at-risk customers receive differentiated intervention within 48 hours of triggering the risk threshold.
    improvement_guidance: Define an at-risk score that updates daily in the CRM based on email engagement, purchase recency, and app activity. Set an automated trigger that fires an intervention when a customer's score drops below the threshold.
  - name: Reactivation Economics
    weight: 0.20
    scoring:
      1: Reactivation program exists without modeling the break-even response rate or differentiating by customer LTV.
      3: Reactivation economics are modeled at a blended level but offer size and investment are not differentiated by customer LTV.
      5: Reactivation program is tiered by customer LTV — high-value lapsed customers receive personalized outreach and meaningful offers, low-value lapsed customers receive low-cost automated win-backs.
    improvement_guidance: Segment lapsed customers into at least three LTV tiers. For the top tier, calculate the maximum justifiable offer size given their expected LTV on reactivation.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Batch-and-Blast Default
  description: Defaulting to a single weekly or bi-weekly newsletter broadcast to all customers regardless of lifecycle stage, producing high unsubscribe rates and low engagement from customers who need different messages.
  mitigation: Suppress the all-customer broadcast and replace it with lifecycle-stage-specific sends. Test the approach for 60 days measuring open rate, click rate, and unsubscribe rate.
- pattern: Neglecting the Onboarding Stage
  description: Investing heavily in acquisition while under-investing in the critical first-30-day onboarding period, where most churn risk is concentrated and where the brand has the highest opportunity to build lasting habit.
  mitigation: Allocate at least 30% of CRM program development effort to the onboarding stage, even though it only affects new customers. Retention economics justify this disproportionate investment.
- pattern: Offer-Only Reactivation
  description: Using financial offers (discounts, free shipping) as the sole reactivation mechanism, attracting low-loyalty customers who only return for deals and churn again after redeeming them.
  mitigation: Test reactivation sequences that lead with value (what's new, what they're missing, community highlights) before introducing financial offers. Reserve discount offers for the final message in the reactivation series.
chaining:
  after:
  - framework_id: rfm-analysis
    reason: RFM segments define which customers need which lifecycle program stage — RFM feeds the lifecycle program's audience segmentation.
  before:
  - framework_id: okrs
    reason: Lifecycle marketing program performance metrics (retention rate, reactivation rate, loyalty program enrollment) should feed into the marketing OKRs.
