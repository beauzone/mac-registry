metadata:
  id: cohort-retention-analysis
  version: 1.0.0
  display_name: Cohort Retention Analysis
  category: operations
  description: Analyzes retention curves by acquisition cohort to identify retention patterns, churn acceleration points, and LTV trajectory — distinguishing natural category churn from structural product or experience failures that can be remediated.
  best_for:
    stages:
    - growth
    - scale
    - optimization
    roles:
    - consumer-analytics-manager
    - head-of-growth
    - crm-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: cohort_data
    description: Customer acquisition data with dates and transaction history enabling cohort-level retention calculation for at least 6 monthly cohorts
    source: user_input
  - field: retention_definition
    description: How retention is defined for this product — repeat purchase within X days, active subscription, app engagement, or other behavioral metric
    source: user_input
  - field: business_objective
    description: Primary question the cohort analysis is designed to answer (identify churn acceleration, compare acquisition channel quality, measure improvement over time)
    source: user_input
  optional:
  - field: acquisition_channel_data
    description: Acquisition channel attribution for each customer to enable channel-level cohort comparison
    source: user_input
  - field: product_change_history
    description: Timeline of significant product, pricing, or experience changes that may have affected retention curves
    source: user_input
  - field: benchmark_data
    description: Industry or competitive benchmarks for retention curves in this product category
    source: user_input
analysis:
  instructions: 'Build the cohort retention analysis across six dimensions. First, construct cohorts: typically monthly acquisition cohorts, measured by retention rate at 1, 7, 14, 30, 60, 90, 180, and 365 days post-acquisition. Display as a cohort retention grid (months on rows, retention period on columns). Second, analyze the retention curve shape: identify whether the curve shows a steep early drop followed by a stable plateau (indicating a loyal core emerges), a gradually declining curve (suggesting ongoing value delivery), or a continuously declining curve (suggesting no lasting value is being created). The plateau retention rate after 90 days is the "natural retention rate" for this product. Third, identify churn acceleration points: the specific time intervals where retention drops fastest. These are the highest-leverage intervention windows. Fourth, model LTV trajectory: use retention curve data to project LTV for each cohort, identifying whether the business is building a valuable retained base or continuously churning through low-LTV customers. Fifth, compare cohorts over time to identify improvement or deterioration trends. Sixth, if channel data is available, compare retention curves by acquisition channel to identify quality differences that should inform channel investment reallocation.'
  dimensions:
  - id: cohort-construction
    name: Cohort Construction & Data Quality
    description: Defines the cohort methodology and validates data quality before analysis
    prompts:
    - How are cohorts defined — by acquisition date, first purchase date, or subscription start date — and is the definition consistent across the analysis?
    - How many cohorts have sufficient sample size (minimum 200 customers) to generate statistically meaningful retention curves?
    - Are there data quality issues (missing purchase dates, duplicate customer IDs, attribution gaps) that must be resolved before cohort analysis can begin?
    - What retention metric is being tracked — repeat purchase, active subscription, app session, or another behavioral indicator — and is it consistently measured?
  - id: retention-curve-analysis
    name: Retention Curve Shape Analysis
    description: Interprets the retention curve shape and plateau to assess the health of the consumer relationship
    prompts:
    - What does the retention curve shape indicate — is there a loyal core forming (plateau), or is the curve continuously declining?
    - What is the natural retention rate (plateau retention after 90 days), and how does it compare to category benchmarks?
    - How quickly does the initial churn phase occur — is most early churn happening in the first week, first month, or first quarter?
    - Is the retention curve shape improving, deteriorating, or stable when comparing the most recent three cohorts to the earliest three cohorts?
  - id: churn-acceleration-points
    name: Churn Acceleration Point Identification
    description: Identifies the specific time intervals where retention drops fastest to prioritize intervention design
    prompts:
    - At which specific time intervals (day 7, day 30, day 60, day 90) does the retention curve show the steepest drop?
    - What product experience, communication gap, or value failure is most likely causing the churn acceleration at the identified interval?
    - Which churn acceleration point affects the most customers in absolute volume, and which has the most recoverable customers?
    - What intervention (product change, communication, offer) would most plausibly address the churn driver at each acceleration point?
  - id: ltv-trajectory-modeling
    name: LTV Trajectory Modeling
    description: Projects customer LTV from retention curve data and identifies whether the business is building a retained base
    prompts:
    - What is the projected 12-month and 36-month LTV for each monthly cohort based on the retention curve?
    - Is LTV per cohort trending up, down, or flat over the past 12 months of cohorts?
    - What retention rate improvement (percentage point increase at the 90-day mark) would most meaningfully improve LTV per cohort?
    - At what LTV does the average acquired customer exceed the CAC, and what percentage of cohorts are reaching LTV-positive?
  - id: cohort-comparison
    name: Cohort-Over-Cohort Comparison
    description: Compares retention curves across cohorts to identify improvement trends and the impact of product or marketing changes
    prompts:
    - Are recent cohorts showing better or worse retention than older cohorts at equivalent retention intervals?
    - Did any specific product change, pricing change, or marketing program change coincide with a measurable shift in cohort retention curves?
    - Which cohorts are performing best, and what was different about the product, channel mix, or onboarding during their acquisition period?
    - What is the trend in the natural retention rate (plateau) over the last 12 months of cohorts?
  - id: actionable-insight-extraction
    name: Actionable Insight Extraction
    description: Translates cohort analysis findings into specific, prioritized interventions
    prompts:
    - What is the single highest-leverage intervention — the change that, if implemented, would most improve retention at the most impactful point in the curve?
    - Which interventions are quick wins (can be implemented in under 30 days with existing resources) vs. strategic improvements?
    - How will the impact of retention interventions be measured — what is the test design to isolate the effect of each intervention on the retention curve?
    - What additional data would most improve the accuracy and actionability of this cohort analysis?
output_templates:
- id: primary
  name: Cohort Retention Analysis Report
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Cohort Retention Grid\n\n{cohort_retention_grid}\n\n## Retention Curve Interpretation\n\n{retention_curve_analysis}\n\n## Churn Acceleration Points\n\n{churn_acceleration_analysis}\n\n## LTV Trajectory by Cohort\n\n{ltv_trajectory}\n\n## Cohort-Over-Cohort Trend\n\n{cohort_comparison}\n\n## Priority Interventions\n\n{priority_interventions}\n\n## Test Design\n\n{test_design}\n\n'
rubric:
  description: Evaluates the analytical rigor and intervention quality of the cohort retention analysis.
  dimensions:
  - name: Cohort Construction Quality
    weight: 0.25
    scoring:
      1: Cohorts are constructed from insufficient data (fewer than 100 customers each) or the retention metric is inconsistently defined.
      3: Cohorts are well-constructed but cover fewer than 6 months of data, limiting the ability to identify long-term retention patterns.
      5: Cohorts are constructed from consistent data with at least 200 customers each, cover 12+ months, and the retention metric is precisely defined and consistently measured.
    improvement_guidance: Audit the customer data for duplicate IDs, missing dates, and attribution inconsistencies before running cohort analysis. Poor data quality produces misleading curves.
  - name: Insight Depth
    weight: 0.30
    scoring:
      1: Analysis reports retention curves without interpreting their shape, identifying churn drivers, or connecting retention patterns to business outcomes.
      3: Retention patterns are interpreted but churn drivers are hypothesized rather than validated with supporting data.
      5: Retention curve shape is interpreted, churn acceleration points are identified with supporting hypothesis for each driver, and LTV trajectory is modeled from the curve data.
    improvement_guidance: For each identified churn acceleration point, conduct a mini-analysis linking the churn timing to a specific product event, communication gap, or value delivery failure.
  - name: Cohort Comparison Quality
    weight: 0.25
    scoring:
      1: Only a single cohort is analyzed, providing no trend information.
      3: Multiple cohorts are compared but no attempt is made to correlate curve differences with product or marketing changes.
      5: Cohort-over-cohort comparison is systematic, correlating retention curve changes with the timeline of product changes, and produces a clear narrative about whether retention is improving.
    improvement_guidance: Maintain a change log of all significant product, pricing, onboarding, and campaign changes. Overlay this log on the cohort comparison chart to identify which changes drove retention improvements.
  - name: Intervention Specificity
    weight: 0.20
    scoring:
      1: Analysis concludes without specific intervention recommendations.
      3: Interventions are recommended but lack test designs to measure their impact on retention curves.
      5: Interventions are specific, prioritized by expected retention impact, and include A/B test designs with success metrics and minimum detectable effect calculations.
    improvement_guidance: Design interventions as controlled experiments with holdout groups. Without a control, it is impossible to know whether a retention improvement is due to the intervention or external factors.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Aggregate Retention Reporting
  description: Reporting a single blended retention rate across all cohorts, which hides whether retention is improving or deteriorating over time and masks channel quality differences.
  mitigation: Always report retention as a cohort grid, not a single number. A rising cohort-over-cohort plateau retention rate indicates the brand is getting better at retaining customers. A single number cannot show this trend.
- pattern: Confusing Natural Churn with Fixable Churn
  description: Treating all churn as a problem to be solved, including the natural attrition that occurs when customers have fully satisfied their need — leading to investment in reactivating customers who simply do not need the product again.
  mitigation: Distinguish between the early drop phase (often fixable) and the plateau phase (largely structural). Invest in reducing the initial churn phase; accept that the plateau level reflects the category's natural repurchase behavior.
- pattern: Analysis Without Action
  description: Running a comprehensive cohort retention analysis that identifies churn acceleration points but does not result in specific product or marketing interventions within 30 days.
  mitigation: Require every cohort analysis to produce at least two specific intervention proposals with owners, timelines, and success metrics before the analysis is considered complete.
chaining:
  after:
  - framework_id: aarrr-pirate-metrics
    reason: AARRR provides the retention metric framing; cohort analysis zooms into the retention curve dynamics to identify where to intervene.
  before:
  - framework_id: churn-diagnosis-prevention
    reason: Cohort analysis identifies where and when churn is occurring; churn diagnosis provides the root-cause framework to explain why and design targeted prevention.
