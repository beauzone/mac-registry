metadata:
  id: trial-to-premium-upsell-path
  version: 1.0.0
  display_name: Trial-to-Premium / Upsell Path Design
  category: growth
  description: Maps the conversion pathway from free trial or entry product to premium tiers by identifying the activation moment, closing the value gap, and designing optimal upgrade trigger points that convert without heavy-handed promotion.
  best_for:
    stages:
    - growth
    - scale
    roles:
    - consumer-product-manager
    - head-of-growth
    - crm-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: product_tier_structure
    description: Description of the trial or free tier vs. paid tier features, limits, and price points
    source: user_input
  - field: trial_to_paid_conversion_rate
    description: Current conversion rate from trial to paid, and the time window in which most conversions occur
    source: user_input
  - field: activation_definition
    description: The product team's current definition of the activation moment — the specific action that signals the user has received core value
    source: user_input
  optional:
  - field: user_behavioral_data
    description: Feature usage patterns, activation rates, and engagement depth data from the product analytics system
    source: user_input
  - field: upgrade_drop_off_data
    description: Where in the upgrade flow users abandon — pricing page, payment form, plan selection, or elsewhere
    source: user_input
  - field: competitive_freemium_benchmarks
    description: Trial-to-paid conversion rates for comparable products in the category
    source: user_input
analysis:
  instructions: 'Design the trial-to-premium conversion pathway across six dimensions. First, identify and validate the activation moment: the specific action or experience that creates genuine value recognition and highest predicts conversion. This is typically a behavioral event (e.g., first export, first share, first recommendation applied) rather than a time threshold. Second, design the trial experience: what limited-but-functional experience builds enough value for the user to understand what they are missing by not upgrading? Third, identify the value gap: what is the most compelling premium feature or capability the trial user encounters but cannot access — the feature that creates the strongest "I need to pay for this" moment? Fourth, design upgrade trigger points: when should upgrade prompts appear, in what context, with what framing? Triggers should feel helpful (this is where the upgrade serves the user's goal) rather than forced. Fifth, design the upsell sequence: the series of touchpoints (in-app, email, notification) that guide trial users from activation to upgrade over the trial window. Sixth, define conversion metrics and success criteria. Conclude with an upgrade flow wireframe brief and a prioritized A/B test plan.'
  dimensions:
  - id: activation-moment-definition
    name: Activation Moment Identification
    description: Identifies the specific product action that most strongly predicts conversion from trial to paid
    prompts:
    - What specific user action (not time threshold) correlates most strongly with long-term retention and trial-to-paid conversion?
    - How quickly do users who convert to paid reach the activation moment vs. users who churn without converting?
    - Is the current activation moment clear enough that users know when they have experienced core value, or is value ambiguous?
    - Are there multiple activation moments for different user segments, and should conversion triggers be segmented accordingly?
  - id: trial-experience-design
    name: Trial Experience Design
    description: Designs the trial experience to maximize value demonstration and upgrade intent
    prompts:
    - Does the trial deliver enough functional value to create genuine product attachment before the upgrade ask?
    - What is the minimum viable trial experience that creates a meaningful preview of premium value without giving away the upgrade's core value proposition?
    - Are users hitting the trial limits too quickly (frustration before value) or too slowly (no urgency to upgrade)?
    - What onboarding improvements would increase the percentage of trial users who reach the activation moment within the first 48 hours?
  - id: value-gap-identification
    name: Value Gap Identification
    description: Identifies the specific premium features that create the strongest upgrade motivation
    prompts:
    - Which premium feature do trial users encounter most frequently and find most compelling before encountering the upgrade gate?
    - Is there a single "hero feature" that, if experienced in trial, would dramatically increase upgrade intent?
    - How is the value gap communicated at the point where a user encounters a locked premium feature — is the value of unlocking it clear and compelling?
    - Are there features the brand considers premium that users do not value, and is the upgrade barrier in the wrong place?
  - id: upgrade-trigger-design
    name: Upgrade Trigger Design
    description: Designs the context-specific triggers that prompt the upgrade without feeling coercive
    prompts:
    - At what specific moments of high user intent (just accomplished something valuable, just hit a usage limit at a natural workflow endpoint) should the upgrade prompt appear?
    - What framing of the upgrade prompt performs best — capability expansion ("unlock X"), achievement recognition ("you are a power user — upgrade your tools"), or time-limited urgency?
    - How many upgrade prompts per trial period creates the right frequency — enough to drive conversion without creating frustration?
    - What is the upgrade prompt design for users who are clearly not going to convert on the current visit — how does the brand stay relevant without being annoying?
  - id: upsell-sequence
    name: Upsell Sequence Design
    description: Designs the multi-touch upsell journey from activation to paid conversion
    prompts:
    - What is the full sequence of in-app, email, and notification touchpoints that guide an activated trial user to upgrade?
    - What is the optimal timing and content of each touchpoint relative to the user's activation event and trial end date?
    - How does the upsell sequence differ for users who reach activation quickly vs. those who are struggling to find value?
    - What is the win-back sequence for users who reach the end of their trial without converting — is there a time-limited incentive that recovers some of these users?
  - id: conversion-metrics
    name: Conversion Metrics & Success Criteria
    description: Defines the KPIs and success criteria for the trial-to-paid conversion program
    prompts:
    - What is the target trial-to-paid conversion rate, and is it set by benchmarking comparable products or derived from the unit economics model?
    - How is conversion measured — what is the attribution window, and is assisted conversion tracked?
    - What is the target activation rate (percentage of trial users who reach the activation moment) as a leading indicator of conversion rate?
    - What is the expected LTV difference between users who convert organically vs. users who convert with an incentive offer?
output_templates:
- id: primary
  name: Trial-to-Premium Conversion Design Document
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Activation Moment Analysis\n\n{activation_moment_analysis}\n\n## Trial Experience Assessment\n\n{trial_experience_design}\n\n## Value Gap Map\n\n{value_gap_map}\n\n## Upgrade Trigger Design\n\n{upgrade_trigger_design}\n\n## Upsell Sequence\n\n{upsell_sequence}\n\n## Conversion Metrics & Targets\n\n{conversion_metrics}\n\n## Priority A/B Tests\n\n{ab_test_plan}\n\n'
rubric:
  description: Evaluates the rigor and user-centricity of the trial-to-premium conversion design.
  dimensions:
  - name: Activation Moment Validation
    weight: 0.30
    scoring:
      1: Activation moment is defined by the product team's intuition without behavioral data validation.
      3: Activation moment is hypothesized with supporting data but has not been A/B tested to confirm its predictive relationship to conversion.
      5: Activation moment is validated through cohort analysis showing a statistically significant correlation between reaching the activation moment and 30-day conversion rate.
    improvement_guidance: Run a cohort analysis comparing 30-day conversion rates for users who completed each candidate activation action vs. those who did not. The action with the highest conversion rate delta is the validated activation moment.
  - name: Value Gap Clarity
    weight: 0.25
    scoring:
      1: The value gap between trial and paid is either too small (no upgrade motivation) or not clearly communicated at the point of encounter.
      3: Value gap is meaningful but the communication at the locked feature gate does not compellingly convey what upgrading would enable.
      5: Value gap is significant, clearly communicated at every upgrade gate, and the premium value proposition is tested with users who confirm the upgrade motivation is strong.
    improvement_guidance: Conduct user interviews with recent converters asking specifically what finally motivated the upgrade. Use their language in the upgrade prompt copy.
  - name: Trigger Context Appropriateness
    weight: 0.25
    scoring:
      1: Upgrade triggers appear at arbitrary moments unrelated to user intent, creating friction and negative brand perception.
      3: Triggers appear in relevant contexts but the framing is generic and not personalized to the user's specific workflow or goal.
      5: Triggers appear at moments of peak user intent, use contextually relevant framing tied to the specific action the user just attempted, and are personalized by user segment or behavioral profile.
    improvement_guidance: Map every upgrade trigger to a specific user intent state. For each trigger, write the contextual framing that explains exactly how the upgrade helps the user accomplish what they are trying to do right now.
  - name: Sequence Logic
    weight: 0.20
    scoring:
      1: No multi-touch upsell sequence exists; the upgrade is a single moment without supporting context.
      3: A multi-touch sequence is designed but the timing and content are not differentiated by user behavior or proximity to trial end.
      5: The upsell sequence is adaptive — timing, content, and offers are differentiated by activation status, engagement level, and days remaining in trial.
    improvement_guidance: Segment trial users into at least three groups (activated-engaged, activated-low-engagement, not-yet-activated) and design differentiated sequences for each group.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Time-Gate Urgency Without Value
  description: Relying primarily on trial expiration countdown timers to drive conversion rather than genuine value realization, which converts price-pressured users rather than value-convinced users and produces high early churn.
  mitigation: Track the LTV of users who convert within 7 days of trial expiration vs. users who convert earlier. If expiration-converted users churn faster, rebalance conversion triggers toward value-based moments.
- pattern: Feature Desert Trial
  description: Restricting so many features in the trial that users cannot experience enough value to justify upgrading, leading to low activation rates and weak conversion despite strong product quality.
  mitigation: Run a trial experience audit: map which premium features are most commonly encountered and blocked, and evaluate whether each gate is earning its conversion friction or just creating abandonment.
- pattern: Single-Point Upgrade
  description: Designing a single upgrade prompt at trial end rather than a contextual upgrade experience throughout the trial, missing the moments when users have the highest intent to upgrade.
  mitigation: Map all the moments of high user intent during the trial and add contextual upgrade prompts at each one. The best upgrade prompt is the one that appears exactly when the user needs what the upgrade provides.
chaining:
  after:
  - framework_id: plg-hybrid-plg-framework
    reason: PLG framework establishes the overall product-led growth strategy; trial-to-premium design implements the conversion mechanics within that strategy.
  before:
  - framework_id: subscription-economics
    reason: Trial-to-premium conversion rate is a core input to the subscription economics model — MRR growth depends on activation and conversion rate performance.
