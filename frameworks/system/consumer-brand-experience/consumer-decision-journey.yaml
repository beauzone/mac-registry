metadata:
  id: consumer-decision-journey
  version: 1.0.0
  display_name: Consumer Decision Journey (CDJ)
  category: strategy
  description: Maps the non-linear consumer path from initial consideration through purchase, post-purchase loyalty loop, and advocacy. Identifies the most influential touchpoints and moments of truth to focus brand and marketing investment where it has the highest impact on consumer decisions.
  best_for:
    stages:
    - growth
    - scale
    roles:
    - cmo
    - head-of-brand
    - consumer-analytics-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: product_category
    description: The consumer product category, purchase frequency, and average purchase value
    source: user_input
  - field: target_consumer_segment
    description: Primary consumer segment — who they are, their media consumption, and their relationship with the category
    source: user_input
  - field: available_consumer_research
    description: Customer interviews, purchase path surveys, analytics data, or CRM behavioral data available
    source: user_input
  optional:
  - field: current_touchpoint_map
    description: Existing map of brand touchpoints across the consumer journey, if available
    source: user_input
  - field: competitor_journey_insights
    description: Any research on how consumers evaluate and select competitors in this category
    source: user_input
  - field: channel_analytics_data
    description: Analytics data showing where consumers enter and exit the brand's digital touchpoints
    source: user_input
analysis:
  instructions: 'Map the consumer decision journey across six stages, recognizing that the CDJ is circular rather than linear — the post-purchase experience feeds back into the initial consideration set for the next purchase cycle. Stage 1 — Initial Consideration Set: which two to three brands does the consumer include when they first recognize a need? This is driven by salience, not active search. Stage 2 — Active Evaluation: the consumer researches, compares, and winnows the consideration set. Identify the information sources they trust most and the criteria they apply. Stage 3 — Moment of Purchase: what triggers the final decision? What is the role of the purchase environment (online, retail, in-app), promotions, social proof, and the sales interaction? Stage 4 — Post-Purchase Experience: what happens in the first 30 days after purchase that determines whether the consumer is satisfied, disappointed, or delighted? Stage 5 — Loyalty Loop: satisfied consumers re-enter the journey at the active evaluation stage for the next purchase, often bypassing the initial consideration phase entirely. Stage 6 — Advocacy and Brand Bonding: a subset of loyal consumers actively recommend the brand, closing the loop for new consumers'' consideration sets. For each stage, identify the highest-influence touchpoints, the brand''s current performance at those touchpoints, and the highest-leverage improvement opportunities.'
  dimensions:
  - id: initial-consideration
    name: Initial Consideration Set
    description: Identifies how the brand enters (or fails to enter) the consumer's initial consideration set
    prompts:
    - When a consumer in the target segment recognizes a need in this category, what triggers the purchase consideration?
    - Which brands naturally come to mind first, and what drives the brand's inclusion or exclusion from initial consideration?
    - How large is the typical initial consideration set in this category, and what is this brand's inclusion rate?
    - What awareness investments (advertising, word-of-mouth, shelf presence) are most effective at building inclusion in the initial consideration set?
  - id: active-evaluation
    name: Active Evaluation Stage
    description: Maps the research, comparison, and shortlisting process the consumer undertakes
    prompts:
    - What information sources (reviews, social media, retailer websites, friends/family, expert content) are most influential during the evaluation stage for this consumer segment?
    - What product attributes and brand factors are the primary evaluation criteria, and how does this brand perform on each?
    - Where does the brand win or lose during active evaluation — what triggers inclusion or exclusion from the final consideration set?
    - How has digital search and social content changed the evaluation process in this category, and is the brand's presence adequate at these digital touchpoints?
  - id: moment-of-purchase
    name: Moment of Purchase
    description: Identifies the triggers and environmental factors that drive the final purchase decision
    prompts:
    - What finally tips the consumer from consideration to purchase — price promotion, social proof, recommendation, urgency cue, or product trial?
    - How does the purchase environment (online product page, retail shelf, in-app purchase flow) influence the final decision?
    - What role do reviews, ratings, and user-generated content play at the point of purchase?
    - What are the most common reasons a consumer who has reached the purchase stage abandons and does not complete the transaction?
  - id: post-purchase-experience
    name: Post-Purchase Experience
    description: Maps what happens after purchase and determines whether it builds loyalty or drives churn
    prompts:
    - What is the consumer's emotional state in the first 24–72 hours after purchase — excited anticipation, anxiety, or regret?
    - How does the product, packaging, onboarding, and customer service experience in the first 30 days set up the long-term relationship?
    - What post-purchase touchpoints (confirmation email, onboarding sequence, product experience) are currently absent or underinvested?
    - What is the primary driver of post-purchase dissatisfaction, and how frequently does it occur?
  - id: loyalty-and-advocacy
    name: Loyalty Loop & Advocacy
    description: Maps the loyalty loop that brings satisfied consumers back and the advocacy behaviors that fuel word-of-mouth growth
    prompts:
    - What percentage of first-time purchasers enter the loyalty loop and make a second purchase within 90 days?
    - What specific product experience or brand interaction triggers the transition from satisfied customer to active advocate?
    - How are advocates currently spreading brand awareness, and what channels do they use to recommend the brand?
    - What programs or experiences could amplify advocacy behavior in the existing loyal customer base?
  - id: digital-touchpoint-map
    name: Digital Touchpoint Map
    description: Maps all digital brand touchpoints across the journey and evaluates their quality and coverage
    prompts:
    - What digital touchpoints (search results, social profiles, review platforms, email, app notifications) exist at each journey stage?
    - Which digital touchpoints have the highest influence on consumer decisions at each stage, and how is the brand currently performing at those touchpoints?
    - Where are consumers dropping out of the digital journey, and what content or experience is missing to keep them moving forward?
    - What new digital touchpoints (social commerce, AI search, community platforms) are emerging in this category that the brand is not yet present on?
output_templates:
- id: primary
  name: Consumer Decision Journey Map
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## CDJ Stage-by-Stage Analysis\n\n{cdj_stage_analysis}\n\n## Highest-Influence Touchpoints\n\n{high_influence_touchpoints}\n\n## Brand Performance by Stage\n\n{brand_performance_by_stage}\n\n## Digital Touchpoint Audit\n\n{digital_touchpoint_audit}\n\n## Loyalty Loop Analysis\n\n{loyalty_loop_analysis}\n\n## Priority Investment Recommendations\n\n{investment_recommendations}\n\n'
rubric:
  description: Evaluates the depth and actionability of the consumer decision journey mapping.
  dimensions:
  - name: Research Foundation
    weight: 0.30
    scoring:
      1: Journey map is constructed from assumptions without consumer research validation.
      3: Journey map uses some consumer data but key stages rely on hypothesis rather than observed behavior.
      5: Each stage is grounded in consumer research (interviews, surveys, behavioral analytics) and the most influential touchpoints are validated quantitatively.
    improvement_guidance: Conduct at least 15 consumer interviews focused on the last purchase decision in this category before finalizing the journey map. Include consumers who considered and rejected the brand.
  - name: Competitive Perspective
    weight: 0.20
    scoring:
      1: Journey is mapped from the brand's perspective only, without considering how consumers evaluate competitors at each stage.
      3: Competitive touchpoints are mentioned but not systematically compared to the brand's touchpoints.
      5: The journey map explicitly shows where competitors have stronger touchpoints than the brand and identifies the specific gaps to close.
    improvement_guidance: Include competitor consideration set inclusion, evaluation criteria performance, and post-purchase satisfaction data to build a true competitive journey comparison.
  - name: Touchpoint Prioritization
    weight: 0.25
    scoring:
      1: Touchpoints are listed without influence ranking or current performance assessment.
      3: Touchpoints are ranked by influence but performance data is qualitative rather than quantitative.
      5: Touchpoints are ranked by influence (validated by research) and each has a current performance score, creating a gap analysis that drives investment prioritization.
    improvement_guidance: Score touchpoint influence on a 1–5 scale from consumer research and current brand performance on a 1–5 scale from analytics. Prioritize high-influence, low-performance gaps.
  - name: Loyalty Loop Depth
    weight: 0.25
    scoring:
      1: Journey map ends at first purchase without mapping the post-purchase loyalty loop.
      3: Loyalty loop is acknowledged but post-purchase experience and advocacy mechanics are not mapped in detail.
      5: Loyalty loop is fully mapped with behavioral data on repeat purchase rates, advocacy triggers, and digital touchpoints that accelerate the loyalty cycle.
    improvement_guidance: Build a post-purchase cohort analysis tracking behavior at 7, 30, 60, and 90 days after first purchase to map the loyalty loop with behavioral data.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Linear Journey Assumption
  description: Mapping the consumer journey as a linear funnel when the CDJ is circular and non-linear, leading to underinvestment in post-purchase touchpoints that feed the loyalty loop.
  mitigation: Always map the journey as a loop, not a funnel. Ensure post-purchase touchpoints receive investment proportional to their impact on second-purchase conversion and advocacy.
- pattern: Brand-Centric Mapping
  description: Mapping only the touchpoints the brand controls rather than the full consumer experience including competitor touchpoints, peer recommendations, and third-party platforms the brand does not own.
  mitigation: Map the journey from the consumer's perspective, including every source of information and influence they consult — regardless of whether the brand controls it.
- pattern: Ignoring the Consideration Set
  description: Focusing marketing investment on converting consumers who are already aware of the brand while neglecting the initial consideration stage, resulting in a shrinking pool of brand-aware prospects over time.
  mitigation: Track brand inclusion in the initial consideration set as a leading indicator metric. Invest in awareness and salience to ensure the brand is in the first two to three brands consumers think of when a need arises.
chaining:
  after:
  - framework_id: stp-segmentation-targeting-positioning
    reason: STP defines which consumer segment's journey to map; CDJ reveals how that segment actually makes decisions in this category.
  - framework_id: jtbd
    reason: Jobs-to-be-Done reveals what the consumer is trying to accomplish; CDJ maps how they go about finding and selecting a solution.
  before:
  - framework_id: messaging-architecture
    reason: CDJ stage analysis identifies which messages are most relevant at each decision stage, informing the messaging architecture's stage-specific content strategy.
  - framework_id: cx-mapping
    reason: CDJ provides the strategic journey framework; CX mapping zooms into the experience design at each touchpoint.
