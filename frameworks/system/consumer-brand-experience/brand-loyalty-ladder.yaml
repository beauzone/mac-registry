metadata:
  id: brand-loyalty-ladder
  version: 1.0.0
  display_name: Brand Loyalty Ladder
  category: strategy
  description: Maps consumers across six loyalty stages from Suspect to Partner, designs stage-appropriate engagement programs and upgrade mechanics, and models the loyalty economics that justify investment in moving consumers up the ladder.
  best_for:
    stages:
    - growth
    - scale
    - mature
    roles:
    - cmo
    - head-of-loyalty
    - crm-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: customer_base_data
    description: Customer database with purchase history, frequency, recency, and any behavioral data available
    source: user_input
  - field: product_category
    description: Consumer product category — purchase frequency, price point, and natural repurchase cycle
    source: user_input
  - field: loyalty_program_status
    description: Current loyalty program or engagement program, if any, and its structure
    source: user_input
  optional:
  - field: ltv_by_loyalty_level
    description: LTV data segmented by engagement level or loyalty tier, if available
    source: user_input
  - field: churn_rates_by_segment
    description: Churn rates for different customer segments — first-time buyers, repeat buyers, high-value loyalists
    source: user_input
  - field: competitive_loyalty_programs
    description: How direct competitors structure their loyalty programs and what rewards they offer
    source: user_input
analysis:
  instructions: 'Map the brand''s customer base across the six-stage Loyalty Ladder: Stage 1 — Suspect (potential customers who match the ICP but have not heard of the brand), Stage 2 — Prospect (aware of the brand and has shown interest but has not purchased), Stage 3 — Customer (has made at least one purchase), Stage 4 — Client (repeat purchaser with a regular relationship, not yet brand-committed), Stage 5 — Advocate (actively recommends the brand to others, strong attitudinal attachment), Stage 6 — Partner (co-creator, community leader, brand ambassador with formal relationship). For each stage, define the behavioral indicators that classify a consumer at that stage, the engagement program designed to deepen the relationship, the upgrade mechanic that moves consumers to the next stage, and the economics of doing so. Model the ladder economics: quantify the LTV and referral value difference between each stage to calculate the ROI of ladder advancement programs. Identify the stage with the largest drop-off in volume (typically Stage 3 to Stage 4 — Customer to Client) as the primary investment priority. Conclude with a ladder activation roadmap and program design specifications.'
  dimensions:
  - id: loyalty-stage-mapping
    name: Loyalty Stage Population Mapping
    description: Maps the brand's current customer base across loyalty stages using behavioral data
    prompts:
    - What percentage of the customer base sits at each loyalty stage based on purchase frequency, recency, and referral behavior?
    - Which stage has the largest absolute population and which stage has the greatest gap between current and potential population?
    - How has the distribution across loyalty stages shifted over the past 12 months — is the base becoming more or less loyal overall?
    - What behavioral data signals classify a consumer at each stage, and are those signals observable in the current CRM or analytics system?
  - id: stage-upgrade-mechanics
    name: Stage Upgrade Mechanics
    description: Defines the specific triggers and programs that move consumers from each stage to the next
    prompts:
    - What is the single most effective intervention for moving consumers from Customer (Stage 3) to Client (Stage 4) — the most commercially significant upgrade?
    - What milestone or experience reliably converts a satisfied Client into an active Advocate who spontaneously recommends the brand?
    - Which upgrade mechanics are incentive-dependent (require a financial offer) and which are experience-dependent (require a remarkable brand experience)?
    - What is the ideal timing of upgrade interventions relative to the consumer's natural repurchase cycle?
  - id: loyalty-program-design
    name: Loyalty Program Design
    description: Designs the loyalty program structure, rewards, and mechanics for stages 3–5
    prompts:
    - Should the loyalty program be points-based, tier-based, or experience-based, and which structure best fits this product's purchase frequency?
    - What reward types (monetary, experiential, status, exclusive access, co-creation) are most motivating for each consumer segment?
    - How is the loyalty program differentiated from competitive programs — what makes it worth joining and remaining active in?
    - What is the loyalty program breakage rate (points or rewards earned but not redeemed), and is it modeled into the program economics?
  - id: advocate-program
    name: Advocate Program Design
    description: Designs the program to identify, recognize, and amplify Stage 5 Advocates
    prompts:
    - How are Advocates identified — by NPS score, referral activity, UGC creation, or community participation?
    - What recognition or exclusive access do Advocates receive that deepens their relationship and motivates continued advocacy?
    - How is Advocate-generated content (reviews, UGC, testimonials) captured, licensed, and amplified in paid and organic marketing?
    - What is the pathway from Advocate to Partner — at what scale or engagement level is a formal ambassador relationship appropriate?
  - id: loyalty-economics
    name: Loyalty Economics Model
    description: Models the commercial value of advancing consumers up the loyalty ladder
    prompts:
    - What is the LTV difference between a Stage 3 Customer and a Stage 4 Client, and what investment is justified to close that gap?
    - What is the referral value generated by Stage 5 Advocates — how many new customers does each Advocate generate per year?
    - What is the ROI of the loyalty program including reward cost, program overhead, and the incremental revenue generated by consumers who enrolled?
    - At what loyalty stage does the brand achieve a positive CLV (customer lifetime value) after accounting for acquisition cost?
output_templates:
- id: primary
  name: Brand Loyalty Ladder Analysis & Program Design
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Loyalty Stage Population Map\n\n{stage_population_map}\n\n## Stage Upgrade Mechanics\n\n{upgrade_mechanics}\n\n## Loyalty Program Design\n\n{loyalty_program_design}\n\n## Advocate Program\n\n{advocate_program}\n\n## Loyalty Economics Model\n\n{loyalty_economics}\n\n## Priority Investment Recommendation\n\n{investment_recommendation}\n\n## Activation Roadmap\n\n{activation_roadmap}\n\n'
rubric:
  description: Evaluates the commercial rigor and program design quality of the loyalty ladder analysis.
  dimensions:
  - name: Stage Classification Clarity
    weight: 0.25
    scoring:
      1: Stage classification is conceptual with no behavioral indicators defined that could be applied to a real customer database.
      3: Stage behavioral indicators are defined but some rely on data the brand does not currently collect.
      5: Every stage has precise, observable behavioral indicators that can be applied to existing CRM data to produce a stage population report within one week.
    improvement_guidance: For each stage classification rule, verify that the required data field exists in the CRM. If not, add it to the data collection roadmap.
  - name: Upgrade Mechanic Specificity
    weight: 0.25
    scoring:
      1: Upgrade mechanics are described conceptually without specific program designs, timing, or trigger criteria.
      3: Upgrade mechanics are defined for some stage transitions but not all, and timing recommendations are vague.
      5: Every stage transition has a specific upgrade mechanic with defined trigger condition, intervention design, timing, and a success metric for evaluating effectiveness.
    improvement_guidance: Design upgrade mechanics as A/B tests — for each stage transition, test two different interventions with a holdout group to identify the highest-converting upgrade trigger.
  - name: Loyalty Economics Rigor
    weight: 0.30
    scoring:
      1: Loyalty program is designed without modeling the financial return on the program investment.
      3: Program economics are estimated but use industry averages rather than brand-specific LTV and referral data.
      5: Program ROI is modeled with brand-specific LTV by stage, referral value by stage, program cost, and breakage rate — producing a clear investment justification.
    improvement_guidance: Build a loyalty economics model in a spreadsheet with adjustable LTV, stage upgrade conversion rate, and program cost inputs. Model the 3-year ROI at different program investment levels.
  - name: Advocate Program Activation
    weight: 0.20
    scoring:
      1: Advocate program is not designed; loyal customers are not identified or engaged differently from regular customers.
      3: Advocate program is defined but lacks specific activation mechanics or a system for identifying and reaching Advocates.
      5: Advocate program has a specific identification system, recognition mechanics, UGC capture process, and content amplification workflow.
    improvement_guidance: Use NPS Promoter status as the starting point for Advocate identification. Build an automated workflow that tags Promoters in the CRM and triggers the Advocate welcome experience within 48 hours of their NPS survey response.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Loyalty Program Without Behavioral Change
  description: Designing a loyalty program that rewards existing high-frequency behavior rather than changing the behavior of mid-loyalty consumers, resulting in a program that costs money to reward customers who would have stayed loyal anyway.
  mitigation: Design upgrade mechanics that target Stage 3 Customers moving to Stage 4 Clients — this is where the largest behavioral change and the highest commercial return are available. Measure incremental purchase frequency in enrolled vs. non-enrolled customer cohorts.
- pattern: Points Currency Inflation
  description: Making loyalty points so easy to earn that the reward feels meaningless, or so hard to redeem that consumers disengage, resulting in high breakage but low advocacy.
  mitigation: Set point earn rates and redemption values that create visible milestones within 60–90 days of enrollment. Conduct user research to identify the "reward sweet spot" where consumers feel the program is worth participating in.
- pattern: Neglecting the Advocate Stage
  description: Investing in acquisition and early loyalty programs while ignoring the Stage 5 Advocate segment, missing the highest-ROI consumer relationship the brand has.
  mitigation: Identify the top 5–10% of customers by purchase frequency and referral activity. Create a dedicated advocate experience that goes beyond points rewards to include genuine access, recognition, and co-creation opportunities.
chaining:
  after:
  - framework_id: aarrr-pirate-metrics
    reason: AARRR provides the retention and referral metrics that identify which customers are operating at which loyalty stage.
  before:
  - framework_id: retention-lifecycle-plan
    reason: Loyalty ladder maps the strategic stage model; retention lifecycle plan designs the operational marketing programs for each stage.
