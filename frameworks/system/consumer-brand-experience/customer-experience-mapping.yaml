metadata:
  id: customer-experience-mapping
  version: 1.0.0
  display_name: Customer Experience (CX) Mapping
  category: strategy
  description: Comprehensive mapping of the consumer experience across all brand touchpoints from first awareness through post-purchase. Identifies friction points, emotional highs and lows, and prioritizes experience improvement opportunities by their impact on retention and advocacy.
  best_for:
    stages:
    - growth
    - scale
    - optimization
    roles:
    - cmo
    - head-of-brand
    - consumer-product-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: journey_scope
    description: Which journey stages to map — full lifecycle or specific stages (e.g., onboarding only, post-purchase only)
    source: user_input
  - field: consumer_persona
    description: The specific consumer persona or segment this CX map is built for
    source: user_input
  - field: touchpoint_inventory
    description: List of known touchpoints the brand manages (website, email, packaging, app, retail, customer service)
    source: user_input
  optional:
  - field: consumer_research
    description: Any customer interviews, satisfaction surveys, NPS data, or support ticket analysis available
    source: user_input
  - field: operational_data
    description: Drop-off rates, page load times, support ticket volume by category, or other operational experience data
    source: user_input
  - field: competitive_experience_benchmarks
    description: Qualitative or quantitative data on the consumer experience delivered by direct competitors
    source: user_input
analysis:
  instructions: 'Build the CX map across five dimensions. First, create a journey stage map: define each stage the consumer moves through from pre-purchase awareness to active advocacy, and list every touchpoint at each stage — both brand-controlled and third-party. Second, score the emotional experience at each touchpoint: for each touchpoint, determine what the consumer is thinking (cognitive load, information needs), feeling (emotional state — excited, confused, frustrated, delighted), and doing (specific actions they are taking). Use consumer research to validate rather than assume emotional states. Third, conduct a touchpoint quality audit: score each touchpoint on a 1–5 scale for content quality, interaction quality, and brand consistency. Flag touchpoints that are broken, absent, or significantly below standard. Fourth, identify friction points: the moments where the consumer''s path is interrupted, confused, delayed, or abandoned. Rank friction points by the volume of consumers affected and the severity of the experience failure. Fifth, prioritize redesign opportunities: use a 2×2 matrix of consumer impact vs. implementation effort to identify quick wins (high impact, low effort) and strategic priorities (high impact, high effort). Conclude with a CX improvement roadmap with owner assignments and success metrics.'
  dimensions:
  - id: journey-stage-mapping
    name: Journey Stage Mapping
    description: Creates the foundational map of journey stages and touchpoints
    prompts:
    - What are the discrete stages in this consumer's journey with this brand, and what is the entry and exit condition for each stage?
    - At each stage, what are all the touchpoints — both brand-controlled (website, email, packaging, app) and third-party (review sites, social media, retail)?
    - Which touchpoints are the consumer's first choice for information at each stage, and which do they encounter incidentally?
    - What journey variations exist across consumer segments or acquisition channels, and should multiple CX maps be built?
  - id: emotional-experience-scoring
    name: Emotional Experience Scoring
    description: Maps the consumer's emotional state at each touchpoint to identify highs, lows, and moments of truth
    prompts:
    - What is the consumer's emotional state (anxiety, excitement, confusion, trust, delight) at each major touchpoint?
    - Which touchpoints are "moments of truth" — the ones where the brand makes or breaks the relationship with the consumer?
    - Where does the emotional experience drop significantly — from positive to neutral or from neutral to negative?
    - What would the consumer describe as the most frustrating moment in their journey with this brand?
  - id: touchpoint-audit
    name: Touchpoint Quality Audit
    description: Assesses the quality of each touchpoint against content, interaction design, and brand consistency standards
    prompts:
    - Is each touchpoint delivering the right information to meet the consumer's need at that stage of the journey?
    - Are interaction design standards (load time, mobile responsiveness, accessibility, visual hierarchy) met at each digital touchpoint?
    - Is brand voice, visual identity, and tone consistent across all touchpoints, or are there jarring inconsistencies?
    - Which touchpoints are entirely absent — gaps in the journey where the consumer has a need but the brand has no presence?
  - id: friction-identification
    name: Friction Point Identification & Ranking
    description: Identifies and ranks the points in the journey where the consumer experience breaks down
    prompts:
    - What are the top five friction points in the consumer journey, defined as moments where the consumer's progress is interrupted, delayed, or frustrated?
    - What is the volume of consumers affected by each friction point, and what percentage abandon the journey at that point?
    - Which friction points are caused by product or service failures vs. communication failures vs. interaction design failures?
    - What is the estimated revenue impact of the top three friction points in terms of lost conversions or reduced retention?
  - id: experience-redesign-priorities
    name: Experience Redesign Prioritization
    description: Prioritizes CX improvements using an impact vs. effort matrix
    prompts:
    - Which friction points or missing touchpoints have the highest potential impact on consumer satisfaction and retention if fixed?
    - Which improvements are quick wins — high impact with low implementation effort and minimal system change?
    - Which improvements are strategic priorities — high impact but requiring significant investment, cross-functional coordination, or technology change?
    - For each priority improvement, what are the specific design requirements, success metrics, and responsible teams?
output_templates:
- id: primary
  name: CX Map & Improvement Roadmap
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Journey Stage Map & Touchpoint Inventory\n\n{journey_stage_map}\n\n## Emotional Experience Curve\n\n{emotional_experience_curve}\n\n## Touchpoint Quality Scores\n\n{touchpoint_quality_scores}\n\n## Friction Point Analysis\n\n{friction_point_analysis}\n\n## Redesign Priority Matrix\n\n{priority_matrix}\n\n## CX Improvement Roadmap\n\n{improvement_roadmap}\n\n'
rubric:
  description: Evaluates the completeness and consumer-centricity of the CX mapping exercise.
  dimensions:
  - name: Consumer Perspective Authenticity
    weight: 0.30
    scoring:
      1: CX map is built from internal team assumptions without any consumer input or behavioral data.
      3: Some consumer input is incorporated but the map relies heavily on internal assumptions for key touchpoints.
      5: Every emotional state and friction point is validated by consumer research — interviews, surveys, or behavioral analytics — rather than internal assumption.
    improvement_guidance: Conduct at least 10 consumer journey interviews, shadowing consumers through actual product use and purchase decisions, before finalizing the emotional experience curve.
  - name: Friction Quantification
    weight: 0.25
    scoring:
      1: Friction points are identified qualitatively but not quantified in terms of consumer volume or revenue impact.
      3: Friction points are quantified by consumer volume but revenue impact is estimated rather than calculated.
      5: Each friction point is quantified by both the volume of consumers affected and the estimated revenue impact of resolution, enabling ROI-based prioritization.
    improvement_guidance: Connect friction point data to conversion analytics to calculate the revenue impact of each friction point. A 1% improvement in checkout completion on $10M revenue is $100K — this makes prioritization concrete.
  - name: Touchpoint Coverage
    weight: 0.25
    scoring:
      1: Map only includes brand-controlled touchpoints and ignores third-party touchpoints where consumers form opinions.
      3: Third-party touchpoints are included but not assessed for brand performance at those touchpoints.
      5: All touchpoints — brand-controlled and third-party — are mapped, and the brand's performance at third-party touchpoints (review sites, social, retailer) is assessed and included in the improvement plan.
    improvement_guidance: Include Google reviews, Amazon reviews (if applicable), social media brand mentions, and retailer listings in the touchpoint audit alongside owned digital properties.
  - name: Improvement Roadmap Specificity
    weight: 0.20
    scoring:
      1: Roadmap is a list of improvement areas without owners, timelines, or success metrics.
      3: Roadmap includes owners and timelines but success metrics are vague or absent.
      5: Roadmap has specific owners, timelines, resource requirements, and SMART success metrics for each improvement initiative.
    improvement_guidance: Write each roadmap item as a one-page design brief with a clear problem statement, proposed solution, success metric, owner, and timeline.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Inside-Out Mapping
  description: Building the CX map from the company's internal process flow rather than the consumer's actual experience, resulting in a map that reflects operational silos rather than consumer reality.
  mitigation: Start with consumer interviews and observation before touching internal process documentation. Let the consumer's experience define the journey stages, then map internal processes to those stages.
- pattern: Touchpoint Perfection at the Expense of Sequencing
  description: Optimizing individual touchpoints in isolation without considering whether they appear in the right sequence at the right moment, leading to excellent touchpoints that consumers encounter at the wrong time.
  mitigation: Evaluate every touchpoint improvement in the context of where it sits in the full journey sequence. Ask: does the consumer have the context they need to benefit from this touchpoint at this moment?
- pattern: One-and-Done Mapping
  description: Treating the CX map as a one-time exercise rather than a living document that is updated as the product, channels, and consumer behavior evolve.
  mitigation: Schedule a quarterly CX map review with the cross-functional team. Incorporate new consumer research and behavioral data at each review to keep the map current.
chaining:
  after:
  - framework_id: consumer-decision-journey
    reason: CDJ provides the strategic journey framework; CX mapping zooms into the experience design and touchpoint quality at each stage.
  before:
  - framework_id: nps-csat-ces-strategy
    reason: CX mapping identifies the experience hypotheses; NPS/CSAT/CES strategy designs the measurement system to validate which improvements are driving satisfaction.
