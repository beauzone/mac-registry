metadata:
  id: consumer-persona-purchase-influence-map
  version: 1.0.0
  display_name: Consumer Persona & Purchase Influence Map
  category: research
  description: Synthesizes consumer archetype profiles with behavioral purchase influence mapping — media consumption, trust signals, social proof requirements, price sensitivity triggers, and decision barriers — to produce actionable creative and channel briefs.
  best_for:
    stages:
    - pre-launch
    - launch
    - growth
    roles:
    - cmo
    - head-of-brand
    - consumer-analytics-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: consumer_research_data
    description: Qualitative and/or quantitative consumer research — interviews, surveys, behavioral analytics, or purchase data
    source: user_input
  - field: target_segment_description
    description: The target consumer segment — demographics, psychographics, category behavior, and relationship with the brand
    source: user_input
  - field: product_category
    description: The consumer category, product type, and purchase decision complexity level
    source: user_input
  optional:
  - field: crm_behavioral_data
    description: Purchase frequency, basket size, channel attribution, and retention data from the customer database
    source: user_input
  - field: social_media_analytics
    description: Content engagement data, audience demographics, and content performance by topic
    source: user_input
  - field: competitor_positioning
    description: How competitors are positioned and which consumer archetypes they are targeting
    source: user_input
analysis:
  instructions: 'Build consumer archetype profiles and map their purchase influence dynamics across six dimensions. First, define the archetype: a narrative profile of the primary consumer type including age range, life stage, values, interests, and their relationship with the product category. Limit to two or three archetypes for the priority segment. Second, map the media touchpoint landscape: where does this archetype consume content (platforms, format preferences, trusted publishers), and what is their relationship with advertising on each platform? Third, define the purchase influence hierarchy: for this archetype and category, rank the trust signals from most to least influential (peer recommendation, expert review, celebrity/influencer, brand advertising, user reviews, trial, demonstration). Fourth, map social proof requirements: what evidence does this archetype need before purchasing — how many reviews, what star rating threshold, do they read review text or scan scores, and are they influenced by local vs. anonymous social proof? Fifth, model price sensitivity triggers: at what price point does friction increase significantly, and what factors (urgency, quality cue, social proof, trial offer) most effectively overcome price resistance? Sixth, define decision barriers: what specific objections, doubts, or hesitations prevent purchase, and what content or experience most effectively resolves each barrier?'
  dimensions:
  - id: archetype-definition
    name: Consumer Archetype Definition
    description: Creates narrative archetype profiles grounded in research for the primary consumer segments
    prompts:
    - Who is this consumer archetype in terms of life stage, values, and relationship with the product category?
    - What does a day in their life look like, and where does the product fit into their routine or aspirations?
    - How does this archetype relate to the brand — do they already know it, have opinions about it, or is it unknown to them?
    - What is the archetype's relationship with the category overall — experienced buyer, first-time buyer, lapsed user, or category skeptic?
  - id: media-touchpoint-map
    name: Media & Touchpoint Landscape
    description: Maps where the archetype consumes content and their receptivity to brand communication on each platform
    prompts:
    - Which platforms does this archetype use daily, and in what context (discovery, entertainment, utility, connection)?
    - What content formats (video, long-form article, podcast, short-form social, community) does this archetype engage with most deeply?
    - Which publishers, creators, or community spaces have this archetype's trust and attention in the category?
    - How does this archetype respond to advertising — do they engage, ignore, or actively block it on each platform?
  - id: purchase-influence-factors
    name: Purchase Influence Hierarchy
    description: Ranks the influence sources that drive purchase decisions for this archetype in this category
    prompts:
    - When making a purchase decision in this category, what is this archetype's most trusted source of information — friends, experts, reviews, or brand content?
    - How does the influence hierarchy change between the consideration stage and the final purchase decision?
    - Which influence source has the highest ROI for the brand to invest in — where can the brand get the most impact per dollar?
    - Is this archetype more influenced by aspirational role models or by peers who share their current life situation?
  - id: trust-signal-hierarchy
    name: Trust Signal Hierarchy
    description: Defines the specific trust signals required before this archetype is willing to purchase
    prompts:
    - What specific trust signals does this archetype look for on a product page or in brand communication — certifications, reviews, guarantees, brand history?
    - How many product reviews does this archetype need to see before feeling comfortable making a first purchase?
    - Is this archetype more influenced by a small number of detailed reviews or a large number of short ratings?
    - What brand transparency factors (ingredient sourcing, company values, sustainability, founder story) are meaningful trust signals for this archetype?
  - id: price-sensitivity-model
    name: Price Sensitivity Model
    description: Maps the price sensitivity triggers and the factors that most effectively overcome price resistance
    prompts:
    - At what absolute price point does this archetype's purchase hesitation increase significantly?
    - What is the archetype's internal reference price for this category, and how does this brand's price compare?
    - Which offers or value framing (cost-per-use, comparison to alternatives, free trial, money-back guarantee) most effectively reduce price resistance for this archetype?
    - Is this archetype more price-sensitive for initial purchase or for ongoing subscription/repurchase, and what does that imply for pricing strategy?
  - id: decision-barrier-analysis
    name: Decision Barrier Analysis
    description: Identifies and maps the specific objections and doubts that prevent purchase
    prompts:
    - What is the most common objection this archetype raises before purchasing, and what content or experience most effectively resolves it?
    - Is the primary barrier rational (price, functionality, comparison) or emotional (risk of disappointment, peer judgment, identity mismatch)?
    - What would this archetype need to see, hear, or experience to move from consideration to immediate purchase?
    - Are there category-level misconceptions or fears that create decision barriers independent of the brand's specific offering?
output_templates:
- id: primary
  name: Consumer Persona & Purchase Influence Map
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Archetype Profiles\n\n{archetype_profiles}\n\n## Media & Touchpoint Landscape\n\n{media_touchpoint_map}\n\n## Purchase Influence Hierarchy\n\n{influence_hierarchy}\n\n## Trust Signal Requirements\n\n{trust_signal_hierarchy}\n\n## Price Sensitivity Model\n\n{price_sensitivity_model}\n\n## Decision Barrier Analysis\n\n{decision_barrier_analysis}\n\n## Creative & Channel Implications\n\n{creative_channel_implications}\n\n'
rubric:
  description: Evaluates the research depth and actionability of the consumer persona and influence map.
  dimensions:
  - name: Research Foundation
    weight: 0.30
    scoring:
      1: Archetypes are based on demographic assumptions without primary consumer research validation.
      3: Archetypes draw on some consumer research but key influence factors rely on category assumption rather than this brand's specific consumer data.
      5: Each archetype is built from primary consumer research with validated behavioral indicators, media consumption data, and purchase influence rankings drawn from this brand's actual consumers.
    improvement_guidance: Conduct at least 10 in-depth consumer interviews per archetype focused specifically on the purchase decision process in this category before finalizing the influence map.
  - name: Purchase Influence Specificity
    weight: 0.25
    scoring:
      1: Influence hierarchy is generic (peer recommendation always matters) without calibration to this category and archetype.
      3: Influence hierarchy is category-specific but not ranked quantitatively or validated against behavioral data.
      5: Influence hierarchy is ranked by measured impact on purchase probability for this specific archetype and category, validated with survey or behavioral data.
    improvement_guidance: Run a MaxDiff or conjoint survey asking consumers to rank influence sources by importance in their last purchase decision in this category.
  - name: Decision Barrier Specificity
    weight: 0.25
    scoring:
      1: Decision barriers are listed as generic objections without evidence that they apply specifically to this archetype.
      3: Barriers are archetype-specific but are not ranked by frequency or severity.
      5: Decision barriers are ranked by frequency (how often they prevent purchase) and severity (how strongly they block conversion), with specific creative treatments designed to overcome each.
    improvement_guidance: Add an abandon survey or post-purchase survey question asking consumers to identify their biggest hesitation before purchasing. Use that data to rank barriers by actual frequency.
  - name: Creative & Channel Actionability
    weight: 0.20
    scoring:
      1: Analysis produces insight but does not translate into specific creative or channel recommendations.
      3: Creative implications are stated at a high level but lack specific execution direction.
      5: Each trust signal, influence source, and barrier is translated into specific creative messages, formats, and channel placements that a media planner or creative director can act on immediately.
    improvement_guidance: Write the creative brief implications section as if briefing an agency — include specific messages, visual directions, channel placements, and the specific objection each creative piece is designed to overcome.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Demographic-Only Archetypes
  description: Defining consumer archetypes by age and gender alone without psychographic, behavioral, or attitudinal dimensions, producing personas that are too generic to drive distinctive creative or channel decisions.
  mitigation: For every demographic descriptor, add a corresponding behavioral or attitudinal indicator: not "Women 25–34" but "Women 25–34 who follow 10+ wellness creators and research products for 2+ weeks before purchasing."
- pattern: Static Influence Maps
  description: Building the influence map as a one-time exercise without updating it as media consumption habits, platform algorithms, and category norms evolve.
  mitigation: Review the influence map annually with a consumer survey refresh. Add a social listening layer to detect when new platforms or creators are gaining significant influence in the category.
- pattern: Barrier-Free Persona
  description: Writing consumer personas that describe only the consumer's aspirations and media consumption without honestly addressing why they would not buy, leading to marketing that ignores the real objections.
  mitigation: Require at least three decision barriers per archetype and ensure each barrier is addressed somewhere in the brand's content and creative strategy before the persona is approved.
chaining:
  after:
  - framework_id: stp-segmentation-targeting-positioning
    reason: STP defines the priority segments; the persona and influence map builds the detailed behavioral profile needed to activate those segments.
  before:
  - framework_id: messaging-architecture
    reason: Purchase influence hierarchy and decision barrier analysis directly inform which messages the brand should prioritize in its messaging architecture.
  - framework_id: campaign-brief
    reason: Archetype profiles and media touchpoint maps are the foundational inputs for campaign brief development.
