metadata:
  id: social-listening-sentiment-analysis
  version: 1.0.0
  display_name: Social Listening & Sentiment Analysis
  category: research
  description: Structures the social listening program to extract brand health signals, competitive intelligence, consumer trend detection, and crisis early warning from social media and online communities — and defines the insight-to-action workflow that connects listening data to marketing decisions.
  best_for:
    stages:
    - growth
    - scale
    - mature
    roles:
    - cmo
    - head-of-brand
    - social-community-manager
    - consumer-analytics-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: brand_and_category
    description: Brand name, product category, and any known brand aliases, hashtags, or product names to monitor
    source: user_input
  - field: listening_objective
    description: Primary goal — brand health monitoring, competitive intelligence, trend detection, crisis management, or customer insight extraction
    source: user_input
  - field: available_platforms
    description: Social listening platforms available or under consideration (Brandwatch, Sprout Social, Mention, Talkwalker, native platform analytics)
    source: user_input
  optional:
  - field: competitive_set
    description: Competitor brands to monitor alongside the brand
    source: user_input
  - field: current_brand_sentiment
    description: Any existing brand sentiment data — NPS, review scores, or prior social listening reports
    source: user_input
  - field: crisis_history
    description: Any prior brand reputation incidents that inform crisis early warning signal design
    source: user_input
analysis:
  instructions: 'Design the social listening program across six dimensions. First, define the listening platform and keyword strategy: what queries capture on-brand mentions (brand name, product names, hashtags, CEO name), off-brand category conversations (where consumers discuss the category without mentioning the brand), and competitive mentions? Boolean query design is critical — poorly designed queries produce noisy, unanalyzable data. Second, design the brand sentiment tracking system: how sentiment is measured (automated NLP classification, manual sampling, or hybrid), what the target sentiment composition is (positive/neutral/negative ratio), and what alerts are triggered by sentiment shifts. Third, design the competitive intelligence extraction process: what signals from competitor mentions are most valuable — product complaint patterns, campaign response rates, pricing reactions, and feature requests that competitors are not addressing? Fourth, design the trend detection workflow: how emerging topics and themes are identified from the conversation data, evaluated for brand relevance, and escalated to the marketing and product teams. Fifth, define the crisis early warning system: what signals (volume spike, sentiment shift, influencer amplification, journalist inquiry) trigger crisis monitoring mode and what the escalation protocol is. Sixth, design the insight-to-action workflow: the recurring process that converts social listening data into specific marketing decisions — campaign adjustments, message optimization, product feedback, and content opportunities.'
  dimensions:
  - id: listening-platform-strategy
    name: Listening Platform & Query Strategy
    description: Selects the listening platform and designs the query architecture to capture relevant conversations
    prompts:
    - What combination of listening platforms (paid tool plus native platform analytics) covers the brand''s priority social channels adequately?
    - What Boolean query architecture captures brand mentions, category conversations, and competitive mentions without excessive noise?
    - How are ambiguous brand names or common words handled in the query design to minimize false positive mentions?
    - What is the data retention and historical data access capability of the selected platform — can the brand access conversation history for trend analysis?
  - id: brand-sentiment-tracking
    name: Brand Sentiment Tracking
    description: Designs the sentiment monitoring system and defines alert thresholds
    prompts:
    - What is the current baseline brand sentiment distribution (positive/neutral/negative percentages), and what is the target improvement?
    - How is sentiment measured for this brand''s category — does the automated NLP engine perform adequately for category-specific language, or does manual sampling calibration improve accuracy?
    - What sentiment shift magnitude or volume threshold triggers an alert requiring immediate team review?
    - How is sentiment tracked separately by topic (product quality, customer service, pricing, brand values) to enable root cause diagnosis of sentiment shifts?
  - id: competitive-intelligence
    name: Competitive Intelligence Extraction
    description: Defines what competitor signals are most valuable and how they are systematically captured
    prompts:
    - Which competitor brands and products should be monitored, and what conversation signals are most valuable for competitive strategy decisions?
    - What patterns in competitor negative sentiment reveal product gaps or positioning weaknesses that represent opportunities for the brand?
    - How is competitor campaign activity tracked — launch dates, message themes, consumer response volume and sentiment?
    - What consumer requests or frustrations directed at competitors represent unmet needs the brand could address with product or messaging changes?
  - id: trend-detection
    name: Consumer Trend Detection
    description: Designs the process for identifying emerging topics and translating them into brand-relevant insights
    prompts:
    - What topic tracking methodology surfaces emerging trends before they reach mainstream media — share of voice growth, emerging hashtag velocity, or keyword frequency analysis?
    - What criteria determine whether a detected trend is relevant and actionable for this brand (category relevance, target segment adoption, commercial applicability)?
    - How quickly can the brand respond to a detected trend — what is the content approval and production process that enables timely trend response?
    - What trend signals are forwarded to the product team as potential product development inputs?
  - id: crisis-early-warning
    name: Crisis Early Warning System
    description: Defines the signals and escalation protocol for detecting and responding to brand reputation risks
    prompts:
    - What volume spike above the brand''s conversation baseline triggers crisis monitoring mode (e.g., 3× average daily volume within 4 hours)?
    - What sentiment shift magnitude (e.g., negative sentiment exceeding 30% of daily volume) triggers immediate leadership notification?
    - What influencer amplification threshold (an influencer with X+ followers sharing a negative post) triggers immediate response escalation?
    - Who is notified at each escalation level, what is the response SLA at each level, and who has the authority to approve brand responses to crisis content?
  - id: insight-to-action-workflow
    name: Insight-to-Action Workflow
    description: Defines the recurring process that converts listening data into specific marketing and product decisions
    prompts:
    - What is the regular cadence for reviewing social listening data — daily for crisis monitoring, weekly for brand health, monthly for trend and competitive intelligence?
    - Who receives the weekly brand health report, and what decisions is that audience expected to make based on the data?
    - What is the process for escalating a trend or competitive intelligence finding to the marketing leadership team for a decision on whether to act?
    - How is the impact of marketing decisions validated through subsequent social listening data — is there a before-and-after measurement approach?
output_templates:
- id: primary
  name: Social Listening Program Design
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Platform & Query Strategy\n\n{platform_query_strategy}\n\n## Brand Sentiment Tracking Design\n\n{sentiment_tracking_design}\n\n## Competitive Intelligence Framework\n\n{competitive_intelligence_framework}\n\n## Trend Detection Process\n\n{trend_detection_process}\n\n## Crisis Early Warning Protocol\n\n{crisis_early_warning}\n\n## Insight-to-Action Workflow\n\n{insight_to_action_workflow}\n\n## Program Governance\n\n{program_governance}\n\n'
rubric:
  description: Evaluates the operational completeness and decision relevance of the social listening program.
  dimensions:
  - name: Query Architecture Quality
    weight: 0.25
    scoring:
      1: Listening is set up with simple brand name keyword monitoring that misses the majority of relevant off-brand conversations and produces high noise volume.
      3: Query architecture covers brand mentions and category conversations but Boolean logic is not optimized, producing a significant false positive rate.
      5: Query architecture uses well-structured Boolean logic that captures brand, category, competitor, and trend conversations with a false positive rate below 15%, validated by manual sampling.
    improvement_guidance: Randomly sample 50 results from the current query and assess what percentage are genuinely relevant. If relevance is below 80%, the Boolean query requires refinement before the data can be trusted for decision-making.
  - name: Sentiment Analysis Validity
    weight: 0.25
    scoring:
      1: Automated sentiment classification is accepted at face value without validating its accuracy for this brand''s category vocabulary and consumer language patterns.
      3: Sentiment accuracy is assessed but manual calibration is not applied to improve classification for category-specific language.
      5: Sentiment classification accuracy is validated through manual sampling (100+ posts), and calibration adjustments are applied for category-specific terms, sarcasm patterns, and brand-specific language.
    improvement_guidance: Manually code 200 random posts from the listening dataset and compare the manual codes to the automated sentiment classification. If agreement is below 75%, retrain or adjust the classification model with category-specific rules.
  - name: Crisis Protocol Completeness
    weight: 0.25
    scoring:
      1: Crisis protocol does not exist or relies on social media team members noticing a problem manually without defined thresholds or escalation paths.
      3: Crisis thresholds are defined but the escalation path and response SLA are not documented or tested.
      5: Crisis early warning system has defined quantitative thresholds, a documented escalation path with named owners at each level, response SLA by escalation level, and has been tested with a simulated crisis scenario.
    improvement_guidance: Run a quarterly crisis simulation: inject a hypothetical negative scenario and test whether the monitoring alerts fire, who gets notified, and how quickly the response team mobilizes. Identify and fix gaps before a real crisis occurs.
  - name: Insight Activation Rate
    weight: 0.25
    scoring:
      1: Social listening data is collected and reported but rarely results in a specific marketing or product decision.
      3: Insights occasionally inform decisions but the insight-to-action process is ad hoc rather than systematic.
      5: A documented weekly insight review process exists, specific decision protocols define what actions are taken based on which insight types, and the program tracks its own decision influence rate.
    improvement_guidance: Track how many social listening insights result in a documented decision or action per month. A program that produces insights but not decisions is a cost center, not a strategic asset.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Volume Without Validity
  description: Reporting high mention volumes that include large proportions of irrelevant content, spam, and misclassified posts — giving the appearance of comprehensive listening while the underlying data is too noisy to draw valid conclusions.
  mitigation: Define a data quality standard: at least 80% of captured mentions must be genuinely relevant to the brand, category, or competitive set. Validate this standard quarterly through manual sampling.
- pattern: Sentiment Score Without Context
  description: Reporting a single aggregate brand sentiment score without topic-level breakdown, making it impossible to identify whether a sentiment decline is driven by product quality, customer service, pricing, or an unrelated news event.
  mitigation: Always report sentiment broken down by at least five topic clusters (product, service, pricing, brand, external). Aggregate sentiment without topic context is a thermometer that tells you the temperature but not what is causing the fever.
- pattern: Listening Without Action
  description: Running a continuous social listening program that produces weekly reports but has no defined process for converting insights into marketing or product decisions, making the program a cost center without measurable business value.
  mitigation: Establish a quarterly review where the social listening team presents the top three findings that should change a marketing or product decision. If the listening team cannot name three decision-changing insights per quarter, the program is not generating actionable intelligence.
chaining:
  after:
  - framework_id: voc-thematic-analysis
    reason: VoC thematic analysis provides the structured framework for analyzing qualitative feedback; social listening is the real-time, always-on data source that feeds that framework.
  before:
  - framework_id: consumer-decision-journey
    reason: Social listening data reveals which touchpoints and messages are creating the most positive and negative sentiment, directly informing the consumer decision journey map update.
