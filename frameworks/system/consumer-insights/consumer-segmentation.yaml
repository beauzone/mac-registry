metadata:
  id: consumer-segmentation
  version: 1.0.0
  display_name: Consumer Segmentation Framework
  category: research
  description: Full consumer segmentation analysis across demographic, psychographic, behavioral, and occasion-based dimensions to map segment size, accessibility, conversion potential, and strategic fit — identifying the priority consumer targets that offer the highest return on marketing investment.
  best_for:
    stages:
    - pre-launch
    - launch
    - growth
    roles:
    - cmo
    - consumer-analytics-manager
    - head-of-brand
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: market_definition
    description: The total consumer market being segmented — category, geography, and purchase occasion scope
    source: user_input
  - field: available_research
    description: Consumer research data available — surveys, purchase panel data, social listening, CRM behavioral data, or syndicated category data
    source: user_input
  - field: segmentation_objective
    description: Primary reason for segmentation — finding the beachhead segment, sizing market opportunity, or informing campaign targeting
    source: user_input
  optional:
  - field: brand_current_customer_data
    description: Existing customer profile data from the CRM or analytics system
    source: user_input
  - field: competitive_segment_targeting
    description: Which segments competitors are actively targeting with significant investment
    source: user_input
  - field: brand_constraints
    description: Any brand positioning or product constraints that rule out certain segments a priori
    source: user_input
analysis:
  instructions: 'Build the consumer segmentation across six dimensions, moving from broad universe segmentation to priority segment selection. First, demographic segmentation: age, gender, income, geography, household composition, and life stage. Identify which demographic clusters have the highest category purchase rate and highest average spend. Second, psychographic segmentation: values, lifestyle, interests, and identity. This layer reveals which consumer identities the brand''s positioning is designed to attract, which is often more predictive of brand affinity than demographics. Third, behavioral segmentation: purchase frequency, brand loyalty, category engagement level, and digital behavior. Power users, occasional buyers, and lapsed category participants require fundamentally different approaches. Fourth, occasion-based segmentation: the purchase context — everyday routine, special occasion, gifting, seasonal, emergency. The brand''s role in each occasion shapes messaging and channel strategy. Fifth, segment sizing: for each identified segment, estimate the size (total consumer count or total spend), growth rate, and the brand''s current penetration rate. Sixth, priority segment selection: evaluate each segment against four criteria — segment size, strategic fit with the brand''s positioning, accessibility through available channels, and competitive white space (low competitive intensity). Recommend the primary segment for the next 12 months and the secondary expansion segment.'
  dimensions:
  - id: demographic-segmentation
    name: Demographic Segmentation
    description: Segments the consumer universe by demographic characteristics and identifies which clusters have the highest category engagement
    prompts:
    - Which age and life stage cohorts have the highest category purchase frequency and spend per buyer?
    - How does category penetration vary by household income level, and is the product positioned for the highest-penetration income tier?
    - What geographic concentration exists in category purchase behavior — are there regional markets where the target segment is over-indexed?
    - How does the current customer demographic profile compare to the broader category consumer profile — where is the brand over- and under-represented?
  - id: psychographic-segmentation
    name: Psychographic Segmentation
    description: Segments by values, lifestyle, and consumer identity to identify the segments with the highest brand affinity potential
    prompts:
    - What values and lifestyle characteristics most strongly predict high engagement and purchase frequency in this category?
    - Which consumer identity groups are most likely to find the brand''s positioning and personality authentic and compelling?
    - Are there value or lifestyle segments that the category currently underserves — where consumer identity aspirations are not met by existing brands?
    - How do psychographic profiles cluster — what are the two or three most distinct lifestyle segments with meaningfully different brand and media preferences?
  - id: behavioral-segmentation
    name: Behavioral Segmentation
    description: Segments by purchase behavior, category engagement, and product relationship to identify the highest-value behavioral profiles
    prompts:
    - What is the purchase frequency distribution in the category — what percentage of buyers are heavy, medium, and light users?
    - How does category spend concentrate across buyer tiers — do the top 20% of buyers account for more than 50% of category spend?
    - What behavioral profile characterizes the brand''s current best customers, and how does that profile differ from the category overall?
    - Are there lapsed category buyers who represent a reactivatable opportunity with the right positioning or product offer?
  - id: occasion-based-segmentation
    name: Occasion-Based Segmentation
    description: Segments by purchase occasion and context to identify which usage scenarios the brand is designed to win
    prompts:
    - What are the primary purchase occasions in this category — everyday routine, special event, gifting, seasonal, trial-driven, or problem-response?
    - How does the brand''s product and positioning align with each occasion — where does it have the strongest fit?
    - Which occasion has the highest frequency and lowest competitive concentration — the best opportunity for penetration?
    - How does the consumer''s price sensitivity and brand consideration set differ by purchase occasion?
  - id: segment-sizing
    name: Segment Sizing & Prioritization Data
    description: Estimates the size, growth rate, and accessibility of each identified segment
    prompts:
    - What is the estimated total consumer count and annual spend in each identified segment?
    - What is the segment''s growth trajectory — is it expanding, stable, or declining?
    - What is the brand''s current penetration rate in each segment, and what is the realistic achievable penetration within three years?
    - What is the addressable revenue opportunity in each segment at the target penetration rate?
  - id: priority-segment-selection
    name: Priority Segment Selection
    description: Applies a strategic scoring model to select the priority primary and secondary target segments
    prompts:
    - When scored across size, brand fit, accessibility, and competitive white space, which segment offers the highest overall strategic priority score?
    - Is there a beachhead segment — smaller but highly accessible — that should be dominated first before expanding to the broader priority segment?
    - What is the risk of the priority segment being commoditized or dominated by a well-resourced competitor before the brand achieves meaningful penetration?
    - What is the two-segment strategy — which secondary segment should the brand expand into after establishing leadership in the primary segment?
output_templates:
- id: primary
  name: Consumer Segmentation Analysis
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Segmentation Universe Map\n\n{segmentation_universe}\n\n## Demographic Analysis\n\n{demographic_analysis}\n\n## Psychographic Profiles\n\n{psychographic_profiles}\n\n## Behavioral Segmentation\n\n{behavioral_segmentation}\n\n## Occasion-Based Segmentation\n\n{occasion_segmentation}\n\n## Segment Sizing\n\n{segment_sizing}\n\n## Priority Segment Recommendation\n\n{priority_segment_recommendation}\n\n'
rubric:
  description: Evaluates the rigor and actionability of the consumer segmentation analysis.
  dimensions:
  - name: Multi-Dimensional Coverage
    weight: 0.25
    scoring:
      1: Segmentation uses only demographic data, producing segments that are easy to describe but poorly predictive of brand preference or purchase behavior.
      3: Multiple segmentation dimensions are used but psychographic and occasion-based data rely on assumption rather than research.
      5: All four segmentation dimensions are grounded in consumer research data, and the interaction effects between dimensions (e.g., specific demographics with specific psychographics) are used to identify the most actionable segments.
    improvement_guidance: Add a psychographic survey overlay to demographic segmentation data. Even a 200-person segment survey can identify the values and lifestyle clusters that predict brand affinity better than demographics alone.
  - name: Sizing Credibility
    weight: 0.25
    scoring:
      1: Segment sizes are estimated without a data source, making them too uncertain to use for investment decisions.
      3: Segment sizes use industry data but are not adjusted for the specific product category or geography.
      5: Segment sizes are derived from specific data sources (category purchase panels, syndicated market research, CRM extrapolation) with the methodology and confidence range documented.
    improvement_guidance: Document the data source and methodology for every segment size estimate. An estimate with a documented methodology and uncertainty range is more useful than a precise number with no source.
  - name: Priority Segment Justification
    weight: 0.30
    scoring:
      1: Priority segment is selected by instinct or brand preference without a scoring model or competitive analysis.
      3: Priority segment selection uses a scoring model but competitive intensity assessment is qualitative.
      5: Priority segment is selected using a four-criteria scoring model (size, brand fit, accessibility, competitive white space) with quantitative data supporting each criterion.
    improvement_guidance: Build a segment scoring matrix with weights for each criterion. Present the matrix to the leadership team before the priority segment is finalized to surface disagreements about criterion weighting.
  - name: Actionability
    weight: 0.20
    scoring:
      1: Segmentation analysis produces insights but does not translate into specific targeting, messaging, or channel implications.
      3: Segmentation implications are stated at a high level but specific media targeting parameters are not defined.
      5: Priority segment is translated into specific media targeting parameters, messaging direction, and channel implications that a media planner or creative team can act on immediately.
    improvement_guidance: Write a one-page targeting brief for the priority segment that includes: demographic parameters for paid media targeting, psychographic overlay if available, key message priorities, and the highest-reach channels for this segment.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Demographic Reductionism
  description: Treating demographic segments as the final answer rather than the starting point, producing consumer profiles that describe who people are on paper but fail to explain what motivates their purchase decisions.
  mitigation: Always add a psychographic and behavioral layer to demographic segmentation. A 35-year-old woman with a household income of $80K is not a segment — she is a demographic. Add her values, lifestyle, category behavior, and purchase occasion to create a segment that informs meaningful marketing decisions.
- pattern: Beachhead Avoidance
  description: Targeting the largest addressable segment from day one, spreading marketing investment too thin to achieve meaningful penetration anywhere, and losing to a competitor who dominates a smaller but more accessible segment.
  mitigation: Identify the beachhead segment — not the largest, but the most accessible and most aligned with the brand''s current capabilities. Win the beachhead before expanding. Beachhead dominance provides the brand equity, word-of-mouth, and economic foundation for the expansion segment.
- pattern: Segment Count Proliferation
  description: Identifying 8–12 consumer segments that are analytically distinct but operationally unmanageable — the marketing team cannot create differentiated programs for more than three segments without losing quality and focus.
  mitigation: Limit the operationally active segment count to three: one primary segment receiving the majority of investment, one secondary segment being developed, and one future expansion segment being researched.
chaining:
  after:
  - framework_id: stp-segmentation-targeting-positioning
    reason: STP provides the strategic framework; consumer segmentation provides the granular research execution for the S (Segmentation) phase.
  before:
  - framework_id: consumer-persona-purchase-influence-map
    reason: Segmentation identifies priority groups; persona and influence mapping builds the detailed behavioral profiles of those groups.
