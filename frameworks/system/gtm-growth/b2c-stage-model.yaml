metadata:
  id: b2c-stage-model
  version: 1.0.0
  display_name: B2C Brand Stage Model
  category: strategy
  description: Stage-gate framework for consumer brands mapping from pre-launch validation through retail distribution and brand maturity. Defines stage-appropriate priorities, investment allocation, and success metrics to prevent premature scaling.
  best_for:
    stages:
    - pre-launch
    - launch
    - growth
    - scale
    roles:
    - cmo
    - ceo
    - head-of-growth
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: current_stage_indicators
    description: Revenue range, customer count, channel mix, and team size to determine current stage
    source: user_input
  - field: product_category
    description: Consumer product category, purchase frequency, and price point
    source: user_input
  - field: funding_status
    description: Funding stage, runway, and capital availability for growth investment
    source: user_input
  optional:
  - field: target_stage
    description: Target stage to reach within the planning horizon
    source: user_input
  - field: competitive_position
    description: Relative brand awareness and market share vs. category leaders
    source: user_input
  - field: founder_vision
    description: Long-term brand aspiration (category leader, acquisition target, lifestyle brand, etc.)
    source: user_input
analysis:
  instructions: 'Map the brand against five consumer brand stages: Stage 0 (Pre-Launch — concept validation, no revenue), Stage 1 (Launch — first customers, DTC only, finding PMF), Stage 2 (Growth — PMF confirmed, scaling primary channel, $1M–$10M ARR), Stage 3 (Scale — adding distribution channels, $10M–$100M ARR), and Stage 4 (Maturity — category leadership, omnichannel, brand equity investment). For the brand''s current stage, identify the three highest-priority objectives, the metrics that must be hit to unlock the next stage, the most common mistakes brands make at this stage, and the investment allocation across brand-building, performance marketing, product, and operations. Produce a stage card summary for the current stage and a gate criteria checklist for the next stage transition.'
  dimensions:
  - id: stage-gate-criteria
    name: Stage Gate Criteria
    description: Defines the measurable criteria that must be met before transitioning to the next stage
    prompts:
    - What revenue, retention, and margin thresholds signal readiness to exit the current stage?
    - Which product and consumer satisfaction metrics must be proven before scaling investment?
    - What channel and logistics infrastructure must be in place before the next stage begins?
    - Are there brand equity indicators (NPS, repeat purchase rate, organic word-of-mouth) that signal the brand is ready to scale?
  - id: priority-metrics
    name: Stage-Appropriate Priority Metrics
    description: Identifies the two or three metrics that matter most at the current stage and should govern all decision-making
    prompts:
    - What is the single most important metric for the brand at this stage?
    - Which metrics are vanity metrics at this stage that will become important later but should not drive decisions now?
    - How do the priority metrics shift between the current stage and the next?
    - What leading indicators predict whether the brand will hit its stage-gate criteria on time?
  - id: channel-investment
    name: Channel Investment Allocation
    description: Maps the appropriate marketing investment mix for the current stage
    prompts:
    - What percentage of marketing budget should go to performance vs. brand-building at this stage?
    - Which channels should be the primary investment focus, and which should be held for the next stage?
    - How does the channel investment mix change as the brand moves from DTC-only to omnichannel?
    - At what stage does brand investment (awareness, PR, events) begin delivering measurable commercial returns?
  - id: team-capabilities
    name: Team Capability Requirements
    description: Maps the people and functional capabilities required at each stage
    prompts:
    - What are the critical hires that unlock the next stage of growth?
    - Which functions should be kept in-house vs. outsourced at this stage?
    - At what stage does a VP of Marketing or CMO become necessary vs. premature?
    - What agency or partner relationships are stage-appropriate given current revenue and complexity?
  - id: risk-factors
    name: Stage-Specific Risk Factors
    description: Identifies the most common failure modes at the current stage
    prompts:
    - What are the top three ways brands fail at this specific stage?
    - Is the brand at risk of premature channel expansion before core DTC economics are proven?
    - Are there product, supply chain, or team capability gaps that could prevent the next stage transition?
    - What external risks (category shift, new competitors, algorithm changes) are most acute at this stage?
output_templates:
- id: primary
  name: B2C Brand Stage Assessment
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Current Stage Assessment\n\n{current_stage_card}\n\n## Stage-Gate Criteria for Next Stage\n\n{stage_gate_checklist}\n\n## Priority Metrics\n\n{priority_metrics}\n\n## Investment Allocation Recommendation\n\n{investment_allocation}\n\n## Team & Capability Gaps\n\n{team_capability_gaps}\n\n## Key Risks at This Stage\n\n{stage_risk_factors}\n\n## 90-Day Action Plan\n\n{ninety_day_plan}\n\n'
rubric:
  description: Evaluates the accuracy and usefulness of the B2C brand stage assessment.
  dimensions:
  - name: Stage Diagnosis Accuracy
    weight: 0.30
    scoring:
      1: Stage diagnosis is based on revenue alone with no consideration of retention, product-market fit, or channel maturity.
      3: Stage diagnosis is reasonable but relies on too few indicators and may misclassify brands near stage boundaries.
      5: Stage diagnosis uses a multi-signal approach covering revenue, retention, PMF indicators, channel maturity, and team capability.
    improvement_guidance: Collect data across at least five stage indicators before assigning a stage classification. Consider interviewing the CEO and CMO to surface qualitative signals.
  - name: Stage-Gate Specificity
    weight: 0.25
    scoring:
      1: Stage-gate criteria are vague and cannot be used to make a binary stage-transition decision.
      3: Stage-gate criteria are specific but some metrics lack clear thresholds or measurement methods.
      5: Stage-gate criteria are specific, measurable, and include clear thresholds, measurement frequency, and responsible owners.
    improvement_guidance: For each stage-gate criterion, define the specific threshold value, how it will be measured, and who owns the measurement.
  - name: Investment Allocation Realism
    weight: 0.25
    scoring:
      1: Investment allocation is generic and not calibrated to the brand's current revenue, margin, or stage.
      3: Investment allocation is stage-appropriate but does not account for the brand's specific margin structure or capital constraints.
      5: Investment allocation is stage-appropriate, margin-constrained, and accounts for the specific channel economics of this brand.
    improvement_guidance: Build the investment allocation on top of a unit economics model that shows the sustainable marketing spend level given current margins.
  - name: Risk Identification
    weight: 0.20
    scoring:
      1: Risk section is either absent or lists generic risks not specific to this brand's stage.
      3: Risks are stage-specific but not ranked by probability or potential impact.
      5: Risks are stage-specific, ranked by probability and impact, and each has a defined mitigation action.
    improvement_guidance: Rank risks by the product of probability and impact. For the top two risks, define specific early warning indicators and mitigation triggers.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Stage Jumping
  description: Attempting to execute Stage 3 omnichannel strategies before Stage 2 DTC unit economics are proven, burning capital before the business model is validated.
  mitigation: Enforce stage-gate criteria as hard prerequisites before any stage transition is approved. The board or leadership team should formally sign off on stage advancement.
- pattern: Premature Brand Investment
  description: Allocating significant budget to brand awareness campaigns before achieving product-market fit, wasting spend on a product experience that will not retain new customers.
  mitigation: Lock brand building investment behind a minimum repeat purchase rate threshold (e.g., 30% of customers making a second purchase within 60 days).
- pattern: Wrong-Stage Metrics
  description: Tracking brand-stage metrics (e.g., NPS, brand awareness) as primary KPIs during the launch stage when PMF metrics (retention, repeat purchase) should dominate.
  mitigation: Define a single primary metric for each stage and resist reporting vanity metrics that create false confidence in progress.
chaining:
  after:
  - framework_id: product-market-fit-diagnostic
    reason: PMF diagnostic determines whether the brand has earned the right to move from Stage 1 to Stage 2 growth investment.
  before:
  - framework_id: b2c-gtm-motions
    reason: Stage determination drives channel motion selection — earlier stages favor DTC while later stages incorporate multi-channel.
  - framework_id: aarrr-pirate-metrics
    reason: AARRR provides the operational metric framework appropriate to the stage identified in this assessment.
