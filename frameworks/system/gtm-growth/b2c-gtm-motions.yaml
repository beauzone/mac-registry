metadata:
  id: b2c-gtm-motions
  version: 1.0.0
  display_name: B2C GTM Motions & Route-to-Market Strategy
  category: gtm
  description: Helps consumer brands choose their primary route-to-market motion — DTC, marketplace, retail, subscription, app store, or hybrid. Maps channel selection to company stage, consumer behavior, and margin requirements.
  best_for:
    stages:
    - pre-launch
    - launch
    - growth
    - scale
    roles:
    - cmo
    - vp-marketing
    - head-of-growth
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: product_type
    description: What type of consumer product (physical, digital, subscription, app, hybrid)
    source: user_input
  - field: target_consumer_segment
    description: Primary consumer segment and their buying behavior characteristics
    source: user_input
  - field: margin_structure
    description: Gross margin range and unit economics constraints by channel
    source: user_input
  optional:
  - field: competitive_channel_landscape
    description: Where competitors are selling and at what scale
    source: user_input
  - field: current_traction
    description: Any existing channel experiments, revenue, or distribution relationships
    source: user_input
  - field: capital_available
    description: Budget available for channel investment and working capital requirements
    source: user_input
analysis:
  instructions: 'Begin by mapping the product type and consumer segment to each available route-to-market motion: DTC (owned website/app), marketplace (Amazon, Etsy, app stores), retail (brick-and-mortar wholesale), subscription (recurring billing), and hybrid combinations. For each motion, evaluate four dimensions — consumer behavior fit (where does this segment naturally discover and buy?), margin viability (does the channel fee structure leave viable unit economics?), stage appropriateness (does the brand have the brand equity, logistics, and capital required?), and competitive exposure (how crowded and competitive is this channel?). Produce a channel priority stack ranked by strategic fit. Identify the primary motion for launch and map the sequencing logic for adding secondary channels as the brand scales. Conclude with a channel economics comparison table and a go-forward motion recommendation with rationale.'
  dimensions:
  - id: channel-selection
    name: Route-to-Market Channel Selection
    description: Evaluates each GTM motion against consumer behavior, product fit, and brand stage
    prompts:
    - Where does this consumer segment naturally discover and research products in this category?
    - Which channels are most aligned with the product's price point and purchase frequency?
    - What channel infrastructure (logistics, fulfillment, tech stack) is required and what is the build cost?
    - Which motions have the fastest time to first revenue for this stage of the business?
  - id: motion-sequencing
    name: Channel Motion Sequencing
    description: Maps the order in which GTM motions should be activated as the brand grows
    prompts:
    - What is the optimal launch channel given current brand awareness, capital, and capabilities?
    - At what revenue or brand recognition threshold does adding a second channel become viable?
    - Which channels reinforce each other (e.g., DTC data informing retail strategy) vs. cannibalize?
    - What is the natural sequencing logic for this category — does retail open after DTC proof, or vice versa?
  - id: economics-by-channel
    name: Channel Unit Economics
    description: Models contribution margin and CAC implications by route-to-market
    prompts:
    - What is the effective gross margin after channel fees, fulfillment, and returns for each motion?
    - How does CAC compare across DTC paid, marketplace organic, and retail slotting investment?
    - What is the minimum order volume required to make each channel viable?
    - Where does the LTV:CAC ratio remain above 3:1 across the channel portfolio?
  - id: competitive-channel-gaps
    name: Competitive Channel Gap Analysis
    description: Identifies underserved channels where competitive density is low
    prompts:
    - Which channels are competitors over-invested in, creating rising CPCs or retailer dependency?
    - Where are consumers in this category underserved or frustrated with current purchase options?
    - Which emerging channels (social commerce, live shopping, community platforms) are open for first-mover advantage?
    - What proprietary channel advantages does this brand have that competitors cannot easily replicate?
output_templates:
- id: primary
  name: B2C GTM Motion Recommendation
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Recommended Primary Motion\n\n{primary_motion_recommendation}\n\n## Channel Priority Stack\n\n{channel_priority_stack}\n\n## Channel Unit Economics Comparison\n\n{channel_economics_table}\n\n## Motion Sequencing Roadmap\n\n{motion_sequencing_plan}\n\n## Competitive Channel Analysis\n\n{competitive_channel_gaps}\n\n## Risks & Mitigations\n\n{risks_and_mitigations}\n\n'
rubric:
  description: Evaluates the quality and completeness of the B2C GTM motion recommendation.
  dimensions:
  - name: Channel-Consumer Fit
    weight: 0.30
    scoring:
      1: Channel selection is generic with no evidence of consumer behavior research or segment-specific buying pattern analysis.
      3: Channel selection considers consumer behavior but lacks depth on discovery patterns, purchase triggers, or category norms.
      5: Channel selection is grounded in specific consumer segment behavior, category purchase patterns, and clear discovery-to-conversion pathway mapping.
    improvement_guidance: Add consumer panel data, category purchase behavior research, or direct interviews to validate channel fit assumptions.
  - name: Unit Economics Rigor
    weight: 0.30
    scoring:
      1: No channel economics modeling; margin assumptions are absent or implausible.
      3: Basic margin comparison across channels but missing CAC, LTV, or payback period analysis.
      5: Full channel P&L comparison with CAC, gross margin after fees, LTV trajectory, and payback period modeled per channel.
    improvement_guidance: Build a channel economics model with realistic CAC assumptions, fee structures, and contribution margin calculations.
  - name: Sequencing Logic
    weight: 0.25
    scoring:
      1: Motion sequencing is arbitrary with no stage-gate criteria or trigger conditions defined.
      3: Sequencing is logical but trigger criteria are vague and channel interaction effects are not addressed.
      5: Clear stage-gate criteria for each channel addition, with explicit revenue, brand equity, and capability thresholds defined.
    improvement_guidance: Define specific metrics (e.g., DTC revenue threshold, brand search volume, NPS score) that trigger the move to each subsequent channel.
  - name: Competitive Differentiation
    weight: 0.15
    scoring:
      1: No competitive channel analysis; recommendations mirror what competitors are already doing.
      3: Competitive channel landscape is mapped but differentiation strategy is weak.
      5: Clear identification of competitive channel gaps and a defensible white-space channel strategy.
    improvement_guidance: Map the top five competitors' channel investments and identify the underserved channel with the best return potential.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Channel Mirroring
  description: Copying competitors' channel mix without evaluating whether the same economics and brand equity position apply to this brand.
  mitigation: Conduct an independent channel economics model before adopting any channel a competitor uses, and identify at least one channel where the brand has a structural advantage.
- pattern: Premature Multi-Channel Expansion
  description: Launching into retail or marketplace before establishing DTC proof of concept, diluting focus and straining working capital.
  mitigation: Define a minimum DTC revenue and margin threshold that must be achieved before any secondary channel is activated. Treat channel expansion as a stage gate, not a launch checklist item.
- pattern: Margin Blindness
  description: Selecting channels based on volume potential without modeling the full fee, logistics, and returns cost structure, leading to negative contribution margin at scale.
  mitigation: Build a channel P&L model before committing to any distribution agreement. Include retailer markdown allowances, return rates, and co-op marketing requirements in the model.
chaining:
  after:
  - framework_id: product-market-fit-diagnostic
    reason: PMF confirmation validates the product is ready for channel scaling; channel strategy is only meaningful once core product-consumer fit is established.
  before:
  - framework_id: aarrr-pirate-metrics
    reason: Once the GTM motion is selected, AARRR provides the operational metrics framework to measure performance at each stage of the consumer funnel.
