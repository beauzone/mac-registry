metadata:
  id: omnichannel-strategy
  version: 1.0.0
  display_name: Omnichannel Strategy Framework
  category: strategy
  description: Designs the integrated consumer brand strategy across DTC, retail, marketplace, and digital channels — ensuring consistent brand experience, optimized channel economics, unified data strategy, and a defensible approach to cannibalization management.
  best_for:
    stages:
    - scale
    - mature
    roles:
    - cmo
    - head-of-brand
    - retail-omnichannel-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: current_channel_mix
    description: Current channels active, revenue by channel, and strategic role of each channel
    source: user_input
  - field: target_consumer_journey
    description: How the target consumer currently navigates across channels — discovery, research, purchase, and post-purchase
    source: user_input
  - field: omnichannel_objective
    description: Primary goal of the omnichannel strategy — market share growth, margin improvement, brand building, or channel diversification
    source: user_input
  optional:
  - field: channel_economics_data
    description: Margin, CAC, and LTV data by channel for economic comparison
    source: user_input
  - field: consumer_crossover_data
    description: Any data on consumers who purchase across multiple channels — their LTV and behavior relative to single-channel customers
    source: user_input
  - field: competitive_omnichannel_positioning
    description: How direct competitors are managing their channel mix and where they are winning or struggling
    source: user_input
analysis:
  instructions: 'Build the omnichannel strategy across six dimensions. Begin with a channel integration map: define the strategic role of each channel in the consumer journey and how channels reinforce rather than cannibalize each other. A consumer who discovers on TikTok, researches on the brand website, and purchases on Amazon is not a lost DTC sale — they are a legitimate omnichannel purchase that should be optimized, not prevented. Second, audit brand experience consistency: is the brand voice, visual identity, pricing, and product assortment consistent across all channels, or do consumers encounter jarring inconsistencies that undermine brand trust? Third, compare channel economics: what is the net margin, LTV impact, and strategic value (brand building, data capture, distribution volume) of each channel? Not all channels need to be margin-equivalent — some (retail) are worth lower margins for distribution scale. Fourth, design the data unification strategy: how does the brand capture first-party data across channels and unify it into a single customer view? This is the strategic asset that online-only and offline-only brands cannot access. Fifth, analyze cannibalization: identify where channel addition creates genuine incremental revenue vs. where it redirects existing demand at lower margin. Sixth, design the omnichannel measurement system.'
  dimensions:
  - id: channel-integration-map
    name: Channel Integration Map
    description: Defines the strategic role of each channel and how channels reinforce each other in the consumer journey
    prompts:
    - What is the intended strategic role of each channel — primary demand generation, distribution volume, brand equity, data capture, or profitability?
    - How do consumers move between channels, and is that movement additive (discovering online, purchasing offline) or primarily substitutive?
    - Which channel sequence produces the highest LTV consumers — what is the optimal discovery-to-purchase channel path?
    - Where are there gaps in the channel map — stages of the consumer journey where no channel is adequately serving the consumer?
  - id: brand-experience-consistency
    name: Brand Experience Consistency Audit
    description: Evaluates whether the brand experience is consistent and coherent across all channels
    prompts:
    - Is pricing consistent across channels, or are there channel-specific discounts or promotions that train consumers to seek the cheapest channel?
    - Is the product assortment consistent, or are there exclusive assortments by channel that serve a strategic differentiation purpose?
    - Is the brand visual identity, tone of voice, and customer service quality consistent across DTC, retail, and marketplace channels?
    - What is the most jarring brand inconsistency that consumers currently experience when moving between channels?
  - id: channel-economics-comparison
    name: Channel Economics Comparison
    description: Compares the full economic picture of each channel including margin, LTV, and strategic value
    prompts:
    - What is the net margin after all channel costs (fees, discounts, marketing support, returns) for each channel?
    - What LTV does each channel produce — do marketplace customers revert to DTC, or do they remain platform-locked?
    - What is the strategic value of lower-margin channels — is the distribution scale, brand awareness, or data value worth the margin sacrifice?
    - Are any channels operating at a margin level that is fundamentally incompatible with the business model at scale?
  - id: data-unification-strategy
    name: First-Party Data Unification Strategy
    description: Designs the strategy to capture and unify consumer data across all channels
    prompts:
    - What first-party data is the brand currently capturing across each channel, and what data is being lost to platform walled gardens?
    - What value exchange (loyalty program, warranty registration, exclusive content, community) incentivizes consumers to identify themselves across channels?
    - How is customer data being unified across channels — is there a customer identity resolution strategy linking cross-channel purchase history?
    - What marketing and personalization capabilities does a unified first-party data asset enable that are not possible with channel-siloed data?
  - id: cannibalization-analysis
    name: Cannibalization Analysis
    description: Identifies where new channel addition creates genuine incremental revenue vs. redirecting existing demand at lower margin
    prompts:
    - What evidence suggests that retail or marketplace channel additions are cannibalizing DTC purchases rather than reaching new consumers?
    - What pricing, assortment, or geographic differentiation strategy minimizes cannibalization between channels?
    - What is the incremental revenue generated by each channel addition after subtracting redirected existing demand at lower margin?
    - At what revenue size does each channel become self-sustaining and start generating genuinely incremental demand rather than redistributing existing demand?
  - id: omnichannel-measurement
    name: Omnichannel Measurement Design
    description: Defines the metrics and attribution approach for measuring omnichannel performance holistically
    prompts:
    - How is omnichannel consumer LTV calculated when a consumer purchases across multiple channels?
    - What holistic brand metrics (total addressable consumer base reached, share of category purchases, brand awareness) complement channel-specific revenue metrics?
    - How is the interaction effect between channels measured — does DTC advertising lift retail sales in the same geography?
    - What is the single most important omnichannel metric for the business to optimize, and who owns it?
output_templates:
- id: primary
  name: Omnichannel Strategy Document
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Channel Integration Map\n\n{channel_integration_map}\n\n## Brand Experience Consistency Audit\n\n{brand_consistency_audit}\n\n## Channel Economics Comparison\n\n{channel_economics_comparison}\n\n## Data Unification Strategy\n\n{data_unification_strategy}\n\n## Cannibalization Analysis\n\n{cannibalization_analysis}\n\n## Omnichannel Measurement Framework\n\n{measurement_framework}\n\n## Strategic Recommendations\n\n{strategic_recommendations}\n\n'
rubric:
  description: Evaluates the strategic coherence and data rigor of the omnichannel strategy.
  dimensions:
  - name: Channel Role Clarity
    weight: 0.25
    scoring:
      1: All channels are treated as equivalent revenue sources without distinct strategic roles.
      3: Strategic roles are defined for major channels but the integration logic — how channels reinforce each other — is not articulated.
      5: Each channel has a distinct strategic role with clear definitions of how it fits into the consumer journey and how it reinforces other channels.
    improvement_guidance: Write a one-paragraph strategic role statement for each channel. If two channels have identical role statements, they are probably cannibalizing each other and one should be eliminated or differentiated.
  - name: Data Strategy Comprehensiveness
    weight: 0.30
    scoring:
      1: No first-party data unification strategy; each channel's customer data is siloed.
      3: Data unification is aspired to but the identity resolution method and value exchange design are not specified.
      5: Full data strategy is designed — identity resolution method, cross-channel value exchange, data platform requirements, and the marketing capabilities unlocked by unified data are all specified.
    improvement_guidance: Map every data touchpoint across channels and identify which collect first-party identifiers (email, phone) and which do not. Build the value exchange design for non-identifying channels first.
  - name: Cannibalization Quantification
    weight: 0.25
    scoring:
      1: Cannibalization is acknowledged as a risk but not quantified or addressed with a mitigation strategy.
      3: Cannibalization is estimated but based on assumption rather than observed consumer behavior data.
      5: Cannibalization is quantified through geo-test data or consumer panel research, and the net incremental revenue of each channel addition is calculated after cannibalization adjustment.
    improvement_guidance: Run a geographic holdout test when launching a new channel. Compare sales across all channels in test geographies (new channel active) vs. control geographies (new channel absent) to measure the true net incremental impact.
  - name: Measurement Holism
    weight: 0.20
    scoring:
      1: Success is measured by channel-level revenue without holistic metrics that capture the full omnichannel value.
      3: Both channel and brand metrics are tracked but they are reported separately without integration.
      5: An omnichannel scorecard integrates channel revenue, brand metrics, and consumer LTV across channels into a unified view of business health.
    improvement_guidance: Build an omnichannel KPI dashboard that shows total addressable consumer penetration alongside channel-level metrics. This reveals whether the brand is growing its consumer base or just redistributing spend across channels.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Channel Expansion as Brand Strategy
  description: Adding new channels primarily to demonstrate market presence rather than to serve consumer needs or achieve a specific strategic objective, resulting in channel sprawl that dilutes execution quality.
  mitigation: Before adding any new channel, define its specific strategic role, the consumer segment it uniquely serves, and the minimum success metric required within 12 months. Reject channel additions that cannot articulate a unique role.
- pattern: Pricing Inconsistency
  description: Allowing channel-specific promotions and discount strategies that train consumers to shop around for the lowest price rather than building loyalty to the brand, destroying pricing power and reducing blended margins.
  mitigation: Establish a channel pricing policy that requires all channels to maintain consistent MAP. Reserve channel-exclusive pricing only for distinct, non-overlapping assortments.
- pattern: Data Silo Acceptance
  description: Building a multi-channel business without investing in customer data unification, resulting in five separate customer databases with no way to identify cross-channel consumers or build a holistic brand relationship.
  mitigation: Treat first-party data unification as a non-negotiable strategic investment, not an optional technology project. Every incremental channel adds data complexity — establish the unification foundation before the data management challenge becomes unmanageable.
chaining:
  after:
  - framework_id: b2c-gtm-motions
    reason: GTM motion selection determines which channels are in scope; omnichannel strategy designs the integration logic across those channels.
  before:
  - framework_id: retail-distribution-strategy
    reason: Omnichannel strategy defines the role of physical retail in the channel mix; retail distribution strategy designs the specific execution within that role.
