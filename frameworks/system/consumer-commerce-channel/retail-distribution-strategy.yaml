metadata:
  id: retail-distribution-strategy
  version: 1.0.0
  display_name: Retail Distribution Strategy
  category: strategy
  description: Designs the brick-and-mortar and retail channel strategy including retailer selection, shelf strategy, trade marketing investment, category captain positioning, and retail activation plan to build a profitable and brand-reinforcing physical distribution footprint.
  best_for:
    stages:
    - scale
    - mature
    roles:
    - cmo
    - retail-omnichannel-manager
    - head-of-brand
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: product_category
    description: Product category, price point, and purchase occasion (planned vs. impulse, weekly shop vs. destination trip)
    source: user_input
  - field: brand_status
    description: Current brand awareness level, DTC revenue run rate, and brand equity indicators
    source: user_input
  - field: retail_objective
    description: Primary retail goal — distribution expansion, brand awareness, volume growth, or profitability
    source: user_input
  optional:
  - field: retailer_relationships
    description: Any existing retailer relationships or distribution agreements
    source: user_input
  - field: trade_marketing_budget
    description: Available trade marketing budget for slotting, promotions, and in-store activation
    source: user_input
  - field: competitive_retail_positioning
    description: How competitors are distributed at retail and their shelf positioning
    source: user_input
analysis:
  instructions: 'Design the retail distribution strategy across six dimensions. First, define the retailer selection criteria: which retailers are right for this brand given the target consumer''s shopping behavior, the brand''s positioning, and the margin structure required? The retailer selection sequence typically moves from specialty/boutique (highest brand alignment, lowest volume) to natural/premium mass (Whole Foods, Target, Ulta) to mass market (Walmart, CVS) as the brand scales and builds shelf-readiness. Second, design the shelf presence strategy: what SKU assortment enters retail, how is the brand''s shelf section designed and defended, and what planogram position is the target? Third, model the trade marketing investment: slotting fees, promotional allowances, co-op advertising, and markdown money are the true cost of retail distribution. Model the net retail margin after these costs. Fourth, design the category management approach: can the brand earn category captain or category advisor status by bringing superior consumer insights to retail buyers? Fifth, design the retail activation plan: in-store execution, sampling, demonstration, and field sales program. Sixth, compare retail vs. DTC economics to determine the optimal channel allocation.'
  dimensions:
  - id: retailer-selection-criteria
    name: Retailer Selection Criteria
    description: Defines the framework for selecting which retailers to pursue and in what sequence
    prompts:
    - Which retailers serve the highest concentration of the target consumer segment for this category?
    - What is the minimum brand awareness or DTC revenue threshold required before approaching each tier of retailer?
    - What are the retailer''s minimum volume requirements, and does the brand have sufficient production capacity and retail-ready packaging to meet them?
    - Which retailers offer the best strategic value beyond volume — co-marketing opportunities, category positioning, and brand association?
  - id: shelf-presence-strategy
    name: Shelf Presence Strategy
    description: Defines the SKU assortment, shelf positioning, and visual merchandising approach for retail
    prompts:
    - What is the minimum viable SKU assortment for retail — which hero products should anchor distribution while limiting SKU complexity?
    - What shelf position (eye level, endcap, checkout adjacency) is the target, and what data or category insights justify that positioning to the buyer?
    - How does the retail packaging differ from DTC packaging — does it communicate value and differentiation at shelf without a brand advocate to explain it?
    - What secondary placement (endcap, clip strip, display unit) opportunities exist that could supplement standard shelf placement?
  - id: trade-marketing-investment
    name: Trade Marketing Investment Model
    description: Models the full cost of retail distribution including all trade investment requirements
    prompts:
    - What slotting fees are required for this retailer and category, and how are they recovered through volume over the distribution agreement term?
    - What promotional allowances (EDLP discounts, promotional deals, markdown money) does the retailer require, and what is the net margin after these concessions?
    - What co-op advertising investment is expected, and what is the expected return in the form of feature placement, in-store signage, or digital placement on the retailer''s platform?
    - What is the minimum weekly velocity per store required to maintain distribution, and what marketing investment is required to achieve it?
  - id: category-management-approach
    name: Category Management Approach
    description: Defines the brand's role in category management and the data strategy to support it
    prompts:
    - What unique consumer insights, panel data, or category trend data can the brand bring to retail buyers to differentiate from competitors?
    - Is the brand positioned to earn category captain or category advisor status, and what investment is required to build that capability?
    - What category growth story does the brand tell to the buyer — how does this product grow the category rather than simply taking share from existing items?
    - What planogram proposal best serves the category's consumer while giving the brand its optimal shelf position?
  - id: retail-activation-plan
    name: Retail Activation Plan
    description: Designs the in-store and field execution program to drive velocity and maintain distribution
    prompts:
    - What in-store sampling, demonstration, or experiential programs would most effectively convert shelf presence into trial?
    - What field sales program (broker network, brand ambassadors, retail merchandising team) is required to maintain compliance and execution quality?
    - How does national advertising investment connect to retail sell-through — is there a coordinated push-pull marketing program?
    - What is the retail velocity management plan — how does the brand respond to stores falling below minimum velocity thresholds to protect distribution?
  - id: retail-vs-dtc-economics
    name: Retail vs. DTC Economics
    description: Compares the net economics of retail distribution to DTC to inform the optimal channel allocation
    prompts:
    - What is the net retail margin after COGS, freight, slotting, trade promotions, and co-op, and how does it compare to DTC contribution margin?
    - At what retail velocity does the channel become margin-positive after amortizing slotting and launch investment?
    - Is the retail channel margin gap vs. DTC offset by strategic value (brand awareness, distribution scale, consumer trust signals)?
    - What percentage of total revenue should come from retail vs. DTC to optimize the brand''s margin profile and strategic positioning?
output_templates:
- id: primary
  name: Retail Distribution Strategy
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Retailer Selection & Sequencing\n\n{retailer_selection}\n\n## Shelf Presence Strategy\n\n{shelf_presence_strategy}\n\n## Trade Marketing Investment Model\n\n{trade_marketing_model}\n\n## Category Management Approach\n\n{category_management}\n\n## Retail Activation Plan\n\n{retail_activation_plan}\n\n## Retail vs. DTC Economics\n\n{retail_dtc_economics}\n\n## 12-Month Distribution Roadmap\n\n{distribution_roadmap}\n\n'
rubric:
  description: Evaluates the strategic soundness and economic rigor of the retail distribution plan.
  dimensions:
  - name: Retailer Fit Assessment
    weight: 0.25
    scoring:
      1: Retailer selection is based on brand aspiration rather than consumer shopping behavior data or margin viability analysis.
      3: Retailer fit is assessed qualitatively but the minimum velocity requirements and margin structure are not modeled.
      5: Retailer selection is grounded in consumer shopping behavior data, minimum velocity thresholds are modeled against realistic penetration rates, and the margin structure is validated before any distribution agreement is signed.
    improvement_guidance: Before approaching any retailer, model the minimum weekly velocity required to maintain distribution and calculate the probability of achieving it based on household penetration and purchase frequency data.
  - name: Trade Economics Rigor
    weight: 0.30
    scoring:
      1: Trade investment costs (slotting, promotional allowances, markdown money) are not modeled in the retail P&L.
      3: Trade costs are estimated but not modeled accurately for the specific retailer and category.
      5: Full retail P&L is modeled with actual retailer-specific slotting fees, promotional allowance requirements, co-op expectations, and freight costs, producing a reliable net retail margin estimate.
    improvement_guidance: Request retailer vendor guidelines before building the retail P&L. The actual slotting, promotional, and co-op requirements vary significantly by retailer and are not predictable from industry averages alone.
  - name: Activation Plan Sufficiency
    weight: 0.25
    scoring:
      1: No retail activation plan; the strategy ends at securing distribution without addressing how to drive velocity.
      3: Activation plan is conceptual without a budget, field execution model, or velocity monitoring system.
      5: Activation plan has a budget, defined field execution model (broker, ambassador, or brand team), a sampling or demonstration program, and a weekly velocity monitoring process with defined intervention triggers.
    improvement_guidance: Set a minimum velocity threshold for each store SKU below which active intervention is triggered. Without velocity monitoring and active management, retail distribution declines naturally as stores reset their planograms.
  - name: Channel Conflict Management
    weight: 0.20
    scoring:
      1: Retail distribution is designed without considering the pricing and assortment conflicts with the existing DTC channel.
      3: Channel conflict is acknowledged but no specific pricing or assortment differentiation strategy is defined.
      5: Channel conflict is proactively managed through a MAP policy, channel-exclusive assortment strategy, and a clear communication to retail buyers about the brand''s DTC channel role.
    improvement_guidance: Define the assortment architecture that gives each channel a distinct reason for existence. Hero SKUs available everywhere; premium or limited SKUs exclusive to DTC; value bundles exclusive to mass market retail.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Premature Retail Expansion
  description: Entering retail distribution before the brand has sufficient DTC proof, production capacity, and retail marketing investment to support the velocity requirements, leading to distribution delisted within 6–12 months.
  mitigation: Before approaching any retailer, confirm that the brand can achieve the minimum velocity threshold with available marketing budget. Under-investment in a retail launch is a faster path to delisting than over-investment.
- pattern: Ignoring Trade Economics
  description: Calculating retail attractiveness based on the retailer's gross sales volume without modeling the slotting fees, promotional allowances, markdown money, and freight that reduce net retail margin to potentially negative levels at launch.
  mitigation: Build the full retail P&L before signing any distribution agreement. If net retail margin is below 20% at launch volume, the distribution agreement economics are not viable without a clear path to margin improvement through scale.
- pattern: Distribution Without Activation
  description: Securing retail distribution and then relying on the product's shelf presence alone to drive velocity without a coordinated activation plan — resulting in slow turns, inadequate shelf space, and eventual delistment.
  mitigation: Treat retail launch as a full marketing campaign. Allocate dedicated retail activation budget equal to at least 50% of the first year's expected slotting fees. Without activation investment, retail distribution is a cost center, not a growth channel.
chaining:
  after:
  - framework_id: omnichannel-strategy
    reason: Omnichannel strategy defines the strategic role of physical retail; this framework designs the specific execution within that role.
  before:
  - framework_id: b2c-gtm-motions
    reason: Retail distribution adds a new GTM motion; returning to the GTM motions framework ensures the overall channel mix remains strategically coherent.
