metadata:
  id: launching-to-leading-breakthrough-marketing
  version: 1.0.0
  display_name: 'Launching to Leading: Breakthrough Marketing'
  category: gtm
  description: Ken Rutsky's market leadership methodology that guides B2B companies from launch through breakthrough to market
    leadership by combining Viewpoint context, Unique Value articulation, and experiential delivery to create flashmobs, marshal
    parades, and ignite movements.
  best_for:
    stages:
    - seed
    - series-a
    - series-b
    - series-c-plus
    - late-stage-private
    roles:
    - cmo
    - ceo
    - cro
    - vp-marketing
    - vp-sales
    - product-marketing-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  source: Based on 'Launching to Leading' by Ken Rutsky
  schema_version: '1.0'
inputs:
  required:
  - field: company_overview
    description: Company stage, target market, product/service category, and current market position (hiding, launching, participating,
      breakthrough, leading).
    source: skill
  - field: unique_capabilities
    description: List of unique product features, capabilities, and differentiators vs. alternatives including status quo.
    source: user_input
  - field: customer_reality
    description: Description of major business changes, trends, and challenges affecting target customers (STEEP factors).
    source: research
  - field: competitive_landscape
    description: Key competitors and alternatives, their positioning, and market perception.
    source: research
  - field: customer_buying_behavior
    description: How target customers currently research, evaluate, and purchase solutions in this category.
    source: user_input
  optional:
  - field: current_messaging
    description: Existing value propositions, positioning statements, and key messages currently in use.
    source: existing_deliverable
analysis:
  instructions: 'This framework implements Ken Rutsky''s Breakthrough Marketing methodology across five stages of market leadership.
    It guides teams through identifying their current stage, articulating Unique Value, creating a Viewpoint Story that sets
    market context, and delivering with experience to achieve breakthrough and market leadership. The methodology recognizes
    that in today''s information-abundant, buyer-controlled markets, companies must move beyond feature-benefit messaging
    to own the context of the conversation.


    After assessing the current market leadership stage and identifying gaps, synthesize findings into a clear action plan:
    (1) Define or refine Unique Value statements that pass the ''customer will pay for it'' and ''competitors can''t match
    it'' tests. (2) Construct a Viewpoint Story using AIM-STEEP that aligns with Unique Value and tilts the playing field.
    (3) Determine the appropriate market leadership phase and messaging mix. (4) Identify 2-3 high-priority initiatives to
    shift from explanatory content to experiential programs. (5) Set metrics for moving up the Market Leadership Achievement
    Ladder (improving lead-to-revenue conversion). Frame all recommendations as ''the next phase'' that builds on current
    foundation.'
  dimensions:
  - id: market-leadership-stage-assessment
    name: Market Leadership Stage Assessment
    description: 'Diagnose where the company currently sits on the Market Leadership Achievement Ladder: Hiding (lab stage),
      Launching (among the many), Participating (unique value), Breakthrough (viewpoint alignment), or Leading (experiential
      delivery).'
    prompts:
    - What is the current lead-to-revenue conversion rate (leads per 100 that convert to revenue)?
    - Is messaging primarily product-focused (features/benefits), value-focused (business outcomes), or context-focused (strategic
      viewpoint)?
    - How well do target buyers recognize and prioritize this solution vs. alternatives in early consideration?
    - What percentage of deals lost are ones where the company wasn't even considered (losing deals you're not in)?
  - id: unique-value-definition
    name: Unique Value Definition
    description: Articulate the intersection of unique capabilities expressed as business benefits, customer willingness to
      pay, and competitive gaps. Unique Value = (Your Business Benefits ∩ Customer Value) - Competitor Capabilities.
    prompts:
    - Which unique features or combinations of features drive business benefits that customers will actually pay for?
    - How do these benefits translate from 'what' (outcome) to 'how' (mechanism) to 'why' (business impact) and 'why us' (unique
      delivery)?
    - Which customer value statements can competitors also credibly claim, and which are truly unique to this company?
    - 'For each value claim: Does it reduce costs, increase revenues, improve productivity/efficiency, or reduce risk/improve
      compliance?'
  - id: viewpoint-story-construction
    name: Viewpoint Story Construction
    description: Build a four-act Viewpoint Story using the AIM-STEEP framework that creates strategic context aligning customer
      reality with company value. Viewpoint sets the terrain before presenting Value.
    prompts:
    - What major business changes are impacting target customers (Social, Technological, Economic, Environmental, Political
      trends)?
    - Which of these changes creates both Aspiration (opportunity) and Insecurity (risk/threat) for target buyers?
    - How does the company's unique value delivery directly address the intersection of these aspirations and insecurities?
    - 'What is the four-act story: Act 1 (Change is happening), Act 2 (This creates urgency), Act 3 (Here''s what''s possible),
      Act 4 (We can help you get there)?'
  - id: viewpoint-value-alignment
    name: Viewpoint-Value Alignment
    description: Ensure the Viewpoint Story and Unique Value statements are tightly aligned so context naturally leads to
      the company's differentiated solution without appearing self-serving.
    prompts:
    - Does the Viewpoint Story make the company's Unique Value feel strategically necessary rather than merely beneficial?
    - When prospects embrace the Viewpoint, do they naturally conclude that this company's approach is the right one?
    - Is the story tilting the playing field so competitors must respond on this company's terms?
    - 'Which Viewpoint Story type fits best: Better Mousetrap (hidden value), Brave New World (future vision), or New Reality
      (current change)?'
  - id: experience-and-engagement-strategy
    name: Experience and Engagement Strategy
    description: Design high-engagement, high-experience programs that demonstrate value early and often, moving from 'tell
      me' to 'show me' across the buying journey.
    prompts:
    - How can prospects experience the product value before deep sales engagement (trials, demos, interactive tools, freemium)?
    - What content and programs score high on both engagement (interactive, participatory) and experience (hands-on, demonstrable)?
    - Where in the current marketing mix is the company over-indexed on low-engagement explanatory content (whitepapers, webinars,
      data sheets)?
    - 'How can the ''Kelley No-Punt Advantage'' principle apply: putting experience front and center, early and often?'
  - id: market-leadership-phase-strategy
    name: Market Leadership Phase Strategy
    description: Tailor messaging mix (Value/Viewpoint/Purpose ratios) and audience focus based on whether building a Flashmob
      (early customers), marshaling a Parade (category leadership), or igniting a Movement (market transformation).
    prompts:
    - Is the current goal to attract early passionate customers (Flashmob), emerge as category leader (Parade), or transform
      the broader market (Movement)?
    - 'What is the appropriate messaging mix for this phase: Flashmob (70% Value, 30% Viewpoint), Parade (40% Value, 50% Viewpoint,
      10% Purpose), or Movement (20% Value, 40% Viewpoint, 40% Purpose)?'
    - 'Who is the primary audience: Problem Owner/Implementer (Flashmob), Functional/P&L Owner (Parade), or C-level Executive
      (Movement)?'
    - 'What communication objective fits: Unique Insight (Flashmob), Strategic Alignment (Parade), or Inspiration (Movement)?'
