rubric:
  description: Evaluates whether the Breakthrough Marketing strategy effectively diagnoses current state, articulates differentiated
    value, creates aligned context through Viewpoint, and provides actionable path to market leadership with appropriate experience
    strategy.
  dimensions:
  - name: Unique Value Clarity and Differentiation
    weight: 0.25
    scoring:
      1: Value statements are generic benefits any competitor could claim, or are feature-focused without clear business outcomes.
      3: Value statements describe clear business outcomes but some overlap with competitor claims or lack the 'why us' differentiation.
      5: Value statements represent true intersection of unique capabilities, customer willingness to pay, and competitive
        gaps. Each includes what/how/why/why-us.
    improvement_guidance: 'Test each value statement: Would a customer pay specifically for this? Can competitors credibly
      make the same claim? If yes to competitor question, refine to capture unique delivery mechanism or outcome magnitude.'
  - name: Viewpoint Story Power and Alignment
    weight: 0.3
    scoring:
      1: No clear Viewpoint Story, or story is generic industry trends disconnected from company's Unique Value.
      3: Viewpoint Story addresses relevant customer context but alignment with Unique Value feels forced or requires logical
        leaps.
      5: Four-act Viewpoint Story creates compelling context using AIM-STEEP factors that naturally leads to company's Unique
        Value as the strategic solution. Tilts playing field.
    improvement_guidance: Ensure the business changes identified in the Viewpoint create both aspiration and insecurity that
      directly connect to what makes this company's value unique. The story should make competitors' approaches feel inadequate
      or outdated.
  - name: Market Leadership Strategy Appropriateness
    weight: 0.2
    scoring:
      1: Messaging mix and audience strategy don't match actual market phase, or phase identification is unclear.
      3: Phase identification is reasonable but messaging mix ratios or audience priorities have some misalignment.
      5: Clear identification of Flashmob/Parade/Movement phase with appropriate messaging mix percentages, target audience
        level, and communication objectives.
    improvement_guidance: 'Validate phase identification against business metrics (customer count, market recognition, category
      maturity). Adjust messaging mix to match: Flashmob favors Value, Parade needs Viewpoint emphasis, Movement requires
      Purpose.'
  - name: Experience Strategy and Velocity
    weight: 0.15
    scoring:
      1: Strategy relies heavily on explanatory content (whitepapers, webinars) with little hands-on experience offered to
        prospects.
      3: Some experience elements present but gated late in sales cycle or not prioritized in marketing mix.
      5: Clear shift toward high-engagement, high-experience programs early in buyer journey. Specific initiatives identified
        to demonstrate value before heavy sales involvement.
    improvement_guidance: 'Audit current content against engagement/experience matrix. Identify top 2-3 opportunities to shift
      from ''tell me'' to ''show me'' early in buying cycle. Consider: interactive demos, trial programs, assessment tools,
      configurators.'
  - name: Actionability and Metrics
    weight: 0.1
    scoring:
      1: Recommendations are conceptual without clear next steps, owners, or success metrics.
      3: Some actionable initiatives identified but sequencing, ownership, or metrics are incomplete.
      5: Clear 90-180 day roadmap with specific initiatives, owners, sequencing, and metrics tied to Market Leadership Achievement
        Ladder progression.
    improvement_guidance: Define 3-5 priority initiatives with owners and 30/60/90-day milestones. Set baseline for current
      lead-to-revenue conversion and target improvement (minimum 2-3x for Breakthrough stage).
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Feature-Benefit Trap
  description: Staying stuck in traditional feature-benefit messaging because 'it's what we've always done' or 'our sales
    team is comfortable with it.' This keeps companies in Launch/Participate stages indefinitely.
  mitigation: Recognize that feature-benefit worked in information-scarce markets but fails when buyers have unlimited alternatives.
    Lead with Viewpoint to set context, then present Unique Value as the strategic solution. Sales teams will embrace this
    when they see higher win rates.
- pattern: Value Without Viewpoint
  description: Articulating strong Unique Value but failing to create strategic context, resulting in being seen as 'nice
    to have' rather than 'must have.' The solution remains a priority problem.
  mitigation: Build the Viewpoint Story first to establish why change is necessary and urgent. Value should feel like the
    inevitable solution to the context you've created, not a standalone claim competing for budget.
- pattern: Viewpoint Without Unique Value
  description: Creating compelling market context but having unclear or generic value delivery, so competitors can ride your
    Viewpoint wave and win the deals.
  mitigation: Ensure tight alignment between Viewpoint and Unique Value. The context you create should naturally favor your
    specific, differentiated capabilities. If competitors can easily claim they solve the Viewpoint you've defined, refine
    your Value or adjust your Viewpoint.
- pattern: Explanatory Content Addiction
  description: Over-investing in whitepapers, webinars, and other low-engagement content because it's easier to produce than
    true experiential programs. Missing the velocity that comes from 'show don't tell.'
  mitigation: 'Apply the Kelley No-Punt principle: put experience front and center early in the buying process. Even if imperfect,
    a hands-on trial or interactive demo that shows 60% of value outperforms content that describes 100% of it.'
- pattern: Wrong Messaging Mix for Phase
  description: Using Flashmob-stage value messaging when trying to lead a Parade, or leading with Purpose when still building
    initial Flashmob. Misalignment with market leadership phase.
  mitigation: Honestly assess current phase based on customer count, market recognition, and category maturity. Flashmob =
    70% Value, Parade = 50% Viewpoint, Movement = 40% Purpose. Match messaging mix to reality, not aspiration.
- pattern: Ignoring the Playing Field Tilt
  description: Accepting the market context as defined by incumbents or category leaders rather than creating your own context
    that favors your differentiation.
  mitigation: Use Viewpoint strategically to tilt the playing field. Identify which business changes and strategic priorities
    make your unique approach the right one and competitors' approaches inadequate. Make them respond on your terms.
