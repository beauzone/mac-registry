metadata:
  id: paid-media-mix-model
  version: 1.0.0
  display_name: Paid Media Mix Model
  category: growth
  description: Builds the consumer brand paid media investment model across channel allocation, audience segmentation by channel, creative-to-channel fit, budget optimization, and attribution linkage to maximize return on paid acquisition spend.
  best_for:
    stages:
    - growth
    - scale
    - optimization
    roles:
    - cmo
    - paid-media-manager
    - head-of-performance
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: total_paid_budget
    description: Total monthly or quarterly paid media budget available across all channels
    source: user_input
  - field: current_channel_mix
    description: Current channels active, spend by channel, and performance metrics (CPC, CTR, ROAS, CPA) per channel
    source: user_input
  - field: target_cac_and_roas
    description: Target customer acquisition cost and/or return on ad spend that defines success
    source: user_input
  optional:
  - field: consumer_segment_data
    description: Key consumer segments with size estimates and channel behavior by segment
    source: user_input
  - field: creative_performance_history
    description: Historical performance data by creative format (video, static, UGC, carousel) and channel
    source: user_input
  - field: attribution_model
    description: Current attribution model in use (last-click, first-click, linear, data-driven) and its known limitations
    source: user_input
analysis:
  instructions: 'Design the paid media mix across six analytical dimensions. Begin with a channel portfolio audit: for each active channel, calculate the true CPA (not blended ROAS), assess audience quality through cohort LTV analysis, and determine whether the channel is operating within its efficiency frontier (the point of diminishing marginal returns). Map the audience-channel fit matrix: which consumer segments are most active on each platform, and does the current channel spend align with where the target segment spends attention? Design the creative strategy by channel: video-first channels (TikTok, YouTube) require fundamentally different creative than intent-capture channels (Google Search, Shopping) or social proof channels (Instagram, Pinterest). Model the budget optimization: use historical CPA data to calculate the marginal CPA at different spend levels for each channel, then allocate budget to maximize total conversions within the target CPA threshold. Design the attribution approach appropriate to the business maturity — new brands should use media mix modeling (MMM) principles even without formal MMM software. Conclude with a channel investment thesis for the next 90 days and the three highest-priority creative tests.'
  dimensions:
  - id: channel-portfolio-analysis
    name: Channel Portfolio Analysis
    description: Audits each active channel against efficiency, audience quality, and marginal return
    prompts:
    - What is the true CPA for each channel after adjusting for attribution model bias and return rates?
    - Which channels have the best cohort LTV for acquired customers, and how does that differ from the best CPA channels?
    - At current spend levels, which channels are operating beyond their efficiency frontier (marginal CPA rising)?
    - Which channels should be scaled, maintained, or sunset based on CPA trend and audience quality?
  - id: audience-channel-fit
    name: Audience-Channel Fit
    description: Maps consumer segment behavior to channel and validates that spend aligns with segment attention
    prompts:
    - Where does each target consumer segment spend the most paid media attention, and does current channel spend match that?
    - Which channels allow the most granular audience targeting for the primary consumer segment?
    - Are there high-value consumer segments that are underserved by current channel mix?
    - How does creative format engagement differ by consumer segment across channels?
  - id: budget-allocation
    name: Budget Allocation Model
    description: Optimizes budget distribution across channels to maximize conversions within CPA targets
    prompts:
    - What is the marginal CPA at current spend levels for each channel, and at what spend level does each channel show diminishing returns?
    - What is the optimal budget distribution across channels to maximize total conversions at or below target CPA?
    - How much budget should be held in a test budget pool for new channel and audience experiments?
    - What is the right balance between evergreen always-on budget and campaign-specific burst budget?
  - id: creative-strategy-by-channel
    name: Creative Strategy by Channel
    description: Defines the creative format and message strategy appropriate to each channel context
    prompts:
    - What creative format performs best on each channel — user-generated content (UGC), polished brand video, static image, or interactive format?
    - How does the message hierarchy change between upper-funnel awareness channels and lower-funnel intent-capture channels?
    - What is the optimal creative refresh cadence for each channel to prevent ad fatigue?
    - Are there creative assets from creator/influencer partnerships that can be licensed for paid amplification (whitelisting)?
  - id: attribution-linkage
    name: Attribution Linkage
    description: Evaluates the attribution model and designs corrections for known model limitations
    prompts:
    - What are the known biases in the current attribution model, and how are they correcting the channel mix toward over- or under-investment in specific channels?
    - What incrementality testing has been done or is planned to validate whether paid channels are driving genuine incremental conversions?
    - How is brand spend (awareness campaigns) evaluated separately from performance spend when attribution models cannot capture brand contribution?
    - What holdout tests or geo-lift experiments could validate the true incremental value of the top two channels?
  - id: cac-by-channel
    name: CAC by Channel Benchmark & Target Setting
    description: Sets channel-specific CAC targets based on cohort LTV data and payback period requirements
    prompts:
    - What is the maximum acceptable CAC by channel given channel-specific LTV and payback period requirements?
    - Which channels are currently operating above their CAC ceiling, and what intervention will bring them within target?
    - How does CAC differ across consumer segments on the same channel, and should segment-level CAC targets be set?
    - What is the projected CAC trend over the next six months given audience saturation and competitive bid pressure on each channel?
output_templates:
- id: primary
  name: Paid Media Mix Model & Investment Thesis
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Channel Portfolio Audit\n\n{channel_portfolio_audit}\n\n## Audience-Channel Fit Analysis\n\n{audience_channel_fit}\n\n## Budget Allocation Model\n\n{budget_allocation}\n\n## Creative Strategy by Channel\n\n{creative_strategy}\n\n## Attribution Analysis & Corrections\n\n{attribution_analysis}\n\n## CAC by Channel Targets\n\n{cac_targets}\n\n## 90-Day Investment Thesis\n\n{investment_thesis}\n\n## Priority Creative Tests\n\n{creative_tests}\n\n'
rubric:
  description: Evaluates the rigor and ROI potential of the paid media mix model.
  dimensions:
  - name: Channel Efficiency Analysis
    weight: 0.30
    scoring:
      1: Channel performance is compared using blended ROAS or platform-reported metrics without adjusting for attribution bias or audience quality.
      3: Channel CPA is calculated from real data but not adjusted for LTV differences by acquisition source.
      5: Channel CPA is calculated from real data, adjusted for LTV by acquisition cohort, and compared against channel-specific CAC ceiling derived from LTV and payback requirements.
    improvement_guidance: Build a cohort LTV model that separates customers by acquisition channel and compare channel-specific LTV against channel-specific CAC to get true channel ROI.
  - name: Budget Optimization Rigor
    weight: 0.25
    scoring:
      1: Budget allocation is proportional to historical spend with no model for marginal return or channel efficiency frontier.
      3: Budget optimization considers CPA trends but does not model the marginal return curve at different spend levels.
      5: Budget allocation is modeled against the marginal CPA curve for each channel, with spend concentrated below the efficiency frontier and diminishing-return budget reallocated.
    improvement_guidance: Run controlled spend scaling tests (increase each channel's budget by 30% for 2 weeks) to measure marginal CPA and build the efficiency frontier model.
  - name: Attribution Quality
    weight: 0.25
    scoring:
      1: Attribution model limitations are not acknowledged; channel decisions are made based on last-click data without questioning its accuracy.
      3: Attribution limitations are acknowledged but no corrections or holdout tests are designed to validate channel contribution.
      5: Attribution limitations are explicitly modeled, correction factors are applied to known bias channels, and an incrementality testing roadmap is defined.
    improvement_guidance: Run at least one geo-holdout test per quarter on the highest-spend channel to validate its true incremental contribution. Use the results to calibrate attribution model correction factors.
  - name: Creative Strategy Specificity
    weight: 0.20
    scoring:
      1: Creative strategy is generic across channels with no differentiation for channel context.
      3: Creative strategy differentiates by channel but lacks specific performance data linking creative formats to conversion rates.
      5: Creative strategy is grounded in channel-specific performance data, with clear format recommendations, message hierarchy, and refresh cadence for each channel.
    improvement_guidance: Build a creative performance database linking creative format, message, and audience segment to CPA outcomes for each channel. Use it to make evidence-based creative investment decisions.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Last-Click Attribution Bias
  description: Making channel investment decisions based purely on last-click attribution, which systematically over-credits bottom-funnel intent channels (Google Search, retargeting) and under-credits upper-funnel channels that create the demand those intent channels capture.
  mitigation: Run a holdout test on the top search or retargeting channel. If conversion rates in the holdout group barely decline, the channel is capturing demand generated elsewhere rather than creating incremental demand.
- pattern: Symmetric Budget Scaling
  description: Scaling all channels proportionally when total budget increases, rather than concentrating incremental budget in the channels operating furthest below their efficiency frontier.
  mitigation: Model the marginal CPA at current and projected spend levels for each channel. Concentrate incremental budget in channels with flat or declining marginal CPA.
- pattern: Creative Neglect
  description: Optimizing media buying precision while neglecting creative quality, resulting in a technically well-targeted audience that sees uninspiring creative that fails to convert.
  mitigation: Allocate at least 25% of the paid media management investment to creative development and testing. Track creative performance as a first-class metric alongside channel efficiency.
chaining:
  after:
  - framework_id: consumer-acquisition-funnel
    reason: The acquisition funnel analysis identifies where paid media sits in the conversion journey and what the acceptable CPA targets are.
  before:
  - framework_id: aarrr-pirate-metrics
    reason: Paid media drives the Acquisition layer of AARRR; optimizing the paid mix directly determines the efficiency of the acquisition engine.
