metadata:
  id: influencer-creator-marketing-strategy
  version: 1.0.0
  display_name: Influencer & Creator Marketing Strategy
  category: growth
  description: Structures creator marketing programs across tier strategy, creator-brand fit scoring, content brief design, performance measurement, and ROI modeling to build influencer as a scalable, repeatable acquisition and brand-building channel.
  best_for:
    stages:
    - launch
    - growth
    - scale
    roles:
    - cmo
    - head-of-brand
    - influencer-creator-manager
  invocation_modes:
  - explicit
  - recommended
  - free_form
  schema_version: '1.0'
inputs:
  required:
  - field: brand_and_product_description
    description: What the brand stands for, who it serves, and what the product does
    source: user_input
  - field: target_consumer_segment
    description: Primary consumer segment demographics, psychographics, and platform behavior
    source: user_input
  - field: creator_program_objective
    description: Primary goal — brand awareness, direct response conversion, content production, or community building
    source: user_input
  optional:
  - field: budget_range
    description: Monthly or campaign budget available for creator fees and production costs
    source: user_input
  - field: existing_creator_partnerships
    description: Any current creator relationships, their tier, and performance data
    source: user_input
  - field: competitor_creator_strategy
    description: How competitors are using creators — which tiers, which platforms, what content style
    source: user_input
analysis:
  instructions: 'Design the end-to-end creator marketing strategy across six dimensions. First, define the tier strategy: nano-creators (1K–10K followers — high authenticity, low cost, high engagement rate), micro-creators (10K–100K — strong niche authority, good conversion rates), macro-creators (100K–1M — broader reach, rising cost-per-engagement), and mega/celebrity (1M+ — pure reach, low engagement rate, high cost). Most DTC brands should run a portfolio weighted 60% micro, 30% nano, and 10% macro. Second, define creator-brand fit scoring: audience overlap with target segment, content style alignment with brand voice, engagement rate vs. follower count ratio, and past brand partnership performance. Third, design the content brief: brand guardrails, product integration requirements, creative latitude boundaries, call-to-action design, and disclosure compliance (FTC). Fourth, define the content governance process: approval workflows, revision rounds, and evergreen content licensing. Fifth, design the measurement framework: separate brand awareness metrics (reach, impressions, share of voice) from performance metrics (promo code redemptions, affiliate link clicks, CPA). Sixth, build the ROI model: calculate creator media value, earned media multiplier, and compare creator CPA to paid social CPA for equivalent audience quality.'
  dimensions:
  - id: creator-tier-strategy
    name: Creator Tier Strategy
    description: Defines the mix of creator tiers and platform strategy for the program
    prompts:
    - What is the optimal tier mix given the brand's objective (awareness vs. conversion vs. community)?
    - Which platforms does the target consumer segment use most actively for product discovery in this category?
    - What is the minimum engagement rate threshold below which a creator will not be considered, regardless of follower count?
    - How many creators per tier are needed to achieve statistically meaningful performance data within the budget?
  - id: creator-brand-fit
    name: Creator-Brand Fit Scoring
    description: Defines the criteria and scoring model for selecting creators who authentically align with the brand
    prompts:
    - What are the non-negotiable brand values or content standards a creator must demonstrate before being considered?
    - How is audience overlap with the target consumer segment measured and what is the minimum overlap threshold?
    - What past brand partnership history or product category context signals that a creator will be credible for this brand?
    - How will sentiment analysis of creator comments be used to assess authentic audience trust in the creator's recommendations?
  - id: brief-design
    name: Content Brief Design
    description: Designs the creator brief to maximize authenticity while protecting brand standards
    prompts:
    - What are the non-negotiable brand guardrails (what the creator must not say or do), and how are they communicated without stifling creative voice?
    - What product integration requirement (hero feature, use case, visual identity element) must appear in the content?
    - How much creative latitude is given to the creator, and is there evidence that higher creator autonomy produces higher engagement?
    - What call-to-action (promo code, link in bio, swipe-up, direct DM) is optimal for the program objective and platform?
  - id: content-governance
    name: Content Governance & Compliance
    description: Defines the approval process, disclosure requirements, and content licensing terms
    prompts:
    - What is the content approval workflow — how many revision rounds, what is the approval turnaround SLA?
    - How is FTC disclosure compliance ensured and monitored across the creator roster?
    - What content licensing terms should be negotiated to enable paid amplification (whitelisting) of top-performing creator content?
    - How is brand safety monitored on an ongoing basis for creators with active licensing agreements?
  - id: performance-measurement
    name: Performance Measurement Framework
    description: Defines the metrics and attribution approach for creator program measurement
    prompts:
    - How is creator-driven conversion tracked — unique promo codes, tagged affiliate links, UTM parameters, or post-click attribution windows?
    - What is the content performance scorecard for a brand awareness campaign vs. a direct response campaign?
    - How is creator earned media value (EMV) calculated, and is EMV used for budget justification or de-prioritized in favor of direct CPA?
    - What is the minimum data threshold (posts, impressions, conversions) before drawing performance conclusions about a creator?
  - id: roi-model
    name: Creator ROI Model
    description: Builds the economic model to compare creator investment against alternative acquisition and brand-building channels
    prompts:
    - What is the all-in cost per creator post including fees, product seeding, production support, and management overhead?
    - How does creator CPA compare to paid social CPA for equivalent audience quality and product category?
    - At what CPA threshold does creator marketing become economically superior to paid social for this product?
    - What is the long-tail content value — how much engagement and conversion does creator content generate after the initial posting window?
output_templates:
- id: primary
  name: Influencer & Creator Marketing Strategy
  format: memo
  when_to_use: ''
  template: '## Executive Summary\n\n{executive_summary}\n\n## Creator Tier Strategy\n\n{creator_tier_strategy}\n\n## Creator Selection Criteria & Scoring\n\n{creator_selection_criteria}\n\n## Content Brief Template\n\n{content_brief_template}\n\n## Governance & Compliance\n\n{content_governance}\n\n## Measurement Framework\n\n{performance_measurement}\n\n## ROI Model\n\n{roi_model}\n\n## Program Launch Plan\n\n{launch_plan}\n\n'
rubric:
  description: Evaluates the quality and scalability of the influencer and creator marketing strategy.
  dimensions:
  - name: Tier Strategy Rationale
    weight: 0.25
    scoring:
      1: Tier strategy is not defined; the program defaults to whoever is cheapest or has the most followers.
      3: Tier strategy is defined but the budget allocation across tiers is not tied to program objectives or conversion data.
      5: Tier strategy is defined with a specific portfolio mix, platform rationale, and budget allocation tied to program objectives and historical conversion data.
    improvement_guidance: Run a 90-day test with at least five creators per tier before finalizing the tier allocation. Let conversion data drive the budget split, not follower counts.
  - name: Creator Fit Scoring Rigor
    weight: 0.25
    scoring:
      1: Creator selection is subjective with no scoring criteria or audience validation.
      3: Scoring criteria are defined but lack quantitative thresholds or are not applied consistently.
      5: Creator scoring uses a weighted multi-criteria model with specific thresholds for engagement rate, audience overlap, and brand safety, applied consistently to all candidates.
    improvement_guidance: Build a creator scorecard with weighted criteria and apply it to every creator before outreach. Reject any creator who scores below 60/100 regardless of follower count.
  - name: Brief Clarity & Creative Latitude
    weight: 0.25
    scoring:
      1: Brief is either too restrictive (reads like a script) or too loose (no brand guardrails), leading to either inauthentic content or brand safety risk.
      3: Brief defines guardrails and requirements but creative latitude guidance is vague.
      5: Brief clearly separates non-negotiables (brand safety, disclosure, product mention) from creative latitude zones, and provides inspiration examples without prescribing execution.
    improvement_guidance: Test two brief versions — high-directive and high-latitude — with matched creator pairs and compare engagement rates and conversion rates.
  - name: ROI Model Completeness
    weight: 0.25
    scoring:
      1: ROI is not modeled; investment decisions are based on intuition or industry benchmarks.
      3: ROI model covers creator fees but omits management overhead, seeding costs, and long-tail content value.
      5: Full ROI model includes all-in cost, direct CPA, earned media value, long-tail content value, and comparison to paid social CPA.
    improvement_guidance: Build the ROI model in a live tracking spreadsheet that updates monthly as campaign data comes in. Include a 6-month content decay curve for long-tail value.
  thresholds:
    revise: 2.5
    publish_ready: 3.5
    escalate_to_user: 2.0
anti_patterns:
- pattern: Vanity Follower Count Selection
  description: Selecting creators based primarily on follower count rather than engagement rate, audience relevance, and conversion history, resulting in high-cost, low-performance partnerships.
  mitigation: Require a minimum engagement rate threshold (e.g., 3% for Instagram, 5% for TikTok) and an audience overlap score before follower count is even considered.
- pattern: Over-Scripting
  description: Providing creators with such a rigid script that their content feels inauthentic to their audience, destroying the primary value of creator marketing — genuine peer endorsement.
  mitigation: Define non-negotiables clearly but limit them to brand safety and disclosure requirements. Let creators express product benefits in their own voice and style. Test high-latitude briefs.
- pattern: Single-Platform Concentration
  description: Concentrating the entire creator program on a single platform (typically Instagram), creating catastrophic exposure to algorithm changes or platform-level reach declines.
  mitigation: Diversify across at least two platforms relevant to the target segment. Build platform diversification into the creator mix from the first cohort.
chaining:
  after:
  - framework_id: stp-segmentation-targeting-positioning
    reason: STP defines the target segment and positioning that the creator program must communicate; creator selection flows from segment-audience overlap analysis.
  before:
  - framework_id: growth-loops-framework
    reason: Creator marketing can feed the top of a growth loop; this framework should inform how creator-driven acquisition integrates into the broader growth system.
