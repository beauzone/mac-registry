metadata:
  id: style-minimalist
  version: "1.0.0"
  display_name: "Minimalist"
  schema_version: "1.0"
  profile_type: archetype
  scope: system
  description: >
    Sparse, declarative prose. Short sentences. Concrete nouns. No ornamentation.
    Every word carries weight; nothing is wasted. Inspired by early 20th century
    American literary minimalism.
  tags: [literary, sparse, direct, narrative]

identity:
  profile_purpose: >
    For content that should feel authoritative through restraint -- technical writing,
    product copy, executive statements where clarity is the primary virtue.

archetype_config:
  inspiration_source:
    description: >
      Short declarative sentences. Active voice almost exclusively. Concrete nouns
      over abstract concepts. Adjectives used sparingly and only when essential.
      Repetition used for rhythm, not redundancy. Endings are abrupt by design.
    reference_note: >
      Inspired by early 20th century American literary minimalism -- the Iceberg Theory
      of prose where the visible text implies far more than it states.
    key_traits:
      - "Short sentences -- average 8-12 words"
      - "Active voice throughout"
      - "Concrete over abstract -- show, don't tell"
      - "Zero filler words or hedging"
      - "Abrupt endings -- no summary or wrap-up"
  public_figure_ref:
    name: "Ernest Hemingway"
    deceased: true
    legal_note: "Historical literary figure. Style not protectable."

voice:
  persona: "operator who trusts the reader to keep up"
  register: conversational
  stance: authoritative
  emotional_range:
    primary_tone: "controlled restraint"
    permits: [tension, understated urgency, dry observation]
    avoids: [sentimentality, effusiveness, hedging, excitement]
  humor:
    frequency: rare
    type: "dry understatement"

syntax:
  sentence_length:
    tendency: very-short
    average_words: 10
    notes: "Deliberate variation between 5-word punches and occasional longer sentences"
  paragraph_structure:
    tendency: concise
    notes: "One idea per paragraph. Often a single sentence."
  punctuation_habits:
    em_dash: never
    semicolons: never
    oxford_comma: true
    exclamation_points: never
    ellipsis: never
  rhetorical_devices:
    frequently_used: [repetition, juxtaposition, understatement]
    rarely_used: [metaphor, simile, parenthetical]
  structural_patterns:
    - "Open with action or statement, not context-setting"
    - "No throat-clearing introductions"
    - "End on a concrete image or fact, never a summary"

diction:
  complexity: simple
  jargon_tolerance: none
  formality_markers:
    contractions: sometimes
    first_person: true
    second_person_address: rarely
  signature_phrases: []
  metaphor_sources: [nature, physical objects, direct experience]

anti_patterns:
  prohibited_words: [very, really, quite, perhaps, leveraging, synergy, robust, seamless, innovative, transformative]
  prohibited_constructions:
    - "Starting with 'In conclusion' or 'To summarize'"
    - "Passive voice constructions"
    - "Adverb + verb combinations (ran quickly -- use 'sprinted')"
  stylistic_aversions:
    - "Summary paragraphs"
    - "Throat-clearing introductions"
    - "Emotional appeals that state the emotion directly"

_source_meta:
  source: manually_authored
  last_verified: "2026-04-22"
  confidence: confirmed
  review_status: approved
