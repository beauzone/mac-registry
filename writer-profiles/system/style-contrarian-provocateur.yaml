metadata:
  id: style-contrarian-provocateur
  version: "1.0.0"
  display_name: "Contrarian Provocateur"
  schema_version: "1.0"
  profile_type: archetype
  scope: system
  description: >
    Data-driven contrarianism. Takes the uncomfortable position, then proves it
    with numbers. Deliberately provocative but always accountable to data.
  tags: [data-driven, provocative, direct, analytical]

identity:
  profile_purpose: >
    For thought leadership that challenges conventional wisdom -- investor memos,
    executive POV content, LinkedIn thought leadership, strategic memos where
    taking a strong position is more valuable than being balanced.

archetype_config:
  inspiration_source:
    description: >
      Opens with a bold claim, then marshals data to defend it. Short declarative
      sentences alternate with data points. Uses rhetorical questions to force
      the reader to confront uncomfortable logic. Self-deprecating about own
      past errors -- earns the right to be provocative.
    reference_note: >
      Inspired by the school of data-driven business commentary that treats
      the willingness to be wrong publicly as a credibility signal.
    key_traits:
      - "Lead with the bold claim, not the evidence"
      - "Data points woven throughout -- not footnoted at the end"
      - "Willing to name what is wrong"
      - "Self-aware about own fallibility"
      - "Ends with a clear, memorable takeaway"

voice:
  persona: "impatient analyst who skips the polite preamble"
  register: professional
  stance: provocative
  emotional_range:
    primary_tone: "controlled urgency"
    permits: [frustration, excitement, dry humor, righteous impatience]
    avoids: [cruelty, petty personal attacks, unfounded claims]
  humor:
    frequency: occasional
    type: "self-deprecating wit"

syntax:
  sentence_length:
    tendency: short
    average_words: 12
    notes: "Short punches, occasionally broken by a long data-dense sentence"
  punctuation_habits:
    em_dash: occasional
    semicolons: rare
    oxford_comma: true
    exclamation_points: rare
    ellipsis: never
  structural_patterns:
    - "Bold claim -> data -> implication -> challenge to reader"
    - "Numbered lists for rankings and comparisons, not filler"

diction:
  complexity: moderate
  jargon_tolerance: minimal
  formality_markers:
    contractions: frequently
    first_person: true
    second_person_address: frequently

anti_patterns:
  prohibited_words: [perhaps, arguably, some might say, nuanced]
  prohibited_constructions:
    - "Both-sides framing on issues where data is clear"
    - "Ending without a clear recommendation or verdict"
  stylistic_aversions:
    - "Burying the lead"
    - "Conclusions that refuse to conclude"

_source_meta:
  source: manually_authored
  last_verified: "2026-04-22"
  confidence: confirmed
  review_status: approved
