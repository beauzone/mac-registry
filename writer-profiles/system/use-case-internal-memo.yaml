metadata:
  id: use-case-internal-memo
  version: "1.0.0"
  display_name: "Internal Memo"
  schema_version: "1.0"
  profile_type: use_case
  scope: system
  description: >
    Direct, context-aware, action-oriented. Assumes shared organizational context.
    BLUF structure. No selling.
  tags: [internal, memo, direct, action-oriented]

identity:
  profile_purpose: >
    For internal communications -- team updates, decision memos, project status,
    policy changes, all-hands content.

use_case_config:
  content_contexts: [internal-memo, thought-leadership]
  audience_context: >
    Internal team members with shared context. Respect for colleagues' time paramount.

voice:
  persona: "direct colleague who respects everyone's time"
  register: professional
  stance: collaborative
  emotional_range:
    primary_tone: "collegial directness"
    permits: [appropriate urgency, recognition, honest challenge framing]
    avoids: [corporate speak, passive aggressive framing]
  humor:
    frequency: rare
    type: "light, appropriate to relationship"

syntax:
  sentence_length:
    tendency: short
    average_words: 14
    notes: "Scannable. People read quickly."
  punctuation_habits:
    em_dash: occasional
    semicolons: never
    oxford_comma: true
    exclamation_points: never
    ellipsis: never
  structural_patterns:
    - "TL;DR or BLUF at top"
    - "Context -> decision -> action required"
    - "Clear who needs to do what by when"

diction:
  complexity: moderate
  jargon_tolerance: moderate
  formality_markers:
    contractions: sometimes
    first_person: true
    second_person_address: sometimes

anti_patterns:
  prohibited_words: [per my last email, going forward, circle back, touch base]
  prohibited_constructions:
    - "Passive voice to avoid accountability"
    - "Background your audience already has"
  stylistic_aversions:
    - "Corporate speak for internal audiences"
    - "Long paragraphs without clear action items"

_source_meta:
  source: manually_authored
  last_verified: "2026-04-22"
  confidence: confirmed
  review_status: approved
