name: Sync GTM Strategist skill version

on:
  push:
    paths:
      - 'skills/user/gtm-strategist/SKILL.md'
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-skill-version:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get previous SKILL_VERSION
        id: prev
        run: |
          PREV=$(git show HEAD~1:skills/user/gtm-strategist/SKILL.md \
            | grep 'SKILL_VERSION:' \
            | sed 's/.*SKILL_VERSION: //' \
            | tr -d ' -->') || PREV="0.0.0"
          echo "version=$PREV" >> $GITHUB_OUTPUT
          echo "Previous version: $PREV"

      - name: Get current SKILL_VERSION
        id: current
        run: |
          CURR=$(grep 'SKILL_VERSION:' skills/user/gtm-strategist/SKILL.md \
            | sed 's/.*SKILL_VERSION: //' \
            | sed 's/[[:space:]]*-->[[:space:]]*//' \
            | xargs)
          DATE=$(grep 'SKILL_UPDATED:' skills/user/gtm-strategist/SKILL.md \
            | sed 's/.*SKILL_UPDATED: //' \
            | sed 's/[[:space:]]*-->[[:space:]]*//' \
            | xargs) || DATE=$(date +%Y-%m-%d)
          echo "version=$CURR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Current version: $CURR"

      - name: Resolve final version and update files
        id: resolved
        run: |
          python3 - <<EOF
          import re, subprocess
          from pathlib import Path

          prev = "${{ steps.prev.outputs.version }}"
          curr = "${{ steps.current.outputs.version }}"
          today = "$(date +%Y-%m-%d)"

          skill_path = Path('skills/user/gtm-strategist/SKILL.md')
          content = skill_path.read_text()

          if prev == curr:
              # Version not manually bumped — auto-bump patch
              parts = curr.split('.')
              parts[2] = str(int(parts[2]) + 1)
              new_version = '.'.join(parts)

              content = content.replace(
                  f'SKILL_VERSION: {curr}',
                  f'SKILL_VERSION: {new_version}'
              )
              content = re.sub(
                  r'^version: [\"\'']?[\d\.]+[\"\'']?',
                  f'version: "{new_version}"',
                  content,
                  flags=re.MULTILINE,
                  count=1
              )
              content = re.sub(
                  r'SKILL_UPDATED: \d{4}-\d{2}-\d{2}',
                  f'SKILL_UPDATED: {today}',
                  content
              )
              skill_path.write_text(content)
              print(f"AUTO-BUMP: {curr} -> {new_version}")

              with open("$GITHUB_OUTPUT", "a") as f:
                  f.write(f"version={new_version}\n")
                  f.write(f"date={today}\n")
                  f.write("changed=true\n")
          else:
              # Version manually bumped — sync front matter only if needed
              new_version = curr
              updated = re.sub(
                  r'^version: [\"\'']?[\d\.]+[\"\'']?',
                  f'version: "{new_version}"',
                  content,
                  flags=re.MULTILINE,
                  count=1
              )
              if updated != content:
                  skill_path.write_text(updated)
                  print(f"Front matter synced to {new_version}")
                  changed = "true"
              else:
                  print("Front matter already in sync. No SKILL.md changes needed.")
                  changed = "false"

              with open("$GITHUB_OUTPUT", "a") as f:
                  f.write(f"version={new_version}\n")
                  f.write(f"date=${{ steps.current.outputs.date }}\n")
                  f.write(f"changed={changed}\n")
          EOF

      - name: Update manifest skill version
        run: |
          python3 scripts/update-skill-version.py \
            --skill gtm_strategist \
            --version "${{ steps.resolved.outputs.version }}" \
            --date "${{ steps.resolved.outputs.date }}"

      - name: Commit and push all changes in one shot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/user/gtm-strategist/SKILL.md
          git add config/registry-manifest.yaml
          if git diff --staged --quiet; then
            echo "Nothing to commit — all files already in sync."
          else
            git pull --rebase origin main
            git commit -m "chore: sync gtm-strategist to ${{ steps.resolved.outputs.version }} [skip ci]"
            git push
          fi
